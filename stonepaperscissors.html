<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snaplyn Battle: Remastered</title>
    <style>
        :root {
            --bg-dark: #05070a;
            --bg-light: #0f1623;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.6);
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --danger: #ef4444;
            --font-display: 'Segoe UI', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: var(--font-display);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 15px var(--primary-glow)); } 50% { filter: drop-shadow(0 0 5px var(--primary-glow)); } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        /* --- Confetti Canvas --- */
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }

        /* --- Header --- */
        header {
            padding: 1.5rem;
            text-align: center;
            z-index: 10;
        }
        .brand {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: glow 3s infinite;
        }

        /* --- Main Layout --- */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; position: relative; z-index: 5; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: height 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* --- Views System --- */
        .view { display: none; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .view.active { display: block; }

        /* --- Typography --- */
        h1, h2, h3 { text-align: center; font-weight: 800; }
        .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }

        /* --- Buttons --- */
        .btn-group { display: flex; flex-direction: column; gap: 1rem; }
        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); border-color: var(--primary); }
        .btn:active { transform: scale(0.98); }
        .btn.primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        /* --- Game Grid --- */
        .game-area { margin-top: 1rem; }
        
        /* Single Player / Online Layout */
        .choice-container { display: flex; justify-content: center; gap: 1.5rem; margin-top: 2rem; }
        .choice-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: #1e293b;
            border: 2px solid var(--glass-border);
            font-size: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .choice-btn:hover { transform: scale(1.1) rotate(10deg); border-color: var(--primary); background: #334155; }
        .choice-btn:active { transform: scale(0.9); }
        
        /* Local PvP Layout */
        .split-screen { display: flex; flex-direction: column; gap: 1.5rem; }
        .player-zone {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .player-zone.ready { border-color: var(--success); background: rgba(16, 185, 129, 0.05); }
        .player-zone.ready .choice-btn { opacity: 0.3; pointer-events: none; }
        .mini-grid { display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem; }
        .mini-grid .choice-btn { width: 60px; height: 60px; font-size: 1.8rem; }

        /* --- Results --- */
        .result-stage { text-align: center; padding: 1rem 0; }
        .big-text { font-size: 3rem; font-weight: 900; line-height: 1; margin-bottom: 0.5rem; text-transform: uppercase; }
        .vs-display { display: flex; align-items: center; justify-content: center; gap: 2rem; margin: 2rem 0; }
        .fighter { display: flex; flex-direction: column; align-items: center; }
        .fighter-emoji { font-size: 4rem; animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .fighter-name { margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-muted); font-weight: 700; }
        .vs-badge { font-weight: 900; color: var(--glass-border); font-size: 2rem; }
        
        /* --- Toast Notification --- */
        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--text-main); color: var(--bg-dark);
            padding: 10px 20px; border-radius: 50px; font-weight: 600;
            opacity: 0; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 200;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* --- Scoreboard --- */
        .score-pill {
            position: absolute; top: 1rem; right: 1rem;
            font-size: 0.75rem; background: rgba(0,0,0,0.4); padding: 5px 12px;
            border-radius: 20px; color: var(--text-muted); font-weight: 700;
            border: 1px solid var(--glass-border);
        }

        /* --- Online Specific --- */
        .link-box {
            background: #000; color: var(--primary);
            font-family: monospace; padding: 1rem;
            border-radius: 12px; border: 1px dashed var(--primary);
            word-break: break-all; font-size: 0.85rem; cursor: pointer;
            margin: 1rem 0; position: relative;
        }
        .link-box::after { content: 'CLICK TO COPY'; position: absolute; bottom: 5px; right: 5px; font-size: 0.6rem; color: var(--text-muted); }
        .loader {
            width: 40px; height: 40px; border: 4px solid var(--glass-border);
            border-top-color: var(--primary); border-radius: 50%;
            margin: 1rem auto; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="brand">Snaplyn Battle</div>
</header>

<main>
    <div class="card">
        <div class="score-pill" id="scoreboard">W: 0 | L: 0</div>

        <div id="view-menu" class="view active">
            <h1>Select Arena</h1>
            <p class="subtitle">Choose your combat style</p>
            <div class="btn-group">
                <button class="btn primary" onclick="Game.start('pvc')">
                    <span>🤖</span> VS Computer
                </button>
                <button class="btn" onclick="Game.start('pvp')">
                    <span>⚔️</span> Local PvP (Shared Screen)
                </button>
                <button class="btn" onclick="Game.start('pvf')">
                    <span>🌐</span> Online PvP
                </button>
            </div>
        </div>

        <div id="view-lobby" class="view">
            <h2>Lobby</h2>
            <p class="subtitle" id="lobby-status">Connecting to server...</p>
            
            <div id="lobby-loader" class="loader"></div>
            
            <div id="invite-area" style="display:none;">
                <div class="link-box" id="invite-link" onclick="Game.copyLink()">...</div>
                <p style="text-align: center; font-size: 0.8rem; color: var(--text-muted);">Send this link to your friend</p>
            </div>
            
            <button class="btn" style="width: 100%; margin-top: 2rem;" onclick="location.reload()">Cancel</button>
        </div>

        <div id="view-game" class="view">
            <h2 id="game-title">Battle</h2>
            <p class="subtitle" id="game-sub">Make your move</p>

            <div id="layout-single" class="game-area" style="display:none;">
                <div class="choice-container">
                    <div class="choice-btn" onclick="Game.submitMove('stone')" aria-label="Stone">🪨</div>
                    <div class="choice-btn" onclick="Game.submitMove('paper')" aria-label="Paper">📄</div>
                    <div class="choice-btn" onclick="Game.submitMove('scissors')" aria-label="Scissors">✂️</div>
                </div>
            </div>

            <div id="layout-local" class="split-screen" style="display:none;">
                <div class="player-zone" id="zone-p1">
                    <p style="text-align: center; font-size: 0.75rem; font-weight: 800; margin-bottom: 5px; color: var(--primary);">PLAYER 1</p>
                    <div class="mini-grid">
                        <div class="choice-btn" onclick="Game.localMove(1, 'stone')">🪨</div>
                        <div class="choice-btn" onclick="Game.localMove(1, 'paper')">📄</div>
                        <div class="choice-btn" onclick="Game.localMove(1, 'scissors')">✂️</div>
                    </div>
                </div>
                <div class="player-zone" id="zone-p2">
                    <p style="text-align: center; font-size: 0.75rem; font-weight: 800; margin-bottom: 5px; color: var(--accent);">PLAYER 2</p>
                    <div class="mini-grid">
                        <div class="choice-btn" onclick="Game.localMove(2, 'stone')">🪨</div>
                        <div class="choice-btn" onclick="Game.localMove(2, 'paper')">📄</div>
                        <div class="choice-btn" onclick="Game.localMove(2, 'scissors')">✂️</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-result" class="view">
            <div class="result-stage">
                <div class="big-text" id="win-msg">WINNER</div>
                
                <div class="vs-display">
                    <div class="fighter">
                        <div class="fighter-emoji" id="res-p1-emoji">?</div>
                        <div class="fighter-name" id="res-p1-name">You</div>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="fighter">
                        <div class="fighter-emoji" id="res-p2-emoji">?</div>
                        <div class="fighter-name" id="res-p2-name">Opponent</div>
                    </div>
                </div>

                <button class="btn primary" style="width: 100%;" onclick="Game.resetRound()">Play Again</button>
                <button class="btn" style="width: 100%; margin-top: 10px; background: transparent; border: none;" onclick="location.reload()">Exit to Menu</button>
            </div>
        </div>
    </div>
</main>

<div id="toast">Copied to clipboard!</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

    // --- CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyADpppt8wUpiNrTa-axQD238ln-PI98PJc",
        authDomain: "stonepaperscissors-6c5e7.firebaseapp.com",
        databaseURL: "https://stonepaperscissors-6c5e7-default-rtdb.firebaseio.com",
        projectId: "stonepaperscissors-6c5e7",
        storageBucket: "stonepaperscissors-6c5e7.firebasestorage.app",
        messagingSenderId: "514346330500",
        appId: "1:514346330500:web:6e869a2dd9531d10c6d5d1"
    };

    // --- GAME ENGINE ---
    class GameManager {
        constructor() {
            this.app = initializeApp(firebaseConfig);
            this.db = getDatabase(this.app);
            
            this.state = {
                mode: null,     // 'pvc', 'pvp', 'pvf'
                myId: null,     // 'p1' or 'p2' (for online)
                roomId: null,
                p1Move: null,
                p2Move: null,
                scores: { w: 0, l: 0 }
            };

            this.ui = new UIManager();
            this.logic = new GameLogic();
            
            // Auto-detect online room
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('r')) {
                this.start('pvf', urlParams.get('r'));
            }
        }

        start(mode, roomId = null) {
            this.state.mode = mode;
            this.state.p1Move = null;
            this.state.p2Move = null;
            
            if (mode === 'pvc') {
                this.ui.showGame('single', "Beat the AI");
            } else if (mode === 'pvp') {
                this.ui.showGame('local', "Pass the device");
            } else if (mode === 'pvf') {
                this.initOnline(roomId);
            }
        }

        // --- LOCAL LOGIC ---
        submitMove(move) {
            if (this.state.mode === 'pvc') {
                const cpuMove = this.logic.getRandomMove();
                this.resolveGame(move, cpuMove, 'You', 'AI');
            } else if (this.state.mode === 'pvf') {
                this.sendOnlineMove(move);
            }
        }

        localMove(player, move) {
            if (player === 1) {
                this.state.p1Move = move;
                this.ui.lockLocalPlayer(1);
            } else {
                this.state.p2Move = move;
                this.ui.lockLocalPlayer(2);
            }

            if (this.state.p1Move && this.state.p2Move) {
                setTimeout(() => {
                    this.resolveGame(this.state.p1Move, this.state.p2Move, 'Player 1', 'Player 2');
                }, 500);
            }
        }

        resolveGame(m1, m2, n1, n2) {
            const result = this.logic.getWinner(m1, m2); // 0=draw, 1=p1, 2=p2
            
            // Update Stats
            if (this.state.mode !== 'pvp') {
                // In PVP we don't track stats as it's same device
                const didIWin = (this.state.myId === 'p2') ? (result === 2) : (result === 1);
                if (result !== 0) {
                    if (didIWin) this.state.scores.w++; else this.state.scores.l++;
                    this.ui.updateScore(this.state.scores);
                }
            }

            let winText = "DRAW";
            if (result === 1) winText = `${n1} WINS!`;
            if (result === 2) winText = `${n2} WINS!`;

            // Adjust text for "You" context
            if (this.state.mode === 'pvf') {
                if (result === 0) winText = "DRAW";
                else winText = (result === 1 && this.state.myId === 'p1') || (result === 2 && this.state.myId === 'p2') ? "VICTORY!" : "DEFEAT";
            } else if (this.state.mode === 'pvc') {
                if (result === 1) winText = "VICTORY!";
                if (result === 2) winText = "DEFEAT";
            }

            this.ui.showResult(m1, m2, n1, n2, winText, result);
        }

        resetRound() {
            this.state.p1Move = null;
            this.state.p2Move = null;
            
            if (this.state.mode === 'pvf') {
                update(ref(this.db, `rooms/${this.state.roomId}`), { 
                    status: 'resetting',
                    p1Move: null, 
                    p2Move: null 
                });
                // The onValue listener will handle the UI switch
            } else {
                this.ui.resetGameUI(this.state.mode);
            }
        }

        // --- ONLINE LOGIC ---
        initOnline(existingRoomId) {
            this.ui.navigate('view-lobby');
            
            if (existingRoomId) {
                // Joining
                this.state.roomId = existingRoomId;
                this.state.myId = 'p2';
                const roomRef = ref(this.db, `rooms/${existingRoomId}`);
                update(roomRef, { p2Status: 'connected' });
                this.ui.setLobbyStatus("Joining Arena...");
            } else {
                // Hosting
                this.state.roomId = Math.random().toString(36).substring(2, 8);
                this.state.myId = 'p1';
                const roomRef = ref(this.db, `rooms/${this.state.roomId}`);
                set(roomRef, { p1Status: 'connected', p2Status: 'waiting' });
                onDisconnect(roomRef).remove(); // Cleanup on close
                
                this.ui.showInviteLink(window.location.origin + window.location.pathname + "?r=" + this.state.roomId);
            }

            // Listen to changes
            onValue(ref(this.db, `rooms/${this.state.roomId}`), (snap) => {
                const data = snap.val();
                if (!data) return; // Room deleted

                // 1. Connection Handshake
                if (data.p1Status === 'connected' && data.p2Status === 'connected' && document.getElementById('view-lobby').classList.contains('active')) {
                    this.ui.showGame('single', "Opponent Connected");
                }

                // 2. Gameplay Sync
                if (data.p1Move && data.p2Move && !document.getElementById('view-result').classList.contains('active')) {
                     this.resolveGame(data.p1Move, data.p2Move, 
                        this.state.myId === 'p1' ? 'You' : 'Opponent', 
                        this.state.myId === 'p2' ? 'You' : 'Opponent'
                    );
                }

                // 3. Reset Sync
                if (data.status === 'resetting') {
                    // Clear local move immediately so we don't re-trigger
                    update(ref(this.db, `rooms/${this.state.roomId}`), { status: 'playing' });
                    this.ui.resetGameUI('single');
                }
            });
        }

        sendOnlineMove(move) {
            this.ui.toggleLoading(true, "Waiting for opponent...");
            const updateData = {};
            updateData[`${this.state.myId}Move`] = move;
            update(ref(this.db, `rooms/${this.state.roomId}`), updateData);
        }

        copyLink() {
            const text = document.getElementById('invite-link').innerText;
            navigator.clipboard.writeText(text);
            this.ui.showToast("Link Copied!");
        }
    }

    // --- UI MANAGER ---
    class UIManager {
        constructor() {
            this.confettiCtx = document.getElementById('confetti-canvas').getContext('2d');
            this.resizeCanvas();
            window.addEventListener('resize', () => this.resizeCanvas());
        }

        resizeCanvas() {
            this.confettiCtx.canvas.width = window.innerWidth;
            this.confettiCtx.canvas.height = window.innerHeight;
        }

        navigate(viewId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        showGame(layout, title) {
            this.navigate('view-game');
            document.getElementById('game-title').innerText = title;
            document.getElementById('layout-single').style.display = (layout === 'single') ? 'flex' : 'none';
            document.getElementById('layout-local').style.display = (layout === 'local') ? 'flex' : 'none';
            this.toggleLoading(false);
        }

        lockLocalPlayer(pNum) {
            document.getElementById(`zone-p${pNum}`).classList.add('ready');
        }

        showInviteLink(url) {
            document.getElementById('invite-area').style.display = 'block';
            document.getElementById('lobby-loader').style.display = 'block';
            document.getElementById('lobby-status').innerText = "Waiting for player to join...";
            document.getElementById('invite-link').innerText = url;
        }

        setLobbyStatus(msg) {
            document.getElementById('lobby-status').innerText = msg;
        }

        toggleLoading(isActive, text = "") {
            const container = document.querySelector('.choice-container');
            if (isActive) {
                container.style.opacity = '0.3';
                container.style.pointerEvents = 'none';
                document.getElementById('game-sub').innerText = text;
            } else {
                container.style.opacity = '1';
                container.style.pointerEvents = 'all';
                document.getElementById('game-sub').innerText = "Make your move";
            }
        }

        showResult(m1, m2, n1, n2, resultText, code) {
            this.navigate('view-result');
            const emojis = { stone: '🪨', paper: '📄', scissors: '✂️' };
            
            document.getElementById('res-p1-emoji').innerText = emojis[m1];
            document.getElementById('res-p2-emoji').innerText = emojis[m2];
            document.getElementById('res-p1-name').innerText = n1;
            document.getElementById('res-p2-name').innerText = n2;
            
            const title = document.getElementById('win-msg');
            title.innerText = resultText;
            
            if (resultText.includes("VICTORY") || resultText.includes("Player")) {
                title.style.color = "var(--success)";
                this.fireConfetti();
            } else if (resultText.includes("DEFEAT")) {
                title.style.color = "var(--danger)";
            } else {
                title.style.color = "var(--text-muted)";
            }
        }

        resetGameUI(mode) {
            // Clear local locks
            document.querySelectorAll('.player-zone').forEach(el => el.classList.remove('ready'));
            this.navigate('view-game');
            this.toggleLoading(false);
        }

        updateScore(scores) {
            document.getElementById('scoreboard').innerText = `W: ${scores.w} | L: ${scores.l}`;
        }

        showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        // Simple Confetti Implementation
        fireConfetti() {
            let particles = [];
            const colors = ['#3b82f6', '#ec4899', '#10b981', '#f59e0b'];
            for(let i=0; i<100; i++) {
                particles.push({
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 100
                });
            }
            
            const animate = () => {
                const ctx = this.confettiCtx;
                ctx.clearRect(0,0, window.innerWidth, window.innerHeight);
                particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 6, 6);
                    if(p.life <= 0) particles.splice(i, 1);
                });
                if(particles.length > 0) requestAnimationFrame(animate);
            };
            animate();
        }
    }

    // --- PURE LOGIC ---
    class GameLogic {
        getRandomMove() {
            const moves = ['stone', 'paper', 'scissors'];
            return moves[Math.floor(Math.random() * 3)];
        }

        getWinner(p1, p2) {
            if (p1 === p2) return 0; // Draw
            const rules = { stone: 'scissors', paper: 'stone', scissors: 'paper' };
            return (rules[p1] === p2) ? 1 : 2; // 1 if P1 wins, 2 if P2 wins
        }
    }

    // --- INITIALIZATION ---
    window.Game = new GameManager();

</script>
</body>
</html>
