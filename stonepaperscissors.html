<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snaplyn Battle Pro - Stone Paper Scissors</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --neon-blue: #38bdf8;
            --neon-purple: #a855f7;
            --neon-pink: #f472b6;
            --text: #f8fafc;
            --text-dim: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

        header { padding: 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; width: 100%; }
        .game-card { background: var(--card); width: 100%; max-width: 600px; border-radius: 24px; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); position: relative; }

        .view { display: none; text-align: center; }
        .view.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Menu */
        .btn-list { display: grid; gap: 1rem; margin-top: 2rem; }
        .btn { padding: 1.2rem; border-radius: 16px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; background: rgba(255,255,255,0.05); }
        .btn:hover { transform: scale(1.02); background: rgba(255,255,255,0.1); border: 1px solid var(--neon-blue); }
        .btn-main { background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); }

        /* Simultaneous PvP Styles */
        .split-screen { display: flex; flex-direction: column; gap: 2rem; margin-top: 1rem; }
        .player-zone { padding: 1rem; border-radius: 16px; background: rgba(0,0,0,0.2); border: 2px solid transparent; transition: 0.3s; }
        .player-zone.active { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        .player-zone.ready { border-color: var(--success); opacity: 0.6; }
        .choices-row { display: flex; justify-content: center; gap: 1rem; margin-top: 10px; }
        .choice-item { width: 60px; height: 60px; font-size: 1.5rem; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .choice-item:active { transform: scale(0.9); }
        .choice-item.selected { background: var(--neon-blue); border-color: white; }

        /* Result View */
        .vs-container { display: flex; justify-content: space-around; align-items: center; margin: 2rem 0; }
        .result-emoji { font-size: 3.5rem; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .win-text { font-size: 2.5rem; font-weight: 900; margin-bottom: 1.5rem; text-transform: uppercase; }

        /* Online Info */
        .share-box { background: #000; padding: 1rem; border-radius: 12px; margin: 1.5rem 0; word-break: break-all; font-family: monospace; border: 1px dashed var(--neon-blue); cursor: pointer; }
        .loader { width: 40px; height: 40px; border: 4px solid var(--text-dim); border-top-color: var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { padding: 1.5rem; text-align: center; color: var(--text-dim); font-size: 0.8rem; }
        
        .timer { font-size: 4rem; font-weight: 900; color: var(--neon-pink); }
    </style>
</head>
<body>

<header><div class="logo">SNAPLYN BATTLE PRO</div></header>

<main>
    <div class="game-card">
        <div id="view-menu" class="view active">
            <h2 style="font-size: 2rem;">Choose Battle</h2>
            <div class="btn-list">
                <button class="btn btn-main" onclick="initGame('pvc')">🤖 vs Computer</button>
                <button class="btn" onclick="initGame('pvp')">⚔️ Simultaneous PvP (Local)</button>
                <button class="btn" onclick="initGame('pvf')">🌐 Play Friend (Online)</button>
            </div>
        </div>

        <div id="view-lobby" class="view">
            <h2 id="lobby-status">Creating Room...</h2>
            <div class="loader" id="lobby-loader"></div>
            <div id="lobby-share" style="display: none;">
                <p style="font-size: 0.9rem; color: var(--text-dim);">Send this to your friend:</p>
                <div class="share-box" id="share-url" onclick="copyURL()">Loading...</div>
                <p style="font-size: 0.7rem;">(Click to copy link)</p>
            </div>
            <div class="timer" id="lobby-timer" style="display: none;">3</div>
            <button class="btn" style="width: 100%; margin-top: 2rem;" onclick="location.reload()">Exit</button>
        </div>

        <div id="view-game" class="view">
            <h3 id="game-sub" style="color: var(--neon-blue); margin-bottom: 0.5rem;">Battle</h3>
            <div id="game-status" style="margin-bottom: 1.5rem; font-weight: 600;">Waiting for moves...</div>

            <div id="local-pvp-layout" class="split-screen" style="display: none;">
                <div class="player-zone" id="p1-zone">
                    <p>PLAYER 1</p>
                    <div class="choices-row">
                        <div class="choice-item" onclick="handleLocalPress(1, 'stone')">🪨</div>
                        <div class="choice-item" onclick="handleLocalPress(1, 'paper')">📄</div>
                        <div class="choice-item" onclick="handleLocalPress(1, 'scissors')">✂️</div>
                    </div>
                </div>
                <div class="player-zone" id="p2-zone">
                    <p>PLAYER 2</p>
                    <div class="choices-row">
                        <div class="choice-item" onclick="handleLocalPress(2, 'stone')">🪨</div>
                        <div class="choice-item" onclick="handleLocalPress(2, 'paper')">📄</div>
                        <div class="choice-item" onclick="handleLocalPress(2, 'scissors')">✂️</div>
                    </div>
                </div>
            </div>

            <div id="general-layout" class="choices-row" style="margin: 2rem 0;">
                <div class="choice-item" style="width: 80px; height: 80px; font-size: 2rem;" onclick="submitMove('stone')">🪨</div>
                <div class="choice-item" style="width: 80px; height: 80px; font-size: 2rem;" onclick="submitMove('paper')">📄</div>
                <div class="choice-item" style="width: 80px; height: 80px; font-size: 2rem;" onclick="submitMove('scissors')">✂️</div>
            </div>
        </div>

        <div id="view-result" class="view">
            <div class="win-text" id="result-title">YOU WIN!</div>
            <div class="vs-container">
                <div>
                    <div class="result-emoji" id="res-p1">?</div>
                    <p style="margin-top: 10px; color: var(--text-dim);" id="label-p1">You</p>
                </div>
                <div style="font-weight: 900; opacity: 0.3;">VS</div>
                <div>
                    <div class="result-emoji" id="res-p2">?</div>
                    <p style="margin-top: 10px; color: var(--text-dim);" id="label-p2">Opponent</p>
                </div>
            </div>
            <button class="btn btn-main" style="width: 100%;" onclick="requestRematch()">Play Again</button>
        </div>
    </div>
</main>

<footer>Snaplyn Game Studio &bull; Precise Sync Engine v2.0</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADpppt8wUpiNrTa-axQD238ln-PI98PJc",
        authDomain: "stonepaperscissors-6c5e7.firebaseapp.com",
        databaseURL: "https://stonepaperscissors-6c5e7-default-rtdb.firebaseio.com",
        projectId: "stonepaperscissors-6c5e7",
        storageBucket: "stonepaperscissors-6c5e7.firebasestorage.app",
        messagingSenderId: "514346330500",
        appId: "1:514346330500:web:6e869a2dd9531d10c6d5d1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // STATE
    let mode = ''; 
    let roomID = null;
    let myRole = ''; // 'p1' or 'p2'
    let localP1Move = null;
    let localP2Move = null;
    let gameActive = false;

    const emojiMap = { stone: '🪨', paper: '📄', scissors: '✂️' };

    // NAVIGATION
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    window.initGame = (m) => {
        mode = m;
        if (m === 'pvf') {
            setupOnline();
        } else {
            showView('view-game');
            setupLocalLayout(m);
        }
    };

    function setupLocalLayout(m) {
        gameActive = true;
        document.getElementById('view-result').classList.remove('active');
        if (m === 'pvp') {
            document.getElementById('local-pvp-layout').style.display = 'flex';
            document.getElementById('general-layout').style.display = 'none';
            document.getElementById('game-status').innerText = 'Both players select simultaneously!';
        } else {
            document.getElementById('local-pvp-layout').style.display = 'none';
            document.getElementById('general-layout').style.display = 'flex';
            document.getElementById('game-status').innerText = 'Choose your move';
        }
    }

    // LOCAL LOGIC
    window.handleLocalPress = (pNum, move) => {
        if (!gameActive) return;
        if (pNum === 1) {
            localP1Move = move;
            document.getElementById('p1-zone').classList.add('ready');
        } else {
            localP2Move = move;
            document.getElementById('p2-zone').classList.add('ready');
        }

        if (localP1Move && localP2Move) {
            calculateWinner(localP1Move, localP2Move, 'Player 1', 'Player 2');
        }
    };

    window.submitMove = (move) => {
        if (!gameActive) return;
        if (mode === 'pvc') {
            const bot = ['stone', 'paper', 'scissors'][Math.floor(Math.random() * 3)];
            calculateWinner(move, bot, 'You', 'CPU');
        } else if (mode === 'pvf') {
            update(ref(db, `rooms/${roomID}`), { [`${myRole}Move`]: move });
            document.getElementById('game-status').innerText = 'Move sent! Waiting for friend...';
            document.getElementById('general-layout').style.opacity = '0.3';
            document.getElementById('general-layout').style.pointerEvents = 'none';
        }
    };

    // WIN LOGIC
    function calculateWinner(m1, m2, name1, name2) {
        gameActive = false;
        showView('view-result');
        
        document.getElementById('res-p1').innerText = emojiMap[m1];
        document.getElementById('res-p2').innerText = emojiMap[m2];
        document.getElementById('label-p1').innerText = name1;
        document.getElementById('label-p2').innerText = name2;

        const title = document.getElementById('result-title');
        
        if (m1 === m2) {
            title.innerText = "DRAW!";
            title.style.color = "var(--text-dim)";
        } else if (
            (m1 === 'stone' && m2 === 'scissors') ||
            (m1 === 'paper' && m2 === 'stone') ||
            (m1 === 'scissors' && m2 === 'paper')
        ) {
            title.innerText = (mode === 'pvf' && myRole === 'p2') ? `${name2} WINS!` : `${name1} WINS!`;
            title.style.color = "var(--success)";
        } else {
            title.innerText = (mode === 'pvf' && myRole === 'p2') ? `${name1} WINS!` : `${name2} WINS!`;
            title.style.color = "var(--danger)";
        }
    }

    // ONLINE ENGINE
    function setupOnline() {
        const params = new URLSearchParams(window.location.search);
        roomID = params.get('room');

        showView('view-lobby');

        if (!roomID) {
            myRole = 'p1';
            roomID = Math.random().toString(36).substring(2, 8);
            set(ref(db, `rooms/${roomID}`), {
                p1Joined: true,
                p2Joined: false,
                p1Move: null,
                p2Move: null,
                gameState: 'waiting'
            });
            document.getElementById('lobby-share').style.display = 'block';
            document.getElementById('share-url').innerText = window.location.origin + window.location.pathname + "?room=" + roomID;
            onDisconnect(ref(db, `rooms/${roomID}`)).remove();
        } else {
            myRole = 'p2';
            update(ref(db, `rooms/${roomID}`), { p2Joined: true });
            document.getElementById('lobby-status').innerText = 'Joining Room...';
        }

        listenOnline();
    }

    function listenOnline() {
        onValue(ref(db, `rooms/${roomID}`), (snap) => {
            const data = snap.val();
            if (!data) return;

            // Start Game
            if (data.p1Joined && data.p2Joined && data.gameState === 'waiting') {
                startCountdown();
            }

            // Reveal Results
            if (data.p1Move && data.p2Move && gameActive) {
                calculateWinner(data.p1Move, data.p2Move, (myRole === 'p1' ? 'You' : 'Friend'), (myRole === 'p1' ? 'Friend' : 'You'));
            }

            // Sync Rematch
            if (data.gameState === 'reset') {
                resetOnlineState();
            }
        });
    }

    function startCountdown() {
        update(ref(db, `rooms/${roomID}`), { gameState: 'starting' });
        document.getElementById('lobby-loader').style.display = 'none';
        document.getElementById('lobby-share').style.display = 'none';
        const timerEl = document.getElementById('lobby-timer');
        timerEl.style.display = 'block';

        let count = 3;
        const interval = setInterval(() => {
            count--;
            timerEl.innerText = count;
            if (count <= 0) {
                clearInterval(interval);
                gameActive = true;
                showView('view-game');
                setupLocalLayout('pvf');
            }
        }, 1000);
    }

    window.requestRematch = () => {
        if (mode === 'pvf') {
            update(ref(db, `rooms/${roomID}`), {
                gameState: 'reset',
                p1Move: null,
                p2Move: null
            });
        } else {
            localP1Move = null;
            localP2Move = null;
            document.querySelectorAll('.player-zone').forEach(z => z.classList.remove('ready'));
            showView('view-game');
            setupLocalLayout(mode);
        }
    };

    function resetOnlineState() {
        gameActive = true;
        document.getElementById('general-layout').style.opacity = '1';
        document.getElementById('general-layout').style.pointerEvents = 'all';
        document.getElementById('game-status').innerText = 'Round Reset! Choose your move.';
        showView('view-game');
        update(ref(db, `rooms/${roomID}`), { gameState: 'playing' });
    }

    window.copyURL = () => {
        const url = document.getElementById('share-url').innerText;
        navigator.clipboard.writeText(url);
        alert('Link Copied! Send it to your friend.');
    };

    // Auto-join from URL
    if (window.location.search.includes('room=')) {
        initGame('pvf');
    }

</script>
</body>
</html>
