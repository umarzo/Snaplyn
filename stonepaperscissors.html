<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaplyn Battle - Stone Paper Scissors</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --neon-blue: #38bdf8;
            --neon-pink: #f472b6;
            --neon-purple: #a855f7;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #4ade80;
            --danger: #fb7185;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* UI Shell */
        header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        footer {
            padding: 1.5rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Game Container */
        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        /* Menu Styles */
        .menu-view h1 { margin-bottom: 2rem; font-size: 2rem; }
        .btn-group { display: flex; flex-direction: column; gap: 1rem; }
        
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            border: none;
        }

        /* Gameplay Styles */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-box {
            margin: 1.5rem 0;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }

        .choices-area {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .choice-btn {
            width: 80px;
            height: 80px;
            font-size: 2rem;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            background: var(--bg-dark);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-btn:hover:not(:disabled) {
            transform: scale(1.15);
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.4);
        }

        .choice-btn:active { transform: scale(0.95); }
        .choice-btn.selected {
            background: var(--neon-blue);
            border-color: white;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .timer-circle {
            font-size: 3rem;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            margin: 1rem 0;
        }

        .result-display {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 1.5rem 0;
        }

        .comparison {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 2rem;
        }

        .player-label { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.5rem; }

        .hidden-move { filter: blur(8px); }

        .link-share {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 1rem;
            word-break: break-all;
            border: 1px dashed var(--neon-blue);
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SNAPLYN BATTLE</div>
</header>

<main>
    <div class="game-container">
        <div id="menu-view" class="view active">
            <h1>Select Mode</h1>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="startMode('pvc')">🤖 vs Computer</button>
                <button class="btn" onclick="startMode('pvp')">👥 Local 1 vs 1</button>
                <button class="btn" onclick="startMode('pvf')">🌐 Play with Friend</button>
            </div>
        </div>

        <div id="online-view" class="view">
            <h2 id="online-status">Creating Room...</h2>
            <div id="share-section" style="display: none;">
                <p style="font-size: 0.9rem; margin-top: 1rem;">Share this link with a friend:</p>
                <div class="link-share" id="room-link" onclick="copyLink()">Loading...</div>
                <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 0.5rem;">Click to copy</p>
            </div>
            <div class="timer-circle" id="online-countdown" style="display: none;">3</div>
            <button class="btn" style="margin-top: 2rem; width: 100%;" onclick="location.reload()">Cancel</button>
        </div>

        <div id="game-view" class="view">
            <h2 id="game-title">Battle!</h2>
            <div class="status-box" id="status-msg">Choose your weapon</div>
            
            <div id="battle-results" style="display: none;">
                <div class="comparison">
                    <div>
                        <div class="choice-btn" id="p1-final" style="pointer-events: none;">?</div>
                        <div class="player-label" id="p1-label">You</div>
                    </div>
                    <div style="font-weight: 900; font-size: 1.5rem;">VS</div>
                    <div>
                        <div class="choice-btn" id="p2-final" style="pointer-events: none;">?</div>
                        <div class="player-label" id="p2-label">Opponent</div>
                    </div>
                </div>
                <div class="result-display" id="outcome-text">DRAW</div>
                <button class="btn btn-primary" style="width: 100%;" onclick="handleRematch()">Play Again</button>
            </div>

            <div class="choices-area" id="choices-grid">
                <button class="choice-btn" onclick="submitChoice('stone')">🪨</button>
                <button class="choice-btn" onclick="submitChoice('paper')">📄</button>
                <button class="choice-btn" onclick="submitChoice('scissors')">✂️</button>
            </div>
        </div>
    </div>
</main>

<footer>
    Powered by Snaplyn Engine &bull; Real-time Database v12.7.0
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADpppt8wUpiNrTa-axQD238ln-PI98PJc",
        authDomain: "stonepaperscissors-6c5e7.firebaseapp.com",
        databaseURL: "https://stonepaperscissors-6c5e7-default-rtdb.firebaseio.com",
        projectId: "stonepaperscissors-6c5e7",
        storageBucket: "stonepaperscissors-6c5e7.firebasestorage.app",
        messagingSenderId: "514346330500",
        appId: "1:514346330500:web:6e869a2dd9531d10c6d5d1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Game Variables
    let currentGameMode = '';
    let roomID = null;
    let playerRole = null; // 'p1' or 'p2'
    let localChoices = { p1: null, p2: null };
    let gameState = 'idle';

    const emojis = { stone: '🪨', paper: '📄', scissors: '✂️' };

    // Navigation & Init
    window.startMode = (mode) => {
        currentGameMode = mode;
        switchView(mode === 'pvf' ? 'online-view' : 'game-view');
        
        if (mode === 'pvc') {
            document.getElementById('game-title').innerText = 'Player vs CPU';
            document.getElementById('p2-label').innerText = 'Computer';
        } else if (mode === 'pvp') {
            document.getElementById('game-title').innerText = 'Local PvP';
            document.getElementById('p1-label').innerText = 'Player 1';
            document.getElementById('p2-label').innerText = 'Player 2';
            document.getElementById('status-msg').innerText = 'Player 1: Make your choice';
        } else if (mode === 'pvf') {
            initOnlineGame();
        }
    };

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    // Logic: Choice Submission
    window.submitChoice = (val) => {
        if (gameState === 'resolving') return;

        if (currentGameMode === 'pvc') {
            const cpuMove = ['stone', 'paper', 'scissors'][Math.floor(Math.random() * 3)];
            resolveRound(val, cpuMove);
        } 
        else if (currentGameMode === 'pvp') {
            if (!localChoices.p1) {
                localChoices.p1 = val;
                document.getElementById('status-msg').innerText = 'Player 2: Make your choice';
                flashAction();
            } else {
                localChoices.p2 = val;
                resolveRound(localChoices.p1, localChoices.p2);
            }
        } 
        else if (currentGameMode === 'pvf') {
            update(ref(db, `rooms/${roomID}`), {
                [`${playerRole}Choice`]: val
            });
            document.getElementById('choices-grid').style.pointerEvents = 'none';
            document.getElementById('choices-grid').style.opacity = '0.5';
            document.getElementById('status-msg').innerText = 'Waiting for friend...';
        }
    };

    // Logic: Win Calculation
    function resolveRound(p1, p2) {
        gameState = 'resolving';
        document.getElementById('choices-grid').style.display = 'none';
        document.getElementById('battle-results').style.display = 'block';
        document.getElementById('status-msg').style.display = 'none';

        document.getElementById('p1-final').innerText = emojis[p1];
        document.getElementById('p2-final').innerText = emojis[p2];

        const winner = getWinner(p1, p2);
        const textEl = document.getElementById('outcome-text');
        
        if (winner === 'draw') {
            textEl.innerText = "IT'S A DRAW";
            textEl.style.color = 'var(--text-dim)';
        } else if (winner === 'p1') {
            textEl.innerText = currentGameMode === 'pvc' ? "YOU WIN! 🎉" : "PLAYER 1 WINS!";
            textEl.style.color = 'var(--success)';
        } else {
            textEl.innerText = currentGameMode === 'pvc' ? "CPU WINS! 🤖" : "PLAYER 2 WINS!";
            textEl.style.color = 'var(--danger)';
        }
    }

    function getWinner(p1, p2) {
        if (p1 === p2) return 'draw';
        if (
            (p1 === 'stone' && p2 === 'scissors') ||
            (p1 === 'paper' && p2 === 'stone') ||
            (p1 === 'scissors' && p2 === 'paper')
        ) return 'p1';
        return 'p2';
    }

    // Online Engine
    function initOnlineGame() {
        const urlParams = new URLSearchParams(window.location.search);
        const existingRoom = urlParams.get('room');

        if (existingRoom) {
            roomID = existingRoom;
            playerRole = 'p2';
            joinRoom(existingRoom);
        } else {
            roomID = Math.random().toString(36).substring(2, 8);
            playerRole = 'p1';
            createRoom(roomID);
        }

        listenToRoom();
    }

    function createRoom(id) {
        set(ref(db, `rooms/${id}`), {
            p1Connected: true,
            p2Connected: false,
            p1Choice: null,
            p2Choice: null,
            gameState: 'waiting',
            rematchCount: 0
        });
        
        document.getElementById('share-section').style.display = 'block';
        document.getElementById('room-link').innerText = window.location.href + '?room=' + id;
        document.getElementById('online-status').innerText = 'Waiting for Friend...';
        
        onDisconnect(ref(db, `rooms/${id}`)).remove();
    }

    function joinRoom(id) {
        update(ref(db, `rooms/${id}`), { p2Connected: true });
        document.getElementById('online-status').innerText = 'Connecting...';
        onDisconnect(ref(db, `rooms/${id}/p2Connected`)).set(false);
    }

    function listenToRoom() {
        onValue(ref(db, `rooms/${roomID}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Start countdown when both join
            if (data.p1Connected && data.p2Connected && data.gameState === 'waiting') {
                startOnlineCountdown();
            }

            // Sync Choices
            if (data.p1Choice && data.p2Choice && gameState !== 'resolving') {
                resolveRound(data.p1Choice, data.p2Choice);
            }

            // Handle Rematch Sync
            if (data.gameState === 'rematch' && gameState === 'resolving') {
                location.reload();
            }
        });
    }

    function startOnlineCountdown() {
        update(ref(db, `rooms/${roomID}`), { gameState: 'starting' });
        document.getElementById('share-section').style.display = 'none';
        document.getElementById('online-status').innerText = 'Battle Starting!';
        
        const countEl = document.getElementById('online-countdown');
        countEl.style.display = 'block';
        
        let timeLeft = 3;
        const timer = setInterval(() => {
            timeLeft--;
            countEl.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                switchView('game-view');
                document.getElementById('game-title').innerText = 'Online Battle';
                document.getElementById('p2-label').innerText = 'Friend';
            }
        }, 1000);
    }

    window.handleRematch = () => {
        if (currentGameMode === 'pvf') {
            update(ref(db, `rooms/${roomID}`), {
                gameState: 'rematch',
                p1Choice: null,
                p2Choice: null
            });
        } else {
            location.reload();
        }
    };

    window.copyLink = () => {
        const text = document.getElementById('room-link').innerText;
        navigator.clipboard.writeText(text);
        alert('Link copied to clipboard!');
    };

    function flashAction() {
        const box = document.getElementById('status-msg');
        box.style.background = 'var(--neon-blue)';
        setTimeout(() => box.style.background = 'rgba(0,0,0,0.2)', 200);
    }

    // Auto-init for guest links
    if (window.location.search.includes('room=')) {
        startMode('pvf');
    }

</script>
</body>
</html>
