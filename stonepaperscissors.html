<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snaplyn Battle: Ultimate Edition</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2c;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --neon-purple: #8b5cf6;
            --neon-pink: #ec4899;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text-primary); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* Background Animation */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg) 70%);
            z-index: -1;
            animation: pulse 10s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        header {
            padding: 1.25rem;
            text-align: center;
            background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 50;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; position: relative; }

        .game-wrapper {
            width: 100%;
            max-width: 550px;
            background: var(--card);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        .view { display: none; text-align: center; }
        .view.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons & Controls */
        .menu-btns { display: grid; gap: 1rem; margin-top: 2rem; }
        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 1.2rem;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn:hover { background: rgba(255,255,255,0.08); transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 10px 20px -10px var(--accent-glow); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--neon-purple)); border: none; }

        /* PvP Simultaneous Layout */
        .simul-container { display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1rem; }
        .player-box {
            padding: 1.5rem;
            border-radius: 24px;
            background: rgba(0,0,0,0.3);
            border: 2px solid transparent;
            transition: all 0.4s ease;
        }
        .player-box.locked { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .player-box.locked .choice-grid { opacity: 0.2; pointer-events: none; }
        
        .choice-grid { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; }
        .choice-item {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: #0f172a;
            border: 2px solid rgba(255,255,255,0.1);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .choice-item:active { transform: scale(0.9); background: var(--accent); }

        /* Online Logic UI */
        .url-card {
            background: #000;
            padding: 1rem;
            border-radius: 16px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            margin: 1.5rem 0;
            word-break: break-all;
            cursor: copy;
        }
        .status-pill {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* Results Display */
        .result-screen { position: relative; }
        .vs-ring {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 2.5rem 0;
        }
        .outcome-emoji { font-size: 4rem; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        
        .win-label { font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 0.5rem; }

        footer { padding: 1rem; text-align: center; font-size: 0.75rem; color: var(--text-secondary); opacity: 0.6; }

        @media (max-width: 400px) {
            .choice-item { width: 55px; height: 55px; font-size: 1.4rem; }
            .game-wrapper { padding: 1.2rem; }
        }
    </style>
</head>
<body>

<header><div class="logo-text">Snaplyn Battle</div></header>

<main>
    <div class="game-wrapper">
        <div id="view-menu" class="view active">
            <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;">Arena</h1>
            <p style="color: var(--text-secondary);">Select Combat Mode</p>
            <div class="menu-btns">
                <button class="btn btn-primary" onclick="launchMode('pvc')">🤖 vs Computer</button>
                <button class="btn" onclick="launchMode('pvp')">⚔️ Local PvP (Simultaneous)</button>
                <button class="btn" onclick="launchMode('pvf')">🌐 Friend PvP (Online)</button>
            </div>
        </div>

        <div id="view-lobby" class="view">
            <div class="status-pill" id="lobby-tag">Creating Arena...</div>
            <h2 id="lobby-msg">Waiting for Opponent</h2>
            <div id="online-tools" style="display: none;">
                <div class="url-card" id="invite-link" onclick="copyInvite()">Generating Link...</div>
                <p style="font-size: 0.75rem; color: var(--text-secondary);">Click link to copy & send to friend</p>
            </div>
            <div id="countdown-display" style="font-size: 5rem; font-weight: 900; color: var(--neon-pink); display: none;">3</div>
            <button class="btn" style="width: 100%; margin-top: 2rem;" onclick="location.reload()">Abort Match</button>
        </div>

        <div id="view-game" class="view">
            <div class="status-pill" id="game-mode-label">Mode</div>
            <h3 id="game-instruction" style="margin-bottom: 2rem;">Choose Your Weapon</h3>

            <div id="layout-local" class="simul-container" style="display: none;">
                <div class="player-box" id="box-p1">
                    <p style="font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">PLAYER 1</p>
                    <div class="choice-grid">
                        <div class="choice-item" onclick="localTap(1, 'stone')">🪨</div>
                        <div class="choice-item" onclick="localTap(1, 'paper')">📄</div>
                        <div class="choice-item" onclick="localTap(1, 'scissors')">✂️</div>
                    </div>
                </div>
                <div class="player-box" id="box-p2">
                    <p style="font-size: 0.7rem; font-weight: 800; letter-spacing: 1px;">PLAYER 2</p>
                    <div class="choice-grid">
                        <div class="choice-item" onclick="localTap(2, 'stone')">🪨</div>
                        <div class="choice-item" onclick="localTap(2, 'paper')">📄</div>
                        <div class="choice-item" onclick="localTap(2, 'scissors')">✂️</div>
                    </div>
                </div>
            </div>

            <div id="layout-single" class="choice-grid" style="gap: 1.5rem; margin-top: 3rem;">
                <div class="choice-item" style="width: 90px; height: 90px; font-size: 2.5rem;" onclick="handleChoice('stone')">🪨</div>
                <div class="choice-item" style="width: 90px; height: 90px; font-size: 2.5rem;" onclick="handleChoice('paper')">📄</div>
                <div class="choice-item" style="width: 90px; height: 90px; font-size: 2.5rem;" onclick="handleChoice('scissors')">✂️</div>
            </div>
        </div>

        <div id="view-result" class="view result-screen">
            <h1 class="win-label" id="win-text">YOU WIN</h1>
            <div class="vs-ring">
                <div>
                    <div class="outcome-emoji" id="out-p1">?</div>
                    <p id="name-p1" style="color: var(--text-secondary); margin-top: 10px; font-weight: 700;">Player 1</p>
                </div>
                <div style="font-weight: 900; opacity: 0.2; font-size: 1.5rem;">VS</div>
                <div>
                    <div class="outcome-emoji" id="out-p2">?</div>
                    <p id="name-p2" style="color: var(--text-secondary); margin-top: 10px; font-weight: 700;">Player 2</p>
                </div>
            </div>
            <button class="btn btn-primary" style="width: 100%;" id="rematch-btn" onclick="triggerRematch()">Fight Again</button>
        </div>
    </div>
</main>

<footer>Built with Snaplyn Engine &bull; Zero-Latency Core</footer>



<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyADpppt8wUpiNrTa-axQD238ln-PI98PJc",
        authDomain: "stonepaperscissors-6c5e7.firebaseapp.com",
        databaseURL: "https://stonepaperscissors-6c5e7-default-rtdb.firebaseio.com",
        projectId: "stonepaperscissors-6c5e7",
        storageBucket: "stonepaperscissors-6c5e7.firebasestorage.app",
        messagingSenderId: "514346330500",
        appId: "1:514346330500:web:6e869a2dd9531d10c6d5d1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Global State
    let activeMode = '';
    let roomPath = null;
    let myID = ''; // 'p1' or 'p2'
    let p1Move = null;
    let p2Move = null;
    let isLocked = false;

    const emojis = { stone: '🪨', paper: '📄', scissors: '✂️' };

    // View Manager
    function navigate(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Launch Game Modes
    window.launchMode = (mode) => {
        activeMode = mode;
        if (mode === 'pvf') {
            initOnlineSession();
        } else {
            navigate('view-game');
            setupGameUI(mode);
        }
    };

    function setupGameUI(mode) {
        isLocked = false;
        document.getElementById('game-mode-label').innerText = mode.toUpperCase();
        if (mode === 'pvp') {
            document.getElementById('layout-local').style.display = 'flex';
            document.getElementById('layout-single').style.display = 'none';
        } else {
            document.getElementById('layout-local').style.display = 'none';
            document.getElementById('layout-single').style.display = 'flex';
        }
    }

    // Gameplay Core Logic
    window.localTap = (playerNum, move) => {
        if (isLocked) return;
        if (playerNum === 1) {
            p1Move = move;
            document.getElementById('box-p1').classList.add('locked');
        } else {
            p2Move = move;
            document.getElementById('box-p2').classList.add('locked');
        }

        if (p1Move && p2Move) {
            isLocked = true;
            setTimeout(() => finalizeResult(p1Move, p2Move, 'Player 1', 'Player 2'), 300);
        }
    };

    window.handleChoice = (move) => {
        if (isLocked) return;
        if (activeMode === 'pvc') {
            const cpu = ['stone', 'paper', 'scissors'][Math.floor(Math.random() * 3)];
            finalizeResult(move, cpu, 'You', 'CPU');
        } else if (activeMode === 'pvf') {
            update(ref(db, `rooms/${roomPath}`), { [`${myID}Move`]: move });
            document.getElementById('game-instruction').innerText = "Move Locked. Waiting...";
            document.getElementById('layout-single').style.opacity = '0.3';
            isLocked = true;
        }
    };

    function finalizeResult(m1, m2, n1, n2) {
        navigate('view-result');
        const outP1 = document.getElementById('out-p1');
        const outP2 = document.getElementById('out-p2');
        const winTitle = document.getElementById('win-text');

        outP1.innerText = emojis[m1];
        outP2.innerText = emojis[m2];
        document.getElementById('name-p1').innerText = n1;
        document.getElementById('name-p2').innerText = n2;

        if (m1 === m2) {
            winTitle.innerText = "DRAW!";
            winTitle.style.color = "var(--text-secondary)";
        } else if (
            (m1 === 'stone' && m2 === 'scissors') ||
            (m1 === 'paper' && m2 === 'stone') ||
            (m1 === 'scissors' && m2 === 'paper')
        ) {
            // Logic to determine if "YOU" won or "P1" won
            if (activeMode === 'pvf') {
                winTitle.innerText = (myID === 'p1') ? "YOU WIN! 🎉" : "YOU LOSE! 💀";
            } else {
                winTitle.innerText = `${n1} WINS!`;
            }
            winTitle.style.color = (activeMode === 'pvf' && myID === 'p2') ? "var(--danger)" : "var(--success)";
        } else {
            if (activeMode === 'pvf') {
                winTitle.innerText = (myID === 'p2') ? "YOU WIN! 🎉" : "YOU LOSE! 💀";
            } else {
                winTitle.innerText = `${n2} WINS!`;
            }
            winTitle.style.color = (activeMode === 'pvf' && myID === 'p1') ? "var(--danger)" : "var(--success)";
        }
    }

    // Online Engine
    function initOnlineSession() {
        const urlParams = new URLSearchParams(window.location.search);
        roomPath = urlParams.get('r');

        navigate('view-lobby');

        if (!roomPath) {
            myID = 'p1';
            roomPath = Math.random().toString(36).substring(2, 9);
            set(ref(db, `rooms/${roomPath}`), {
                p1Status: 'ready',
                p2Status: 'waiting',
                state: 'lobby'
            });
            document.getElementById('online-tools').style.display = 'block';
            document.getElementById('invite-link').innerText = window.location.origin + window.location.pathname + "?r=" + roomPath;
            onDisconnect(ref(db, `rooms/${roomPath}`)).remove();
        } else {
            myID = 'p2';
            update(ref(db, `rooms/${roomPath}`), { p2Status: 'ready' });
        }

        listenToArena();
    }

    function listenToArena() {
        onValue(ref(db, `rooms/${roomPath}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Start Countdown
            if (data.p1Status === 'ready' && data.p2Status === 'ready' && data.state === 'lobby') {
                beginCountdown();
            }

            // Reveal Moves
            if (data.p1Move && data.p2Move && !document.getElementById('view-result').classList.contains('active')) {
                finalizeResult(data.p1Move, data.p2Move, (myID === 'p1' ? 'You' : 'Friend'), (myID === 'p2' ? 'You' : 'Friend'));
            }

            // Sync Rematch
            if (data.state === 'rematch_reset') {
                fullReset();
            }
        });
    }

    function beginCountdown() {
        update(ref(db, `rooms/${roomPath}`), { state: 'starting' });
        document.getElementById('online-tools').style.display = 'none';
        document.getElementById('lobby-msg').innerText = "Arena Prepared";
        const counter = document.getElementById('countdown-display');
        counter.style.display = 'block';
        
        let sec = 3;
        const timer = setInterval(() => {
            sec--;
            counter.innerText = sec;
            if (sec <= 0) {
                clearInterval(timer);
                navigate('view-game');
                setupGameUI('pvf');
            }
        }, 1000);
    }

    window.triggerRematch = () => {
        if (activeMode === 'pvf') {
            update(ref(db, `rooms/${roomPath}`), {
                state: 'rematch_reset',
                p1Move: null,
                p2Move: null
            });
        } else {
            p1Move = null;
            p2Move = null;
            document.querySelectorAll('.player-box').forEach(b => b.classList.remove('locked'));
            navigate('view-game');
            setupGameUI(activeMode);
        }
    };

    function fullReset() {
        p1Move = null;
        p2Move = null;
        isLocked = false;
        document.getElementById('layout-single').style.opacity = '1';
        document.getElementById('game-instruction').innerText = "Choose Your Weapon";
        navigate('view-game');
        update(ref(db, `rooms/${roomPath}`), { state: 'playing' });
    }

    window.copyInvite = () => {
        navigator.clipboard.writeText(document.getElementById('invite-link').innerText);
        alert('Arena Link Copied!');
    };

    // Auto-launch if URL has Room ID
    if (window.location.search.includes('r=')) {
        launchMode('pvf');
    }

</script>
</body>
</html>
