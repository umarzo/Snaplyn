<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golex - Realtime Chat</title>
  <style>
    :root {
      --primary: #4F46E5;
      --bg-glass: rgba(20, 20, 25, 0.7);
      --border-glass: rgba(255, 255, 255, 0.1);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #050505; color: var(--text-main); overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
    
    /* Three.js Canvas Background */
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

    /* UI Containers */
    .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .active-screen { display: flex; justify-content: center; align-items: center; }
    
    .glass-panel {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Typography & Buttons */
    h1 { margin-bottom: 20px; font-size: 2.5rem; letter-spacing: 1px; }
    h2 { margin-bottom: 10px; font-weight: 500; }
    p { color: var(--text-muted); margin-bottom: 20px; }
    
    button {
      background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px;
      font-size: 1rem; cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #4338ca; }
    button:active { transform: scale(0.98); }
    
    input[type="text"] {
      width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-glass);
      background: rgba(0,0,0,0.3); color: white; font-size: 1rem; outline: none;
    }
    input[type="text"]:focus { border-color: var(--primary); }

    /* Main Chat Layout */
    #chat-screen {
      display: none; width: 95vw; height: 90vh; max-width: 1200px;
      background: var(--bg-glass); backdrop-filter: blur(16px); border: 1px solid var(--border-glass);
      border-radius: 16px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    #chat-screen.active-screen { display: flex; }

    .sidebar { width: 300px; border-right: 1px solid var(--border-glass); display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border-glass); display: flex; justify-content: space-between; align-items: center;}
    .user-list { flex: 1; overflow-y: auto; padding: 10px; }
    .user-card {
      display: flex; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 8px;
      cursor: pointer; transition: background 0.2s;
    }
    .user-card:hover { background: rgba(255,255,255,0.05); }
    .user-card.active { background: rgba(79, 70, 229, 0.3); border: 1px solid rgba(79, 70, 229, 0.5); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; margin-right: 15px; object-fit: cover;}

    .chat-area { flex: 1; display: flex; flex-direction: column; position: relative;}
    .chat-header { padding: 20px; border-bottom: 1px solid var(--border-glass); background: rgba(0,0,0,0.2); font-weight: bold; font-size: 1.2rem;}
    .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    
    .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; }
    .msg.received { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.sent { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }

    .chat-input-container { padding: 20px; border-top: 1px solid var(--border-glass); display: flex; gap: 10px; background: rgba(0,0,0,0.2); }
    .chat-input-container input { margin-bottom: 0; flex: 1; }
    
    .hidden { display: none !important; }
    #error-msg { color: #ef4444; font-size: 0.9rem; margin-bottom: 10px; min-height: 20px;}

    @media (max-width: 768px) {
      .sidebar { width: 80px; }
      .sidebar-header h2, .user-card span { display: none; }
      .avatar { margin-right: 0; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="login-screen" class="screen active-screen">
    <div class="glass-panel">
      <h1>Golex</h1>
      <p>Next-gen real-time communication.</p>
      <button id="btn-login">Sign in with Google</button>
    </div>
  </div>

  <div id="username-screen" class="screen">
    <div class="glass-panel">
      <h2>Choose your Username</h2>
      <p>This will be your unique identity on Golex.</p>
      <input type="text" id="username-input" placeholder="e.g. coolcoder99" autocomplete="off">
      <div id="error-msg"></div>
      <button id="btn-save-username">Continue</button>
    </div>
  </div>

  <div id="chat-screen" class="screen">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Chats</h2>
        <button id="btn-logout" style="padding: 6px 12px; font-size: 0.8rem; background: transparent; border: 1px solid var(--border-glass);">Log Out</button>
      </div>
      <div class="user-list" id="user-list">
        </div>
    </div>
    
    <div class="chat-area">
      <div class="chat-header" id="chat-header">Select a user to start chatting</div>
      <div class="messages" id="messages-container">
        </div>
      <div class="chat-input-container">
        <input type="text" id="msg-input" placeholder="Type a message..." disabled>
        <button id="btn-send" disabled>Send</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';
    
    const canvas = document.getElementById('bg-canvas');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.002);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    // Subtle particle geometry
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 1500;
    const posArray = new Float32Array(particlesCount * 3);
    for(let i = 0; i < particlesCount * 3; i++) {
      posArray[i] = (Math.random() - 0.5) * 20;
    }
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

    const material = new THREE.PointsMaterial({ size: 0.02, color: 0x4F46E5, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
    const particlesMesh = new THREE.Points(particlesGeometry, material);
    scene.add(particlesMesh);

    camera.position.z = 5;

    let mouseX = 0;
    let mouseY = 0;
    document.addEventListener('mousemove', (event) => {
      mouseX = event.clientX / window.innerWidth - 0.5;
      mouseY = event.clientY / window.innerHeight - 0.5;
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const elapsedTime = clock.getElapsedTime();
      
      particlesMesh.rotation.y = elapsedTime * 0.05;
      particlesMesh.rotation.x = elapsedTime * 0.02;
      
      // Subtle parallax
      camera.position.x += (mouseX * 0.5 - camera.position.x) * 0.05;
      camera.position.y += (-mouseY * 0.5 - camera.position.y) * 0.05;
      camera.lookAt(scene.position);
      
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getDatabase, ref, get, set, onValue, push, serverTimestamp, off } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // Your integrated Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAgGR7O4_joDiTYB8RmXVvzY-a8TVez620",
      authDomain: "golex-e07de.firebaseapp.com",
      databaseURL: "https://golex-e07de-default-rtdb.firebaseio.com",
      projectId: "golex-e07de",
      storageBucket: "golex-e07de.firebasestorage.app",
      messagingSenderId: "1029447864424",
      appId: "1:1029447864424:web:90ef368d6ce032fe122bdd"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // DOM Elements
    const screens = {
      login: document.getElementById('login-screen'),
      username: document.getElementById('username-screen'),
      chat: document.getElementById('chat-screen')
    };
    const errorMsg = document.getElementById('error-msg');
    let currentUser = null;
    let currentChatId = null;
    let currentChatListener = null;

    // --- Navigation Logic ---
    function showScreen(screenName) {
      Object.values(screens).forEach(s => s.classList.remove('active-screen'));
      screens[screenName].classList.add('active-screen');
    }

    // --- Authentication Logic ---
    document.getElementById('btn-login').addEventListener('click', () => {
      signInWithPopup(auth, provider).catch(err => console.error("Login failed:", err));
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      signOut(auth).then(() => showScreen('login'));
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        // Check if user has a profile in RTDB
        const userRef = ref(db, `users/${user.uid}`);
        
        try {
          const snapshot = await get(userRef);
          if (snapshot.exists()) {
            // Profile exists, update presence and go to chat
            set(ref(db, `users/${user.uid}/lastActive`), serverTimestamp());
            initChatApp();
          } else {
            // New user, ask for username
            showScreen('username');
          }
        } catch (error) {
          console.error("Error fetching user data:", error);
          // If security rules block read, ensure they are set up correctly in Firebase Console
        }
      } else {
        currentUser = null;
        showScreen('login');
      }
    });

    // --- Username Setup Logic ---
    document.getElementById('btn-save-username').addEventListener('click', async () => {
      const input = document.getElementById('username-input').value.trim().toLowerCase();
      const validRegex = /^[a-z0-9_]{3,15}$/;
      
      if (!validRegex.test(input)) {
        errorMsg.innerText = "Username must be 3-15 chars (letters, numbers, underscores).";
        return;
      }

      const usernameRef = ref(db, `usernames/${input}`);
      try {
        const snapshot = await get(usernameRef);

        if (snapshot.exists()) {
          errorMsg.innerText = "Username already taken. Try another.";
        } else {
          errorMsg.innerText = "";
          // Reserve username and create user profile
          await set(usernameRef, currentUser.uid);
          await set(ref(db, `users/${currentUser.uid}`), {
            uid: currentUser.uid,
            email: currentUser.email,
            displayName: currentUser.displayName,
            username: input,
            photoURL: currentUser.photoURL || 'https://via.placeholder.com/40',
            createdAt: serverTimestamp(),
            lastActive: serverTimestamp()
          });
          initChatApp();
        }
      } catch (error) {
        console.error("Error setting username:", error);
        errorMsg.innerText = "Database error. Check your Firebase security rules.";
      }
    });

    // --- Main Chat Logic ---
    function initChatApp() {
      showScreen('chat');
      loadUsers();
    }

    function loadUsers() {
      const usersRef = ref(db, 'users');
      onValue(usersRef, (snapshot) => {
        const userListDiv = document.getElementById('user-list');
        userListDiv.innerHTML = ''; // Clear current list
        
        snapshot.forEach((childSnapshot) => {
          const user = childSnapshot.val();
          // Don't show ourselves in the list
          if (user.uid !== currentUser.uid) {
            const userCard = document.createElement('div');
            userCard.className = 'user-card';
            userCard.id = `user-${user.uid}`;
            userCard.innerHTML = `
              <img src="${user.photoURL}" class="avatar" alt="avatar" onerror="this.src='https://via.placeholder.com/40'">
              <span>${user.displayName} (@${user.username})</span>
            `;
            userCard.onclick = () => openChat(user);
            userListDiv.appendChild(userCard);
          }
        });
      });
    }

    function openChat(targetUser) {
      // Highlight selected user in UI
      document.querySelectorAll('.user-card').forEach(el => el.classList.remove('active'));
      const activeCard = document.getElementById(`user-${targetUser.uid}`);
      if(activeCard) activeCard.classList.add('active');
      
      document.getElementById('chat-header').innerText = `Chatting with ${targetUser.displayName}`;
      document.getElementById('msg-input').disabled = false;
      document.getElementById('btn-send').disabled = false;

      // Generate unique chat ID alphabetically to ensure both users point to the same database node
      const uids = [currentUser.uid, targetUser.uid].sort();
      currentChatId = `${uids[0]}_${uids[1]}`;

      loadMessages(currentChatId);
    }

    function loadMessages(chatId) {
      const messagesContainer = document.getElementById('messages-container');
      messagesContainer.innerHTML = ''; // clear old messages
      
      // Detach previous listener if it exists to avoid memory leaks/duplicate messages
      if (currentChatListener) {
        off(currentChatListener);
      }

      currentChatListener = ref(db, `messages/${chatId}`);
      onValue(currentChatListener, (snapshot) => {
        messagesContainer.innerHTML = '';
        snapshot.forEach((child) => {
          const msg = child.val();
          const msgEl = document.createElement('div');
          const isMe = msg.senderId === currentUser.uid;
          msgEl.className = `msg ${isMe ? 'sent' : 'received'}`;
          msgEl.innerText = msg.text;
          messagesContainer.appendChild(msgEl);
        });
        // Auto-scroll to bottom of chat
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      });
    }

    // --- Message Sending Logic ---
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('btn-send');

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || !currentChatId) return;

      const newMsgRef = push(ref(db, `messages/${currentChatId}`));
      set(newMsgRef, {
        senderId: currentUser.uid,
        text: text,
        timestamp: serverTimestamp()
      });
      msgInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
