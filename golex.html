<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golex - Realtime Messaging</title>
    
    <style>
        :root {
            --primary: #4F46E5;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-dark: #333333;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            background-color: #0f172a;
            color: var(--text-light);
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
        }

        #app-container {
            position: relative;
            width: 95%;
            max-width: 450px;
            height: 90dvh; 
            max-height: 800px; 
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            justify-content: center; 
        }
        #user-list-screen, #chat-screen {
            justify-content: flex-start;
        }
        .screen.active { display: flex; }

        h1, h2, h3 { text-align: center; margin-bottom: 20px; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            width: 100%; 
        }
        button:hover { background-color: #4338ca; }
        
        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            width: 100%;
            box-sizing: border-box; 
        }

        /* NEW: Search Input specifically */
        #search-users-input {
            margin-bottom: 15px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* UPDATED: User List Styling */
        .user-item {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .user-item:hover { background: rgba(255,255,255,0.1); }
        
        .user-info-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }
        
        .user-name-wrapper {
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 15px;
        }

        /* NEW: Status Dot */
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
            background-color: #64748b; /* offline gray */
            transition: 0.3s;
            flex-shrink: 0;
        }
        .status-dot.online {
            background-color: #10b981; /* emerald green */
            box-shadow: 0 0 5px #10b981;
        }

        /* NEW: Last Message Preview */
        .last-message-preview {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #users-list { overflow-y: auto; flex-grow: 1; margin-bottom: 10px;}

        /* Chat Screen */
        #chat-header {
            display: flex;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }
        #back-btn { margin-top: 0; margin-right: 15px; padding: 8px 15px; width: auto; }
        
        #messages-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 14px;
            word-wrap: break-word;
        }
        .message.sent {
            background-color: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .message.received {
            background-color: rgba(255,255,255,0.1);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        /* NEW: Typing Indicator */
        #typing-indicator {
            font-size: 12px;
            color: #94a3b8;
            font-style: italic;
            height: 15px;
            margin-top: 5px;
            display: none; /* hidden by default */
        }

        #message-form {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        #message-input { flex-grow: 1; margin-bottom: 0; width: auto; }
        #send-btn { margin-top: 0; width: auto; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="app-container">
        
        <div id="loading-screen" class="screen active">
            <h2>Loading Golex...</h2>
            <p style="text-align: center; color: #cbd5e1;">Connecting to servers</p>
        </div>

        <div id="login-screen" class="screen">
            <h1>Welcome to Golex</h1>
            <p style="text-align: center; color: #cbd5e1;">A real-time communication platform.</p>
            <button id="google-login-btn" style="margin-top: 30px;">Sign in with Google</button>
        </div>

        <div id="username-screen" class="screen">
            <h2>Pick a Username</h2>
            <p style="font-size: 14px; color: #cbd5e1; text-align: center;">This is how others will see you.</p>
            <input type="text" id="username-input" placeholder="e.g. web_ninja">
            <p id="username-error" style="color: #ef4444; font-size: 12px; display: none; text-align: center;">Username is taken!</p>
            <button id="save-username-btn">Continue</button>
            <button id="cancel-username-btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); margin-top: 20px;">Log out & Try Another Account</button>
        </div>

        <div id="user-list-screen" class="screen">
            <h2>Golex Directory</h2>
            <input type="text" id="search-users-input" placeholder="Search users...">
            <div id="users-list">
                </div>
            <button id="logout-btn" style="background: #ef4444;">Log Out</button>
        </div>

        <div id="chat-screen" class="screen">
            <div id="chat-header">
                <button id="back-btn">⬅ Back</button>
                <div class="status-dot" id="chat-header-status"></div>
                <h3 id="chat-partner-name" style="margin: 0;">Loading...</h3>
            </div>
            <div id="messages-container">
                </div>
            <div id="typing-indicator">User is typing...</div>
            
            <form id="message-form">
                <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </form>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for ( let i = 0; i < 2000; i ++ ) {
            vertices.push( THREE.MathUtils.randFloatSpread( 2000 ) );
            vertices.push( THREE.MathUtils.randFloatSpread( 2000 ) );
            vertices.push( THREE.MathUtils.randFloatSpread( 2000 ) );
        }
        geometry.setAttribute( 'position', new THREE.Float32BufferAttribute( vertices, 3 ) );
        const material = new THREE.PointsMaterial({ color: 0x4F46E5, size: 2.5, transparent: true, opacity: 0.6 });
        const particles = new THREE.Points( geometry, material );
        scene.add( particles );

        camera.position.z = 500;

        function animate() {
            requestAnimationFrame( animate );
            particles.rotation.x += 0.0005;
            particles.rotation.y += 0.0005;
            renderer.render( scene, camera );
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <script type="module">
        // NEW: Imported onDisconnect
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, get, set, onValue, push, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAqrHPZxtvIlMrF6O3AIeWPRWdG-mkKKI",
            authDomain: "golex-51625.firebaseapp.com",
            databaseURL: "https://golex-51625-default-rtdb.firebaseio.com", 
            projectId: "golex-51625",
            storageBucket: "golex-51625.firebasestorage.app",
            messagingSenderId: "526349915922",
            appId: "1:526349915922:web:0e8968d99f9dd423b345cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // State Variables
        let currentUser = null;
        let currentChatId = null;
        let currentChatPartnerId = null;
        
        // Safety: Store unsubscribe functions so we don't leak memory
        let unsubMessages = null;
        let unsubTyping = null;
        let unsubPartnerStatus = null;
        let typingTimeout = null;

        // UI Elements
        const screens = document.querySelectorAll('.screen');
        const loginBtn = document.getElementById('google-login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const cancelUsernameBtn = document.getElementById('cancel-username-btn');
        const saveUsernameBtn = document.getElementById('save-username-btn');
        const usernameInput = document.getElementById('username-input');
        const usernameError = document.getElementById('username-error');
        
        const usersListDiv = document.getElementById('users-list');
        const searchUsersInput = document.getElementById('search-users-input'); // NEW
        
        const backBtn = document.getElementById('back-btn');
        const chatHeaderStatus = document.getElementById('chat-header-status'); // NEW
        const chatPartnerNameEl = document.getElementById('chat-partner-name');
        const messagesContainer = document.getElementById('messages-container');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const typingIndicator = document.getElementById('typing-indicator'); // NEW

        function showScreen(screenId) {
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- FEATURE A: Manage Online/Offline Presence ---
        function managePresence(uid) {
            const myStatusRef = ref(db, `users/${uid}/status`);
            const connectedRef = ref(db, '.info/connected');
            
            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    // If we disconnect, set status to offline
                    onDisconnect(myStatusRef).set('offline').then(() => {
                        // Once disconnected logic is queued, set ourselves to online
                        set(myStatusRef, 'online');
                    });
                }
            });
        }

        // 1. Authentication Listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);
                
                if (snapshot.exists() && snapshot.val().username) {
                    managePresence(user.uid); // Track presence
                    loadUsersList();
                    showScreen('user-list-screen');
                } else {
                    showScreen('username-screen');
                }
            } else {
                currentUser = null;
                showScreen('login-screen'); 
            }
        });

        // 2. Login & Logout Logic
        loginBtn.addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(error => alert("Login failed: " + error.message));
        });

        async function performLogout() {
            if (currentUser) {
                // Manually set offline before logging out
                await set(ref(db, `users/${currentUser.uid}/status`), 'offline');
            }
            signOut(auth);
        }

        logoutBtn.addEventListener('click', performLogout);
        cancelUsernameBtn.addEventListener('click', performLogout);

        // 3. Username Selection
        saveUsernameBtn.addEventListener('click', async () => {
            const desiredName = usernameInput.value.trim().toLowerCase();
            if (desiredName.length < 3) return alert("Username too short!");

            const usernameRef = ref(db, 'usernames/' + desiredName);
            const snapshot = await get(usernameRef);

            if (snapshot.exists()) {
                usernameError.style.display = 'block'; 
            } else {
                usernameError.style.display = 'none';
                
                await set(usernameRef, currentUser.uid);
                await set(ref(db, 'users/' + currentUser.uid), {
                    username: desiredName,
                    email: currentUser.email,
                    status: 'online'
                });

                managePresence(currentUser.uid);
                loadUsersList();
                showScreen('user-list-screen');
            }
        });

        // --- FEATURE D: Search Users Logic ---
        searchUsersInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const allItems = document.querySelectorAll('.user-item');
            
            allItems.forEach(item => {
                const username = item.getAttribute('data-username');
                if (username.includes(searchTerm)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        // 4. Load Users List (Safely updating without flickering)
        function loadUsersList() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    for (const [uid, userData] of Object.entries(data)) {
                        if (uid === currentUser.uid) continue; // Skip self

                        let userDiv = document.getElementById(`user-${uid}`);
                        
                        // If element doesn't exist, create it cleanly
                        if (!userDiv) {
                            userDiv = document.createElement('div');
                            userDiv.className = 'user-item';
                            userDiv.id = `user-${uid}`;
                            userDiv.setAttribute('data-username', userData.username);
                            
                            userDiv.innerHTML = `
                                <div class="status-dot"></div>
                                <div class="user-info-container">
                                    <div class="user-name-wrapper">@${userData.username}</div>
                                    <div class="last-message-preview" id="preview-${uid}">No messages yet</div>
                                </div>
                            `;
                            
                            userDiv.addEventListener('click', () => {
                                openChat(uid, userData.username);
                            });
                            
                            usersListDiv.appendChild(userDiv);

                            // --- FEATURE B: Last Message Listener ---
                            // Create the chat ID just to read the last message
                            const previewChatId = currentUser.uid < uid ? `${currentUser.uid}_${uid}` : `${uid}_${currentUser.uid}`;
                            const lastMsgRef = ref(db, `chats/${previewChatId}/lastMessage`);
                            
                            onValue(lastMsgRef, (msgSnap) => {
                                const previewEl = document.getElementById(`preview-${uid}`);
                                if (previewEl) {
                                    previewEl.innerText = msgSnap.val() || 'No messages yet';
                                }
                            });
                        }

                        // Update the online/offline dot safely
                        const statusDot = userDiv.querySelector('.status-dot');
                        if (userData.status === 'online') {
                            statusDot.classList.add('online');
                            statusDot.classList.remove('offline');
                        } else {
                            statusDot.classList.add('offline');
                            statusDot.classList.remove('online');
                        }
                        
                        // Keep search filter applied if user is typing a search
                        const searchTerm = searchUsersInput.value.toLowerCase();
                        if (searchTerm && !userData.username.includes(searchTerm)) {
                            userDiv.style.display = 'none';
                        }
                    }
                }
            });
        }

        // 5. Open Chat
        function openChat(partnerUid, partnerUsername) {
            currentChatPartnerId = partnerUid;
            chatPartnerNameEl.innerText = "@" + partnerUsername;
            
            if (currentUser.uid < partnerUid) {
                currentChatId = currentUser.uid + '_' + partnerUid;
            } else {
                currentChatId = partnerUid + '_' + currentUser.uid;
            }

            messagesContainer.innerHTML = ''; 
            typingIndicator.style.display = 'none'; // reset
            showScreen('chat-screen');

            // Listen for Partner's Status in Header
            const partnerStatusRef = ref(db, `users/${partnerUid}/status`);
            unsubPartnerStatus = onValue(partnerStatusRef, (snap) => {
                if(snap.val() === 'online') {
                    chatHeaderStatus.classList.add('online');
                    chatHeaderStatus.classList.remove('offline');
                } else {
                    chatHeaderStatus.classList.add('offline');
                    chatHeaderStatus.classList.remove('online');
                }
            });

            // Listen for Messages
            const messagesRef = ref(db, `chats/${currentChatId}/messages`);
            unsubMessages = onValue(messagesRef, (snapshot) => {
                messagesContainer.innerHTML = '';
                const messages = snapshot.val();
                if (messages) {
                    for (const [msgId, msgData] of Object.entries(messages)) {
                        const msgDiv = document.createElement('div');
                        const isMe = msgData.sender === currentUser.uid;
                        
                        msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
                        msgDiv.innerText = msgData.text;
                        messagesContainer.appendChild(msgDiv);
                    }
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
            });

            // --- FEATURE C: Listen for Partner Typing ---
            const partnerTypingRef = ref(db, `chats/${currentChatId}/typing/${partnerUid}`);
            unsubTyping = onValue(partnerTypingRef, (snap) => {
                if (snap.val() === true) {
                    typingIndicator.style.display = 'block';
                    typingIndicator.innerText = `@${partnerUsername} is typing...`;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight; // push scroll down
                } else {
                    typingIndicator.style.display = 'none';
                }
            });
        }

        // Back Button Logic with Cleanup
        backBtn.addEventListener('click', () => {
            // Clean up realtime listeners so we don't leak memory
            if (unsubMessages) unsubMessages();
            if (unsubTyping) unsubTyping();
            if (unsubPartnerStatus) unsubPartnerStatus();
            
            // Set our own typing status to false when leaving
            if (currentChatId) {
                set(ref(db, `chats/${currentChatId}/typing/${currentUser.uid}`), false);
            }

            currentChatId = null;
            currentChatPartnerId = null;
            showScreen('user-list-screen');
        });

        // --- FEATURE C: Send typing status when input changes ---
        messageInput.addEventListener('input', () => {
            if (!currentChatId) return;
            
            const myTypingRef = ref(db, `chats/${currentChatId}/typing/${currentUser.uid}`);
            set(myTypingRef, true); // I am typing!

            // Auto-clear after 1.5 seconds of no keys pressed
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                set(myTypingRef, false);
            }, 1500);
        });

        // 6. Send Message
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (text === '' || !currentChatId) return;

            // Clear typing indicator immediately on send
            clearTimeout(typingTimeout);
            await set(ref(db, `chats/${currentChatId}/typing/${currentUser.uid}`), false);

            const messagesRef = ref(db, `chats/${currentChatId}/messages`);
            
            // Send the message
            await push(messagesRef, {
                sender: currentUser.uid,
                text: text,
                timestamp: serverTimestamp()
            });

            // --- FEATURE B: Update Last Message Preview ---
            await set(ref(db, `chats/${currentChatId}/lastMessage`), text);

            messageInput.value = ''; 
        });

    </script>
</body>
</html>
