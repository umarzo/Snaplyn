<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golex - Realtime Messaging</title>
    
    <style>
        :root {
            --primary: #4F46E5;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --text-light: #ffffff;
            --text-dark: #333333;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            background-color: #0f172a;
            color: var(--text-light);
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; 
        }

        #app-container {
            position: relative;
            width: 95%;
            max-width: 450px;
            height: 90dvh; 
            max-height: 800px; 
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            justify-content: center; 
        }
        #user-list-screen, #chat-screen { justify-content: flex-start; }
        .screen.active { display: flex; }

        h1, h2, h3 { text-align: center; margin-bottom: 20px; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            width: 100%; 
        }
        button:hover { background-color: #4338ca; }
        
        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            width: 100%;
            box-sizing: border-box; 
        }

        /* --- NEW: Loading Bar Styles --- */
        .loading-bar-wrapper {
            width: 80%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 15px auto 0;
            overflow: hidden;
            position: relative;
        }
        .loading-bar {
            width: 50%;
            height: 100%;
            background: var(--primary);
            position: absolute;
            left: -50%;
            border-radius: 4px;
            animation: slide 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px var(--primary);
        }
        @keyframes slide {
            0% { left: -50%; }
            100% { left: 100%; }
        }

        /* --- NEW: Directory Header & Profile Icon --- */
        .directory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .directory-header h2 { margin: 0; }
        #profile-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.1);
            border: 2px solid var(--primary);
            cursor: pointer;
            object-fit: cover;
            transition: 0.2s;
        }
        #profile-icon-btn:hover { transform: scale(1.05); }

        /* --- NEW: Profile Modal --- */
        #profile-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 30px 20px;
            box-sizing: border-box;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        #profile-modal.open {
            display: flex;
            transform: translateY(0);
        }
        #modal-close-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            width: auto;
            align-self: flex-end;
            padding: 8px 12px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .modal-avatar {
            width: 80px; height: 80px;
            border-radius: 50%; margin: 0 auto 15px;
            object-fit: cover; border: 2px solid var(--primary);
        }
        .modal-email { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 25px; margin-top: -10px;}

        #search-users-input {
            margin-bottom: 15px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-item {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .user-item:hover { background: rgba(255,255,255,0.1); }
        
        .user-info-container {
            display: flex; flex-direction: column; flex-grow: 1; overflow: hidden;
        }
        .user-name-wrapper { display: flex; align-items: center; font-weight: bold; font-size: 15px; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; margin-right: 10px;
            background-color: #64748b; transition: 0.3s; flex-shrink: 0;
        }
        .status-dot.online { background-color: #10b981; box-shadow: 0 0 5px #10b981; }
        .last-message-preview {
            font-size: 13px; color: #94a3b8; margin-top: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        #users-list { overflow-y: auto; flex-grow: 1; margin-bottom: 10px;}

        #chat-header {
            display: flex; align-items: center; padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px;
        }
        #back-btn { margin-top: 0; margin-right: 15px; padding: 8px 15px; width: auto; }
        
        #messages-container {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;
            gap: 10px; padding-right: 5px;
        }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; word-wrap: break-word; }
        .message.sent { background-color: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.received { background-color: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 2px; }

        #typing-indicator { font-size: 12px; color: #94a3b8; font-style: italic; height: 15px; margin-top: 5px; display: none; }
        #message-form { display: flex; gap: 10px; margin-top: 10px; }
        #message-input { flex-grow: 1; margin-bottom: 0; width: auto; }
        #send-btn { margin-top: 0; width: auto; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="app-container">
        
        <div id="loading-screen" class="screen active">
            <h2>Loading Golex...</h2>
            <p style="text-align: center; color: #cbd5e1; margin-bottom: 0;">Connecting to servers</p>
            <div class="loading-bar-wrapper">
                <div class="loading-bar"></div>
            </div>
        </div>

        <div id="login-screen" class="screen">
            <h1>Welcome to Golex</h1>
            <p style="text-align: center; color: #cbd5e1;">A real-time communication platform.</p>
            <button id="google-login-btn" style="margin-top: 30px;">Sign in with Google</button>
        </div>

        <div id="username-screen" class="screen">
            <h2>Pick a Username</h2>
            <p style="font-size: 14px; color: #cbd5e1; text-align: center;">This is how others will see you.</p>
            <input type="text" id="username-input" placeholder="e.g. web_ninja">
            <p id="username-error" style="color: #ef4444; font-size: 12px; display: none; text-align: center;">Username is taken!</p>
            <button id="save-username-btn">Continue</button>
            <button id="cancel-username-btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); margin-top: 20px;">Log out & Try Another Account</button>
        </div>

        <div id="user-list-screen" class="screen">
            <div class="directory-header">
                <h2>Golex Directory</h2>
                <img id="profile-icon-btn" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Profile">
            </div>
            
            <input type="text" id="search-users-input" placeholder="Search users...">
            <div id="users-list"></div>
        </div>

        <div id="chat-screen" class="screen">
            <div id="chat-header">
                <button id="back-btn">⬅ Back</button>
                <div class="status-dot" id="chat-header-status"></div>
                <h3 id="chat-partner-name" style="margin: 0;">Loading...</h3>
            </div>
            <div id="messages-container"></div>
            <div id="typing-indicator">User is typing...</div>
            <form id="message-form">
                <input type="text" id="message-input" placeholder="Type a message..." required autocomplete="off">
                <button type="submit" id="send-btn">Send</button>
            </form>
        </div>

        <div id="profile-modal">
            <button id="modal-close-btn">✕ Close</button>
            <h2>Your Profile</h2>
            <img id="modal-avatar" class="modal-avatar" src="" alt="Avatar">
            <div id="modal-email" class="modal-email">user@email.com</div>
            
            <label style="font-size: 14px; color: #cbd5e1; margin-bottom: 5px;">Change Username</label>
            <input type="text" id="modal-username-input" placeholder="New username">
            <p id="modal-username-error" style="color: #ef4444; font-size: 12px; display: none; text-align: center; margin-top: -10px;">Username is taken!</p>
            <button id="modal-save-username-btn">Save Changes</button>
            
            <button id="logout-btn" style="background: #ef4444; margin-top: 30px;">Log Out</button>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for ( let i = 0; i < 2000; i ++ ) {
            vertices.push( THREE.MathUtils.randFloatSpread( 2000 ) );
            vertices.push( THREE.MathUtils.randFloatSpread( 2000 ) );
            vertices.push( THREE.MathUtils.randFloatSpread( 2000 ) );
        }
        geometry.setAttribute( 'position', new THREE.Float32BufferAttribute( vertices, 3 ) );
        const material = new THREE.PointsMaterial({ color: 0x4F46E5, size: 2.5, transparent: true, opacity: 0.6 });
        const particles = new THREE.Points( geometry, material );
        scene.add( particles );
        camera.position.z = 500;

        function animate() {
            requestAnimationFrame( animate );
            particles.rotation.x += 0.0005;
            particles.rotation.y += 0.0005;
            renderer.render( scene, camera );
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, get, set, remove, onValue, push, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAqrHPZxtvIlMrF6O3AIeWPRWdG-mkKKI",
            authDomain: "golex-51625.firebaseapp.com",
            databaseURL: "https://golex-51625-default-rtdb.firebaseio.com", 
            projectId: "golex-51625",
            storageBucket: "golex-51625.firebasestorage.app",
            messagingSenderId: "526349915922",
            appId: "1:526349915922:web:0e8968d99f9dd423b345cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // State Variables
        let currentUser = null;
        let currentUsername = ""; // Track for profile updates
        let currentChatId = null;
        let currentChatPartnerId = null;
        
        let unsubMessages = null;
        let unsubTyping = null;
        let unsubPartnerStatus = null;
        let typingTimeout = null;

        // UI Elements
        const screens = document.querySelectorAll('.screen');
        const loginBtn = document.getElementById('google-login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const cancelUsernameBtn = document.getElementById('cancel-username-btn');
        const saveUsernameBtn = document.getElementById('save-username-btn');
        const usernameInput = document.getElementById('username-input');
        const usernameError = document.getElementById('username-error');
        
        const usersListDiv = document.getElementById('users-list');
        const searchUsersInput = document.getElementById('search-users-input'); 
        
        // Profile UI Elements
        const profileIconBtn = document.getElementById('profile-icon-btn');
        const profileModal = document.getElementById('profile-modal');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const modalAvatar = document.getElementById('modal-avatar');
        const modalEmail = document.getElementById('modal-email');
        const modalUsernameInput = document.getElementById('modal-username-input');
        const modalUsernameError = document.getElementById('modal-username-error');
        const modalSaveBtn = document.getElementById('modal-save-username-btn');

        const backBtn = document.getElementById('back-btn');
        const chatHeaderStatus = document.getElementById('chat-header-status'); 
        const chatPartnerNameEl = document.getElementById('chat-partner-name');
        const messagesContainer = document.getElementById('messages-container');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const typingIndicator = document.getElementById('typing-indicator'); 

        function showScreen(screenId) {
            screens.forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- Presence ---
        function managePresence(uid) {
            const myStatusRef = ref(db, `users/${uid}/status`);
            const connectedRef = ref(db, '.info/connected');
            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    onDisconnect(myStatusRef).set('offline').then(() => {
                        set(myStatusRef, 'online');
                    });
                }
            });
        }

        // 1. Auth Listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);
                
                if (snapshot.exists() && snapshot.val().username) {
                    currentUsername = snapshot.val().username;
                    // Setup profile icon image
                    const photo = user.photoURL || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + user.uid;
                    profileIconBtn.src = photo;
                    modalAvatar.src = photo;
                    modalEmail.innerText = user.email;

                    managePresence(user.uid);
                    loadUsersList();
                    showScreen('user-list-screen');
                } else {
                    showScreen('username-screen');
                }
            } else {
                currentUser = null;
                showScreen('login-screen'); 
            }
        });

        // 2. Login & Logout
        loginBtn.addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(error => alert("Login failed: " + error.message));
        });

        async function performLogout() {
            if (currentUser) {
                await set(ref(db, `users/${currentUser.uid}/status`), 'offline');
            }
            signOut(auth);
            profileModal.classList.remove('open');
        }
        logoutBtn.addEventListener('click', performLogout);
        cancelUsernameBtn.addEventListener('click', performLogout);

        // 3. Initial Username Selection
        saveUsernameBtn.addEventListener('click', async () => {
            const desiredName = usernameInput.value.trim().toLowerCase();
            if (desiredName.length < 3) return alert("Username too short!");

            const usernameRef = ref(db, 'usernames/' + desiredName);
            const snapshot = await get(usernameRef);

            if (snapshot.exists()) {
                usernameError.style.display = 'block'; 
            } else {
                usernameError.style.display = 'none';
                await set(usernameRef, currentUser.uid);
                await set(ref(db, 'users/' + currentUser.uid), {
                    username: desiredName,
                    email: currentUser.email,
                    status: 'online'
                });

                currentUsername = desiredName;
                managePresence(currentUser.uid);
                loadUsersList();
                showScreen('user-list-screen');
            }
        });

        // --- NEW: Profile Modal Logic ---
        profileIconBtn.addEventListener('click', () => {
            modalUsernameInput.value = currentUsername;
            modalUsernameError.style.display = 'none';
            profileModal.classList.add('open');
        });

        modalCloseBtn.addEventListener('click', () => {
            profileModal.classList.remove('open');
        });

        modalSaveBtn.addEventListener('click', async () => {
            const newName = modalUsernameInput.value.trim().toLowerCase();
            if (newName.length < 3) return alert("Username too short!");
            if (newName === currentUsername) {
                profileModal.classList.remove('open'); // No change made
                return;
            }

            modalSaveBtn.innerText = "Checking...";
            const usernameRef = ref(db, 'usernames/' + newName);
            const snapshot = await get(usernameRef);

            if (snapshot.exists()) {
                modalUsernameError.style.display = 'block';
                modalSaveBtn.innerText = "Save Changes";
            } else {
                modalUsernameError.style.display = 'none';
                // 1. Delete old username lock
                await remove(ref(db, 'usernames/' + currentUsername));
                // 2. Claim new username
                await set(usernameRef, currentUser.uid);
                // 3. Update User profile
                await set(ref(db, 'users/' + currentUser.uid + '/username'), newName);
                
                currentUsername = newName;
                modalSaveBtn.innerText = "Saved!";
                setTimeout(() => {
                    profileModal.classList.remove('open');
                    modalSaveBtn.innerText = "Save Changes";
                }, 1000);
            }
        });

        // --- FEATURE B: Sorting Logic ---
        function sortUserList() {
            const list = document.getElementById('users-list');
            const items = Array.from(list.children);
            
            items.sort((a, b) => {
                const timeA = parseInt(a.getAttribute('data-timestamp')) || 0;
                const timeB = parseInt(b.getAttribute('data-timestamp')) || 0;
                return timeB - timeA; // Descending (newest first)
            });
            
            // Append moves them to the new order without destroying DOM
            items.forEach(item => list.appendChild(item));
        }

        // Search Users
        searchUsersInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const allItems = document.querySelectorAll('.user-item');
            allItems.forEach(item => {
                const username = item.getAttribute('data-username');
                if (username.includes(searchTerm)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        });

        // 4. Load Users List
        function loadUsersList() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const data = snapshot.val();
                
                if (data) {
                    for (const [uid, userData] of Object.entries(data)) {
                        if (uid === currentUser.uid) continue;

                        let userDiv = document.getElementById(`user-${uid}`);
                        
                        if (!userDiv) {
                            userDiv = document.createElement('div');
                            userDiv.className = 'user-item';
                            userDiv.id = `user-${uid}`;
                            userDiv.setAttribute('data-timestamp', 0); // Default for sorting
                            
                            userDiv.innerHTML = `
                                <div class="status-dot"></div>
                                <div class="user-info-container">
                                    <div class="user-name-wrapper">@<span class="uname-text">${userData.username}</span></div>
                                    <div class="last-message-preview" id="preview-${uid}">No messages yet</div>
                                </div>
                            `;
                            
                            userDiv.addEventListener('click', () => {
                                openChat(uid, userData.username);
                            });
                            
                            usersListDiv.appendChild(userDiv);

                            // Last Message & Timestamp Listener
                            const previewChatId = currentUser.uid < uid ? `${currentUser.uid}_${uid}` : `${uid}_${currentUser.uid}`;
                            const lastMsgRef = ref(db, `chats/${previewChatId}/lastMessage`);
                            
                            onValue(lastMsgRef, (msgSnap) => {
                                const previewEl = document.getElementById(`preview-${uid}`);
                                const msgData = msgSnap.val();
                                
                                if (msgData) {
                                    // Handle both old string format and new object format safely
                                    if (typeof msgData === 'string') {
                                        if(previewEl) previewEl.innerText = msgData;
                                    } else {
                                        if(previewEl) previewEl.innerText = msgData.text;
                                        // Update timestamp attribute for sorting
                                        if(msgData.timestamp) {
                                            userDiv.setAttribute('data-timestamp', msgData.timestamp);
                                        }
                                    }
                                }
                                sortUserList(); // Reorder instantly
                            });
                        }

                        // Update username dynamically if they changed it
                        userDiv.setAttribute('data-username', userData.username);
                        userDiv.querySelector('.uname-text').innerText = userData.username;

                        // Update Status
                        const statusDot = userDiv.querySelector('.status-dot');
                        if (userData.status === 'online') {
                            statusDot.classList.add('online'); statusDot.classList.remove('offline');
                        } else {
                            statusDot.classList.add('offline'); statusDot.classList.remove('online');
                        }
                        
                        const searchTerm = searchUsersInput.value.toLowerCase();
                        if (searchTerm && !userData.username.includes(searchTerm)) {
                            userDiv.style.display = 'none';
                        }
                    }
                }
            });
        }

        // 5. Open Chat
        function openChat(partnerUid, partnerUsername) {
            currentChatPartnerId = partnerUid;
            chatPartnerNameEl.innerText = "@" + partnerUsername;
            
            if (currentUser.uid < partnerUid) {
                currentChatId = currentUser.uid + '_' + partnerUid;
            } else {
                currentChatId = partnerUid + '_' + currentUser.uid;
            }

            messagesContainer.innerHTML = ''; 
            typingIndicator.style.display = 'none'; 
            showScreen('chat-screen');

            const partnerStatusRef = ref(db, `users/${partnerUid}/status`);
            unsubPartnerStatus = onValue(partnerStatusRef, (snap) => {
                if(snap.val() === 'online') {
                    chatHeaderStatus.classList.add('online'); chatHeaderStatus.classList.remove('offline');
                } else {
                    chatHeaderStatus.classList.add('offline'); chatHeaderStatus.classList.remove('online');
                }
            });

            const messagesRef = ref(db, `chats/${currentChatId}/messages`);
            unsubMessages = onValue(messagesRef, (snapshot) => {
                messagesContainer.innerHTML = '';
                const messages = snapshot.val();
                if (messages) {
                    for (const [msgId, msgData] of Object.entries(messages)) {
                        const msgDiv = document.createElement('div');
                        const isMe = msgData.sender === currentUser.uid;
                        
                        msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
                        msgDiv.innerText = msgData.text;
                        messagesContainer.appendChild(msgDiv);
                    }
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
            });

            const partnerTypingRef = ref(db, `chats/${currentChatId}/typing/${partnerUid}`);
            unsubTyping = onValue(partnerTypingRef, (snap) => {
                if (snap.val() === true) {
                    typingIndicator.style.display = 'block';
                    typingIndicator.innerText = `@${partnerUsername} is typing...`;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight; 
                } else {
                    typingIndicator.style.display = 'none';
                }
            });
        }

        backBtn.addEventListener('click', () => {
            if (unsubMessages) unsubMessages();
            if (unsubTyping) unsubTyping();
            if (unsubPartnerStatus) unsubPartnerStatus();
            
            if (currentChatId) {
                set(ref(db, `chats/${currentChatId}/typing/${currentUser.uid}`), false);
            }
            currentChatId = null; currentChatPartnerId = null;
            showScreen('user-list-screen');
        });

        messageInput.addEventListener('input', () => {
            if (!currentChatId) return;
            const myTypingRef = ref(db, `chats/${currentChatId}/typing/${currentUser.uid}`);
            set(myTypingRef, true); 
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { set(myTypingRef, false); }, 1500);
        });

        // 6. Send Message
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (text === '' || !currentChatId) return;

            clearTimeout(typingTimeout);
            await set(ref(db, `chats/${currentChatId}/typing/${currentUser.uid}`), false);

            const messagesRef = ref(db, `chats/${currentChatId}/messages`);
            
            await push(messagesRef, {
                sender: currentUser.uid,
                text: text,
                timestamp: serverTimestamp()
            });

            // UPDATED: Save as object with timestamp so we can sort by it
            await set(ref(db, `chats/${currentChatId}/lastMessage`), {
                text: text,
                timestamp: serverTimestamp()
            });

            messageInput.value = ''; 
        });

    </script>
</body>
</html>
