<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Forest Run 3D: Ultimate Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        /* --- CORE STYLES --- */
        body { margin: 0; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: #020205; user-select: none; -webkit-user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* --- UI LAYER --- */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; z-index: 5; }
        .hud-top { padding: 30px; display: flex; justify-content: space-between; align-items: flex-start; }
        
        #score-display { 
            color: white; font-size: 32px; font-weight: 900; letter-spacing: -1px;
            background: rgba(0, 0, 0, 0.4); padding: 10px 25px; border-radius: 8px; 
            border-left: 5px solid #ffcc00; backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* --- SCREENS (Menu, Lobby, etc) --- */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(10,10,15,0.85) 0%, rgba(0,0,0,0.98) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: auto; backdrop-filter: blur(10px);
            transition: opacity 0.4s ease, transform 0.4s ease; z-index: 10;
        }

        .hidden { opacity: 0; pointer-events: none !important; transform: scale(1.05); display: none !important; }

        h1 { color: white; font-size: clamp(3.5rem, 12vw, 7rem); margin: 0; text-transform: uppercase; font-style: italic; font-weight: 900; letter-spacing: -4px; line-height: 0.8; text-align: center; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sub-tag { color: #ffcc00; font-size: 0.9rem; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 8px; font-weight: 700; text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        
        .menu-v-stack { display: flex; flex-direction: column; gap: 18px; width: 320px; max-width: 90%; }

        button { 
            background: #fff; border: none; padding: 20px; font-size: 1.1rem; font-weight: 900; 
            color: #000; cursor: pointer; transition: 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-transform: uppercase; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            letter-spacing: 1px;
        }
        button:hover { background: #ffcc00; transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 20px rgba(255, 204, 0, 0.3); }
        button:active { transform: translateY(1px); }
        button.secondary { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        button.secondary:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
        button.highlight { background: linear-gradient(135deg, #ffcc00, #ff9900); border: none; color: black; }

        /* --- GARAGE --- */
        .garage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; width: 100%; max-width: 600px; padding: 0 20px; box-sizing: border-box;}
        .vehicle-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 25px 10px; cursor: pointer; text-align: center; transition: 0.3s; color: white; border-radius: 4px; display: flex; flex-direction: column; align-items: center; }
        .vehicle-card:hover { background: rgba(255,255,255,0.1); }
        .vehicle-card.active { border-color: #ffcc00; background: rgba(255, 204, 0, 0.15); box-shadow: 0 0 20px rgba(255,204,0,0.1); }
        .vehicle-card span { font-weight: 800; font-size: 0.8rem; letter-spacing: 1px; margin-top: 5px; }
        .vehicle-icon { font-size: 2rem; margin-bottom: 10px; display: block; }

        /* --- INPUTS & MISC --- */
        .input-group { display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 5px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); width: 100%; box-sizing: border-box; }
        input[type="text"] { background: transparent; border: none; color: white; flex-grow: 1; padding: 10px; font-family: 'Montserrat', sans-serif; font-weight: bold; outline: none; text-align: center; letter-spacing: 1px; }
        
        .controls-hint { position: absolute; bottom: 40px; font-size: 0.7rem; opacity: 0.6; color: white; letter-spacing: 3px; font-weight: 700; text-align: center; width: 100%; }
        
        /* --- GAME LABELS --- */
        .player-label { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: 900; pointer-events: none; transform: translate(-50%, -100%); white-space: nowrap; border: 1px solid #ffcc00; box-shadow: 0 0 10px #ffcc00; transition: opacity 0.2s; z-index: 2; }
        
        #countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 15rem; color: #ffcc00; font-weight: 900; text-shadow: 0 0 50px rgba(255, 204, 0, 0.8); pointer-events: none; display: none; z-index: 100; font-style: italic; }
        
        .loader-ring { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1); border-top: 5px solid #ffcc00; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 30px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* STATUS INDICATOR */
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; display: inline-block; margin-right: 8px; }
        .status-dot.online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/GammaCorrectionShader.js"></script>
</head>
<body>

    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-display">0000m</div>
        </div>
        <div id="countdown-overlay">3</div>
        <div id="label-local" class="player-label hidden">YOU</div>
        <div id="label-remote" class="player-label hidden">RIVAL</div>
    </div>

    <div id="start-screen" class="screen">
        <h1>FOREST<br>RUN</h1>
        <div class="sub-tag">ULTIMATE EDITION</div>
        <div class="menu-v-stack">
            <button id="start-btn">Solo Run</button>
            <button id="mp-menu-btn" class="highlight">Multiplayer</button>
            <button id="custom-btn" class="secondary">Garage</button>
        </div>
        <div class="controls-hint">USE ARROWS OR SWIPE TO DRIVE</div>
    </div>

    <div id="multiplayer-menu" class="screen hidden">
        <h1>ONLINE</h1>
        <div class="sub-tag">SELECT MODE</div>
        <div class="menu-v-stack">
            <button id="mp-random-btn">Quick Match</button>
            <button id="mp-friend-btn" class="highlight">Play with Friend</button>
            <button onclick="backToMain()" class="secondary">Back</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <h1 style="font-size: 4rem;">LOBBY</h1>
        <div class="sub-tag" id="lobby-status">CONNECTING...</div>
        
        <div class="loader-ring"></div>
        
        <div id="invite-area" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <p style="color: #aaa; font-size: 0.9rem;">SHARE THIS LINK TO INVITE:</p>
            <div class="input-group" style="max-width: 350px;">
                <input type="text" id="invite-link" readonly value="...">
                <button id="copy-btn" style="padding: 10px 20px; font-size: 0.9rem; clip-path: none; margin: 0;">COPY</button>
            </div>
        </div>

        <button onclick="cancelMatchmaking()" class="secondary" style="margin-top: 40px; width: 200px;">Cancel</button>
    </div>

    <div id="custom-screen" class="screen hidden">
        <h1>GARAGE</h1>
        <div class="sub-tag">CHOOSE YOUR RIDE</div>
        <div class="garage-grid">
            <div class="vehicle-card active" onclick="selectVehicle('car')">
                <span class="vehicle-icon">🏎️</span>
                <span>RACER</span>
            </div>
            <div class="vehicle-card" onclick="selectVehicle('bike')">
                <span class="vehicle-icon">🏍️</span>
                <span>CYBER BIKE</span>
            </div>
            <div class="vehicle-card" onclick="selectVehicle('truck')">
                <span class="vehicle-icon">🚚</span>
                <span>HEAVY</span>
            </div>
        </div>
        <button onclick="closeCustom()" class="secondary" style="width: 200px;">Back</button>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h1 id="go-title">CRASHED</h1>
        <p class="sub-tag" id="go-subtitle">DISTANCE: <span id="final-score" style="color:white;">0</span>M</p>
        <div class="menu-v-stack">
            <button id="restart-btn">Try Again</button>
            <button id="rematch-btn" class="hidden highlight">Rematch</button>
            <button onclick="backToMain()" class="secondary">Main Menu</button>
        </div>
    </div>

    <script type="module">
        // --- FIREBASE IMPORTS ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, remove, push, onDisconnect, get, query, orderByChild, equalTo, limitToFirst, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyALsegXQGNrzOGpM7uO6EE1dAB0TDvY9Qo",
            authDomain: "carr-7a756.firebaseapp.com",
            databaseURL: "https://carr-7a756-default-rtdb.firebaseio.com",
            projectId: "carr-7a756",
            storageBucket: "carr-7a756.firebasestorage.app",
            messagingSenderId: "1052404189266",
            appId: "1:1052404189266:web:e35db0e5e62e079ed6378b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const GAME_CFG = {
            laneWidth: 4.0, 
            startSpeed: 50, 
            speedIncrement: 1.5, 
            maxSpeed: 160, 
            fogDensity: 0.015,
            colors: { sky: 0x050510, road: 0x1a1a1a, player: 0xff0033, opponent: 0x00ccff }
        };

        // --- STATE MANAGEMENT ---
        let gameState = { 
            isPlaying: false, 
            speed: GAME_CFG.startSpeed, 
            lane: 0, 
            distance: 0, 
            vehicle: 'car', 
            isMultiplayer: false,
            shake: 0 
        };
        
        let mpState = { 
            roomId: null, 
            playerId: null, 
            opponentId: null, 
            opponentLane: 0, 
            opponentStatus: 'alive', 
            rematchRequested: false, 
            amIHost: false 
        };
        
        // Three.js Vars
        let scene, camera, renderer, composer, clock;
        let playerCar, opponentCar, obstacles = [], scenery = [], roadLines = [], particles = [];
        let touchStartX = 0, targetLaneX = 0;
        let mapSeed = 0;
        let generatedMap = []; 

        // UI References
        const ui = {
            score: document.getElementById('score-display'),
            start: document.getElementById('start-screen'),
            mpMenu: document.getElementById('multiplayer-menu'),
            lobby: document.getElementById('lobby-screen'),
            gameOver: document.getElementById('game-over-screen'),
            custom: document.getElementById('custom-screen'),
            lblLocal: document.getElementById('label-local'),
            lblRemote: document.getElementById('label-remote'),
            status: document.getElementById('lobby-status'),
            inviteArea: document.getElementById('invite-area'),
            inviteLink: document.getElementById('invite-link'),
            copyBtn: document.getElementById('copy-btn'),
            rematchBtn: document.getElementById('rematch-btn')
        };

        // --- INITIALIZATION FLOW ---
        
        // 1. Check for Room ID in URL immediately
        const urlParams = new URLSearchParams(window.location.search);
        const roomCodeFromUrl = urlParams.get('room');

        if(roomCodeFromUrl) {
            // If joining via link, show loading screen immediately
            showScreen(ui.lobby);
            ui.status.innerText = "AUTHENTICATING...";
            ui.inviteArea.classList.add('hidden');
        }

        // 2. Authenticate
        signInAnonymously(auth).catch(e => {
            console.error("Auth Failed", e);
            alert("Network Error. Reload page.");
        });

        // 3. Auth Listener (Entry Point)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                mpState.playerId = user.uid;
                console.log("Logged in as:", user.uid);

                // Clean up any stale matchmaking tickets
                remove(ref(db, `carr_matchmaking/${user.uid}`));

                if (roomCodeFromUrl) {
                    joinFriendRoom(roomCodeFromUrl);
                }
            }
        });

        // --- 3D ENGINE ---
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(GAME_CFG.colors.sky);
            scene.fog = new THREE.FogExp2(GAME_CFG.colors.sky, GAME_CFG.fogDensity);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 4.5, 9);
            camera.lookAt(0, 1, -10);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('game-container').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffe0, 2.5);
            sun.position.set(20, 50, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 100;
            sun.shadow.bias = -0.001;
            scene.add(sun);

            // Post Processing
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            const bloom = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.5, 0.7);
            composer.addPass(bloom);
            composer.addPass(new THREE.ShaderPass(THREE.GammaCorrectionShader));

            // Objects
            createWorld();
            updatePlayerModel();
            
            // Opponent Ghost
            opponentCar = createVehicle(GAME_CFG.colors.opponent, false, 'car');
            opponentCar.visible = false;
            scene.add(opponentCar);

            // Speed Particles
            const partGeo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<50; i++) {
                pos.push((Math.random()-0.5)*30, (Math.random())*10, -Math.random()*20);
            }
            partGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const partMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.2, transparent: true, opacity: 0.5});
            const partSys = new THREE.Points(partGeo, partMat);
            scene.add(partSys);
            particles = { mesh: partSys, speeds: Array(50).fill(0).map(()=>Math.random()+0.5) };

            // Listeners
            window.addEventListener('resize', onResize);
            document.addEventListener('keydown', onKey);
            document.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX);
            document.addEventListener('touchend', onTouchEnd);
            
            // Button Bindings
            document.getElementById('start-btn').onclick = () => startGame(false);
            document.getElementById('restart-btn').onclick = () => { 
                if(gameState.isMultiplayer) requestRematch(); 
                else startGame(false); 
            };
            document.getElementById('custom-btn').onclick = () => showScreen(ui.custom);
            document.getElementById('mp-menu-btn').onclick = () => showScreen(ui.mpMenu);
            document.getElementById('mp-random-btn').onclick = startRandomMatchmaking;
            document.getElementById('mp-friend-btn').onclick = hostFriendRoom;
            document.getElementById('rematch-btn').onclick = requestRematch;
            ui.copyBtn.onclick = copyInviteLink;

            animate();
        }

        // --- MULTIPLAYER LOGIC ---

        // 1. Host Friend Room
        function hostFriendRoom() {
            showScreen(ui.lobby);
            ui.status.innerText = "CREATING ROOM...";
            ui.inviteArea.classList.remove('hidden');

            const roomRef = push(ref(db, 'carr_rooms'));
            mpState.roomId = roomRef.key;
            mpState.amIHost = true;
            mapSeed = Math.floor(Math.random() * 999999);

            // Set Initial Room State
            set(roomRef, { 
                status: 'waiting', 
                seed: mapSeed,
                created: serverTimestamp()
            });

            // Add Host
            const myRef = ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`);
            set(myRef, { lane: 0, status: 'alive', rematch: false });
            onDisconnect(myRef).remove();

            // Set Invite Link
            const link = `${window.location.origin}${window.location.pathname}?room=${mpState.roomId}`;
            ui.inviteLink.value = link;
            ui.status.innerText = "WAITING FOR FRIEND...";

            listenToRoom(mpState.roomId);
        }

        // 2. Join Friend Room
        function joinFriendRoom(roomId) {
            mpState.roomId = roomId;
            mpState.amIHost = false;
            ui.status.innerText = "JOINING...";

            get(ref(db, `carr_rooms/${roomId}`)).then(snap => {
                if(snap.exists()) {
                    const data = snap.val();
                    if(data.players && Object.keys(data.players).length >= 2) {
                        alert("Room is full!");
                        window.backToMain();
                        return;
                    }
                    // Join
                    const myRef = ref(db, `carr_rooms/${roomId}/players/${mpState.playerId}`);
                    set(myRef, { lane: 0, status: 'alive', rematch: false });
                    onDisconnect(myRef).remove();
                    listenToRoom(roomId);
                } else {
                    alert("Room not found or expired.");
                    window.backToMain();
                }
            });
        }

        // 3. Random Matchmaking
        function startRandomMatchmaking() {
            showScreen(ui.lobby);
            ui.inviteArea.classList.add('hidden');
            ui.status.innerText = "SEARCHING FOR OPPONENT...";

            // Check queue
            get(query(ref(db, 'carr_matchmaking'), orderByChild('status'), equalTo('waiting'), limitToFirst(1)))
            .then(snap => {
                if(snap.exists()) {
                    // Join Found Host
                    const hostId = Object.keys(snap.val())[0];
                    const ticket = snap.val()[hostId];
                    if(hostId !== mpState.playerId) {
                        mpState.roomId = ticket.roomId;
                        mpState.amIHost = false;
                        remove(ref(db, `carr_matchmaking/${hostId}`)); // Remove ticket
                        
                        // Add self to room
                        const myRef = ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`);
                        set(myRef, { lane: 0, status: 'alive', rematch: false });
                        onDisconnect(myRef).remove();
                        listenToRoom(mpState.roomId);
                        return;
                    }
                }
                
                // Create New Room
                const roomRef = push(ref(db, 'carr_rooms'));
                mpState.roomId = roomRef.key;
                mpState.amIHost = true;
                mapSeed = Math.floor(Math.random() * 999999);
                
                set(roomRef, { status: 'waiting', seed: mapSeed, created: serverTimestamp() });
                set(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`), { lane: 0, status: 'alive', rematch: false });
                onDisconnect(ref(db, `carr_rooms/${mpState.roomId}`)).remove();

                // Create Queue Ticket
                const ticketRef = ref(db, `carr_matchmaking/${mpState.playerId}`);
                set(ticketRef, { roomId: mpState.roomId, status: 'waiting', timestamp: serverTimestamp() });
                onDisconnect(ticketRef).remove();
                
                listenToRoom(mpState.roomId);
            });
        }

        // 4. Room Listener (The Brain)
        function listenToRoom(roomId) {
            gameState.isMultiplayer = true;

            const roomRef = ref(db, `carr_rooms/${roomId}`);
            onValue(roomRef, (snap) => {
                const data = snap.val();
                if(!data) {
                    // Room deleted
                    if(gameState.isMultiplayer && !ui.lobby.classList.contains('hidden')) {
                        alert("Room closed.");
                        window.backToMain();
                    }
                    return;
                }

                // A. Check Players
                if(data.players) {
                    const ids = Object.keys(data.players);
                    
                    // Logic for Host to Start Game
                    if(mpState.amIHost && ids.length === 2 && data.status === 'waiting') {
                        // Both connected -> Start
                        update(roomRef, { status: 'starting' });
                    }

                    // Identify Opponent
                    const oppId = ids.find(id => id !== mpState.playerId);
                    if(oppId) {
                        mpState.opponentId = oppId;
                        const oppData = data.players[oppId];
                        mpState.opponentLane = oppData.lane;
                        
                        // Update Lobby Text
                        if(!gameState.isPlaying && data.status === 'waiting') {
                            ui.status.innerText = "OPPONENT CONNECTED! STARTING...";
                        }

                        // Game Logic: Dead/Alive
                        if(gameState.isPlaying && oppData.status === 'dead' && mpState.opponentStatus !== 'dead') {
                            // Opponent died
                            mpState.opponentStatus = 'dead';
                            // If I'm still alive, I continue running until I crash or realize I won?
                            // Actually, let's just trigger win if opponent dies
                            if(gameState.status !== 'dead') endGame(true);
                        }
                        
                        // Rematch Logic
                        if(!gameState.isPlaying && ui.gameOver.classList.contains('hidden') === false) {
                            if(oppData.rematch) ui.rematchBtn.innerText = "OPPONENT WANTS REMATCH!";
                            if(mpState.amIHost && data.players[mpState.playerId].rematch && oppData.rematch) {
                                restartMatch(roomId);
                            }
                        }
                    } else if(gameState.isPlaying) {
                        // Opponent left mid-game
                        endGame(true); 
                    }
                }

                // B. Game State Changes
                if(data.status === 'starting' && !gameState.isPlaying) {
                    // Map Gen
                    generateMap(data.seed);
                    startCountdown();
                    if(mpState.amIHost) {
                        setTimeout(() => update(roomRef, { status: 'playing' }), 1000);
                    }
                }
            });
        }

        function restartMatch(roomId) {
             // Reset player statuses
             const updates = {};
             updates[`carr_rooms/${roomId}/players/${mpState.playerId}`] = { lane: 0, status: 'alive', rematch: false };
             updates[`carr_rooms/${roomId}/players/${mpState.opponentId}`] = { lane: 0, status: 'alive', rematch: false };
             updates[`carr_rooms/${roomId}/status`] = 'starting';
             updates[`carr_rooms/${roomId}/seed`] = Math.floor(Math.random()*999999);
             update(ref(db), updates);
        }

        // --- GAMEPLAY LOGIC ---

        function generateMap(seed) {
            generatedMap = [];
            // Simple deterministic RNG
            let s = seed % 2147483647;
            const rnd = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
            
            for(let i=0; i<300; i++) {
                const z = -60 - (i * 30); // Obstacle spacing
                const lane = Math.floor(rnd() * 3) - 1; 
                generatedMap.push({ z, lane, type: Math.floor(rnd()*4) });
            }
        }

        function startCountdown() {
            // Hide Menus
            ui.lobby.classList.add('hidden');
            ui.gameOver.classList.add('hidden');
            
            // Reset Game Vars
            gameState.distance = 0;
            gameState.speed = GAME_CFG.startSpeed;
            gameState.lane = 0;
            gameState.shake = 0;
            targetLaneX = 0;
            playerCar.position.x = 0;
            playerCar.rotation.z = 0;

            // Clear Scene
            obstacles.forEach(o => scene.remove(o)); obstacles = [];
            
            // Spawn Map
            if(gameState.isMultiplayer) {
                generatedMap.forEach(d => spawnObstacle(d.z, d.lane, d.type));
            } else {
                // Solo: Initial batch
                for(let i=0; i<10; i++) spawnObstacle(-60 - (i*30), null, null);
            }

            // Countdown UI
            const el = document.getElementById('countdown-overlay');
            el.style.display = 'block';
            let n = 3;
            el.innerText = n;
            const t = setInterval(() => {
                n--;
                if(n>0) el.innerText = n;
                else {
                    clearInterval(t);
                    el.style.display = 'none';
                    setGameActive(true);
                }
            }, 1000);
        }

        function setGameActive(active) {
            gameState.isPlaying = active;
            if(active) {
                ui.lblLocal.classList.remove('hidden');
                if(gameState.isMultiplayer) {
                    ui.lblRemote.classList.remove('hidden');
                    opponentCar.visible = true;
                    opponentCar.position.z = 0; 
                    ui.rematchBtn.classList.remove('hidden');
                    ui.rematchBtn.innerText = "REQUEST REMATCH";
                } else {
                    ui.lblRemote.classList.add('hidden');
                    opponentCar.visible = false;
                    ui.rematchBtn.classList.add('hidden');
                }
            }
        }

        function startGame(isMP) {
            gameState.isMultiplayer = isMP;
            ui.start.classList.add('hidden');
            ui.custom.classList.add('hidden');
            startCountdown();
        }

        function updatePhysics(dt) {
            if(!gameState.isPlaying) return;

            // 1. Acceleration
            if(gameState.speed < GAME_CFG.maxSpeed) gameState.speed += dt * GAME_CFG.speedIncrement;
            
            // 2. Movement
            const moveDist = gameState.speed * dt;
            gameState.distance += moveDist;
            ui.score.innerText = Math.floor(gameState.distance) + "m";

            // 3. Player Lane Lerp
            playerCar.position.x = THREE.MathUtils.lerp(playerCar.position.x, targetLaneX, dt * 10);
            // Tilt
            playerCar.rotation.z = (playerCar.position.x - targetLaneX) * -0.15;
            // Bump/Bob
            playerCar.position.y = Math.sin(clock.elapsedTime * 15) * 0.02;

            // 4. Opponent Handling (Multiplayer)
            if(gameState.isMultiplayer && opponentCar.visible) {
                const targetOpX = mpState.opponentLane * GAME_CFG.laneWidth;
                opponentCar.position.x = THREE.MathUtils.lerp(opponentCar.position.x, targetOpX, dt * 8);
                opponentCar.rotation.z = (opponentCar.position.x - targetOpX) * -0.15;
                
                // Keep opponent relatively close in Z (Visual trick: In endless runners, you don't move forward, the world moves back.
                // But if opponent is ahead/behind, we shift them locally)
                // *Simple Implementation*: We just keep them at Z=0 for now as "Ghost". 
                // A full authoritative server would be needed for true race positions. 
                // We'll simulate position based on "who died" for win condition.
                
                // Update Labels
                updateLabel(playerCar, ui.lblLocal);
                updateLabel(opponentCar, ui.lblRemote);
            }

            // 5. World Scroll
            scrollWorld(moveDist);

            // 6. Collision
            checkCollisions();
        }

        function scrollWorld(amount) {
            // Move road lines
            roadLines.forEach(l => {
                l.position.z += amount;
                if(l.position.z > 20) l.position.z -= 200;
            });

            // Move Scenery
            scenery.forEach(s => {
                s.position.z += amount;
                if(s.position.z > 20) s.position.z = -200 - Math.random() * 50;
            });

            // Move Obstacles
            for(let i = obstacles.length - 1; i >= 0; i--) {
                const ob = obstacles[i];
                ob.position.z += amount; // Move towards camera
                
                // Infinite Solo Generation
                if(!gameState.isMultiplayer && ob.position.z > 20) {
                    // Recycle
                    ob.position.z = -250;
                    ob.position.x = (Math.floor(Math.random()*3)-1) * GAME_CFG.laneWidth;
                } 
                // MP cleanup
                else if (gameState.isMultiplayer && ob.position.z > 20) {
                    // Just hide/remove for now if map is fixed size
                }
            }

            // Particles
            const pos = particles.mesh.geometry.attributes.position.array;
            for(let i=0; i<50; i++) {
                pos[i*3 + 2] += amount * 1.5; // Faster than car
                if(pos[i*3 + 2] > 10) pos[i*3 + 2] = -40;
            }
            particles.mesh.geometry.attributes.position.needsUpdate = true;
        }

        function checkCollisions() {
            // Bounding box approximation
            const pBox = { x: playerCar.position.x, z: 0, w: 1.2, d: 3.5 };
            
            for(let ob of obstacles) {
                // Simple AABB
                const dx = Math.abs(pBox.x - ob.position.x);
                const dz = Math.abs(pBox.z - ob.position.z);
                
                if(dx < 1.5 && dz < 2.5) {
                    endGame(false);
                }
            }
        }

        function endGame(win) {
            gameState.isPlaying = false;
            
            // Camera Shake Effect
            gameState.shake = 1.0;

            const title = document.getElementById('go-title');
            if(gameState.isMultiplayer) {
                title.innerText = win ? "VICTORY" : "WASTED";
                title.style.color = win ? "#ffcc00" : "white";
                
                if(!win) {
                    // Report death
                    update(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`), { status: 'dead' });
                }
            } else {
                title.innerText = "CRASHED";
                title.style.color = "#ff3333";
            }
            
            document.getElementById('final-score').innerText = Math.floor(gameState.distance);
            ui.gameOver.classList.remove('hidden');
        }

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            updatePhysics(dt);

            // Camera Shake Decay
            if(gameState.shake > 0) {
                gameState.shake -= dt * 2;
                camera.position.x = (Math.random()-0.5) * gameState.shake;
                camera.position.y = 4.5 + (Math.random()-0.5) * gameState.shake;
            } else {
                 // Normal Camera Sway
                 if(gameState.isPlaying) {
                     // slight lag behind player x
                     const camTargetX = playerCar.position.x * 0.3;
                     camera.position.x += (camTargetX - camera.position.x) * dt * 2;
                 } else {
                    camera.position.x = Math.sin(clock.elapsedTime * 0.5) * 2;
                 }
            }

            composer.render();
        }

        // --- HELPERS ---

        function onKey(e) {
            if(!gameState.isPlaying) return;
            if(e.key === 'ArrowLeft' || e.key === 'a') changeLane(-1);
            if(e.key === 'ArrowRight' || e.key === 'd') changeLane(1);
        }
        
        function onTouchEnd(e) {
            if(!gameState.isPlaying) return;
            const endX = e.changedTouches[0].clientX;
            const diff = endX - touchStartX;
            if(Math.abs(diff) > 30) changeLane(diff > 0 ? 1 : -1);
        }

        function changeLane(dir) {
            const next = gameState.lane + dir;
            if(next >= -1 && next <= 1) {
                gameState.lane = next;
                targetLaneX = next * GAME_CFG.laneWidth;
                
                // Network Sync
                if(gameState.isMultiplayer) {
                    update(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`), { lane: gameState.lane });
                }
            }
        }

        function updateLabel(obj, el) {
            const v = obj.position.clone();
            v.y += 1.5; 
            v.project(camera);
            
            // If behind camera
            if(Math.abs(v.z) > 1) { el.style.opacity = 0; return; }
            
            const x = (v.x * .5 + .5) * window.innerWidth;
            const y = (-(v.y * .5) + .5) * window.innerHeight;
            
            el.style.transform = `translate(-50%, -100%)`;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.opacity = 1;
        }

        // Scene Creation Helpers
        function createWorld() {
            // Ground
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.8 }));
            plane.rotation.x = -Math.PI/2;
            plane.position.y = -0.1;
            scene.add(plane);

            // Road
            const road = new THREE.Mesh(new THREE.PlaneGeometry(14, 400), new THREE.MeshStandardMaterial({ color: GAME_CFG.colors.road, roughness: 0.5 }));
            road.rotation.x = -Math.PI/2;
            road.receiveShadow = true;
            scene.add(road);

            // Lines
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for(let i=0; i<30; i++) {
                const l1 = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 3), lineMat);
                l1.rotation.x = -Math.PI/2;
                l1.position.set(-GAME_CFG.laneWidth/2, 0.02, -i*15);
                scene.add(l1); roadLines.push(l1);
                
                const l2 = l1.clone();
                l2.position.x = GAME_CFG.laneWidth/2;
                scene.add(l2); roadLines.push(l2);
            }

            // Trees
            const trunkMat = new THREE.MeshStandardMaterial({color: 0x221100});
            const leafMat = new THREE.MeshStandardMaterial({color: 0x003300, flatShading: true});
            for(let i=0; i<60; i++) {
                const grp = new THREE.Group();
                const tr = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 2), trunkMat);
                tr.position.y = 1; grp.add(tr);
                const lf = new THREE.Mesh(new THREE.ConeGeometry(2, 5, 8), leafMat);
                lf.position.y = 3.5; grp.add(lf);
                
                grp.position.set((Math.random()>0.5?1:-1) * (10+Math.random()*30), 0, -Math.random()*300);
                scene.add(grp); scenery.push(grp);
            }
        }

        function createVehicle(color, isLocal, type) {
            const grp = new THREE.Group();
            
            // Materials
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.6, roughness: 0.2 });
            const winMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
            const glowColor = isLocal ? 0xff0000 : 0x00ccff;
            const glowMat = new THREE.MeshStandardMaterial({ color: glowColor, emissive: glowColor, emissiveIntensity: 2.0 });

            if(type === 'car') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.6, 3.5), bodyMat);
                body.position.y = 0.6; body.castShadow = true; grp.add(body);
                
                const top = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 1.8), winMat);
                top.position.set(0, 1.15, -0.3); grp.add(top);
                
                // Wheels
                const wGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 16); wGeo.rotateZ(Math.PI/2);
                const wMat = new THREE.MeshStandardMaterial({color: 0x111111});
                [ {x:-0.8, z:1.0}, {x:0.8, z:1.0}, {x:-0.8, z:-1.0}, {x:0.8, z:-1.0} ].forEach(p => {
                    const w = new THREE.Mesh(wGeo, wMat); w.position.set(p.x, 0.35, p.z); grp.add(w);
                });
                
                // Lights
                const t1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), glowMat); t1.position.set(-0.5, 0.6, 1.76); grp.add(t1);
                const t2 = t1.clone(); t2.position.x = 0.5; grp.add(t2);

            } else if (type === 'bike') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 2.0), bodyMat);
                body.position.y = 0.7; grp.add(body);
                const wGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.2, 16); wGeo.rotateZ(Math.PI/2);
                const w1 = new THREE.Mesh(wGeo, new THREE.MeshStandardMaterial({color:0x111111})); w1.position.set(0, 0.4, 0.8); grp.add(w1);
                const w2 = w1.clone(); w2.position.z = -0.8; grp.add(w2);
                // Tron strip
                const strip = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 1.8), glowMat); strip.position.set(0, 1.05, 0); grp.add(strip);

            } else if (type === 'truck') {
                const cab = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.5, 1.5), bodyMat); cab.position.set(0, 1.2, 1.0); grp.add(cab);
                const bed = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.5, 3.0), new THREE.MeshStandardMaterial({color:0x333333})); bed.position.set(0, 0.8, -1.2); grp.add(bed);
                const wGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.5, 16); wGeo.rotateZ(Math.PI/2);
                const wMat = new THREE.MeshStandardMaterial({color:0x111111});
                [{x:-1, z:1.2}, {x:1, z:1.2}, {x:-1, z:-0.5}, {x:1, z:-0.5}, {x:-1, z:-2.0}, {x:1, z:-2.0}].forEach(p => {
                    const w = new THREE.Mesh(wGeo, wMat); w.position.set(p.x, 0.5, p.z); grp.add(w);
                });
            }

            return grp;
        }

        function spawnObstacle(z, laneOverride = null, typeOverride = null) {
            const colors = [0xffaa00, 0x00ffaa, 0xaa00ff, 0xffffff];
            const type = typeOverride ?? Math.floor(Math.random() * colors.length);
            const lane = laneOverride ?? (Math.floor(Math.random() * 3) - 1);
            
            const ob = createVehicle(colors[type], false, 'car');
            ob.position.set(lane * GAME_CFG.laneWidth, 0, z);
            
            // Randomly rotate some to look like wrecks
            // ob.rotation.y = (Math.random()-0.5) * 0.5;
            
            scene.add(ob);
            obstacles.push(ob);
        }

        // --- GLOBAL EXPORTS (For UI Buttons) ---
        window.backToMain = function() {
            if(mpState.roomId) {
                remove(ref(db, `carr_matchmaking/${mpState.playerId}`));
                remove(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`));
            }
            mpState.roomId = null; 
            gameState.isMultiplayer = false;
            // Clear URL param without reload
            window.history.pushState({}, document.title, window.location.pathname);
            
            showScreen(ui.start);
        };

        window.cancelMatchmaking = function() { 
            window.backToMain(); 
        };
        
        window.closeCustom = function() { 
            showScreen(ui.start); 
        };
        
        window.selectVehicle = function(type) {
            gameState.vehicle = type; 
            document.querySelectorAll('.vehicle-card').forEach(c => c.classList.remove('active')); 
            event.currentTarget.classList.add('active'); 
            updatePlayerModel();
        };

        window.copyInviteLink = function() {
            const copyText = document.getElementById("invite-link");
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value).then(() => {
               ui.copyBtn.innerText = "COPIED!";
               setTimeout(() => ui.copyBtn.innerText = "COPY", 2000);
            });
        };

        window.requestRematch = function() {
            mpState.rematchRequested = true;
            ui.rematchBtn.innerText = "WAITING...";
            update(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`), { rematch: true });
        }

        function updatePlayerModel() {
            if(playerCar) scene.remove(playerCar); 
            playerCar = createVehicle(GAME_CFG.colors.player, true, gameState.vehicle); 
            scene.add(playerCar);
        }

        function showScreen(el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            el.classList.remove('hidden');
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // Start
        init3D();

    </script>
</body>
</html>
