<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Forest Run 3D - Fixed Multiplayer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body { margin: 0; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: #020205; user-select: none; -webkit-user-select: none; }
        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        .hud-top { padding: 25px; display: flex; justify-content: space-between; color: white; text-shadow: 0 0 15px rgba(255,255,255,0.4); font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        #score-display { background: rgba(255, 255, 255, 0.05); padding: 8px 20px; border-radius: 4px; border-left: 4px solid #ffcc00; backdrop-filter: blur(5px); }

        /* SCREENS */
        #start-screen, #game-over-screen, #custom-screen, #multiplayer-menu, #lobby-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.95) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: auto; backdrop-filter: blur(15px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10;
        }

        .hidden { opacity: 0; pointer-events: none !important; transform: scale(1.1); display: none !important; }

        h1 { color: white; font-size: clamp(3rem, 10vw, 6rem); margin: 0; text-transform: uppercase; font-style: italic; font-weight: 900; letter-spacing: -4px; line-height: 0.85; text-align: center; }
        .sub-tag { color: #ffcc00; font-size: 0.9rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 8px; font-weight: 700; }
        .menu-v-stack { display: flex; flex-direction: column; gap: 15px; width: 300px; }

        button { background: #fff; border: none; padding: 18px; font-size: 1.2rem; font-weight: 900; color: #000; cursor: pointer; transition: 0.3s; text-transform: uppercase; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); }
        button:hover { background: #ffcc00; transform: translateX(10px) skewX(-5deg); }
        button.secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        /* GARAGE */
        .garage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .vehicle-card { background: rgba(255,255,255,0.05); border: 2px solid transparent; padding: 20px; cursor: pointer; text-align: center; transition: 0.3s; color: white; border-radius: 8px; }
        .vehicle-card.active { border-color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .vehicle-card span { display: block; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; margin-top: 10px; }

        .controls-hint { position: absolute; bottom: 40px; font-size: 0.7rem; opacity: 0.4; color: white; letter-spacing: 2px; }

        .player-label { position: absolute; background: rgba(0,0,0,0.6); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; pointer-events: none; transform: translate(-50%, -100%); white-space: nowrap; border: 1px solid #ffcc00; transition: opacity 0.2s; }
        
        #countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; color: #ffcc00; font-weight: 900; text-shadow: 0 0 20px rgba(255, 204, 0, 0.5); pointer-events: none; display: none; z-index: 100; }
        .loader-ring { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #ffcc00; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/GammaCorrectionShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/SMAAShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/SMAAPass.js"></script>
</head>
<body>

    <div id="game-container"></div>
    <div id="ui-layer">
        <div class="hud-top"><div id="score-display">0000m</div></div>
        <div id="countdown-overlay">3</div>
        <div id="label-local" class="player-label hidden">YOU</div>
        <div id="label-remote" class="player-label hidden">OPPONENT</div>
    </div>

    <div id="start-screen">
        <h1>FOREST<br>RUN</h1>
        <div class="sub-tag">ULTIMATE EDITION</div>
        <div class="menu-v-stack">
            <button id="start-btn">Launch Engine</button>
            <button id="mp-menu-btn" style="background: linear-gradient(45deg, #ffcc00, #ff9900); border:none;">Multiplayer</button>
            <button id="custom-btn" class="secondary">Garage / Custom</button>
        </div>
        <div class="controls-hint">USE ARROWS OR SWIPE TO DRIVE</div>
    </div>

    <div id="multiplayer-menu" class="hidden">
        <h1>ONLINE</h1>
        <div class="sub-tag">SELECT MODE</div>
        <div class="menu-v-stack">
            <button id="mp-random-btn">Random Duel</button>
            <button id="mp-friend-btn">Play with Friend</button>
            <button onclick="backToMain()" class="secondary">Back</button>
        </div>
    </div>

    <div id="lobby-screen" class="hidden">
        <h1 style="font-size: 3rem;">WAITING</h1>
        <div class="loader-ring"></div>
        <div class="sub-tag" id="lobby-status">SEARCHING...</div>
        <div id="invite-area" class="hidden" style="display:flex; flex-direction:column; gap:10px; align-items:center; margin-bottom:20px;">
            <input type="text" id="invite-link" readonly style="padding:10px; width:250px; text-align:center; background:rgba(255,255,255,0.1); border:1px solid #555; color:white;">
            <button id="copy-btn" class="secondary" style="padding:10px; font-size:0.8rem;">Copy Link</button>
        </div>
        <button onclick="cancelMatchmaking()" class="secondary">Cancel</button>
    </div>

    <div id="custom-screen" class="hidden">
        <h1>GARAGE</h1>
        <div class="sub-tag">SELECT YOUR MACHINE</div>
        <div class="garage-grid">
            <div class="vehicle-card active" onclick="selectVehicle('car')"><span>CLASSIC RIG</span></div>
            <div class="vehicle-card" onclick="selectVehicle('bike')"><span>VOLT BIKE</span></div>
            <div class="vehicle-card" onclick="selectVehicle('hyper')"><span>HYPER BOLT</span></div>
        </div>
        <button onclick="closeCustom()">Back to Menu</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1 id="go-title">WASTED</h1>
        <p class="sub-tag" id="go-subtitle">DISTANCE: <span id="final-score">0</span>M</p>
        <div class="menu-v-stack">
            <button id="restart-btn">Try Again</button>
            <button id="rematch-btn" class="hidden" style="background: #ffcc00;">Request Rematch</button>
            <button onclick="backToMain()" class="secondary">Main Menu</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, remove, push, onDisconnect, get, query, orderByChild, equalTo, limitToFirst, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyALsegXQGNrzOGpM7uO6EE1dAB0TDvY9Qo",
            authDomain: "carr-7a756.firebaseapp.com",
            databaseURL: "https://carr-7a756-default-rtdb.firebaseio.com",
            projectId: "carr-7a756",
            storageBucket: "carr-7a756.firebasestorage.app",
            messagingSenderId: "1052404189266",
            appId: "1:1052404189266:web:e35db0e5e62e079ed6378b",
            measurementId: "G-H713EXVQVH"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const CONFIG = {
            laneWidth: 3.5, startSpeed: 40, speedIncrement: 0.8, maxSpeed: 110, roadWidth: 12, fogDensity: 0.01,
            colors: { sky: 0x020205, grass: 0x081208, road: 0x111111, player: 0xff0000, opponent: 0x0088ff }
        };

        let gameState = { isPlaying: false, speed: CONFIG.startSpeed, lane: 0, distance: 0, vehicle: 'car', isMultiplayer: false };
        let mpState = { roomId: null, playerId: null, opponentId: null, opponentLane: 0, opponentStatus: 'alive', rematchRequested: false, amIHost: false };
        let roomSubscription = null;

        let scene, camera, renderer, composer, clock, envMap;
        let playerCar, opponentCar, obstacles = [], scenery = [], roadLines = [];
        let touchStartX = 0, targetLaneX = 0;
        let generatedMap = []; 

        // UI Refs
        const scoreEl = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const mpMenu = document.getElementById('multiplayer-menu');
        const lobbyScreen = document.getElementById('lobby-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const customScreen = document.getElementById('custom-screen');

        // --- AUTH & URL HANDLING (FIXED RACE CONDITION) ---
        
        const urlParams = new URLSearchParams(window.location.search);
        const autoJoinRoomId = urlParams.get('room');

        // If URL has room, immediately show loading to prevent flashing start screen
        if(autoJoinRoomId) {
            startScreen.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            document.getElementById('invite-area').classList.add('hidden');
            document.getElementById('lobby-status').innerText = "AUTHENTICATING...";
        }

        signInAnonymously(auth).catch(e => { console.error(e); alert("Network Error"); });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                mpState.playerId = user.uid;
                
                // Cleanup potentially stuck queues from previous sessions
                remove(ref(db, `carr_matchmaking/${user.uid}`));

                // Only NOW do we attempt to join the room
                if(autoJoinRoomId) {
                    joinFriendRoom(autoJoinRoomId);
                }
            }
        });

        // --- DETERMINISTIC MAP ---
        function generateTrafficMap(seedVal) {
            generatedMap = [];
            let localSeed = seedVal % 2147483647;
            if (localSeed <= 0) localSeed += 2147483646;
            const random = () => {
                localSeed = (localSeed * 16807) % 2147483647;
                return (localSeed - 1) / 2147483646;
            };
            for(let i = 0; i < 150; i++) {
                const zPos = -60 - (i * 35);
                const lane = Math.floor(random() * 3) - 1; 
                const colorIdx = Math.floor(random() * 4);
                generatedMap.push({ z: zPos, lane: lane, colorIdx: colorIdx });
            }
        }

        // --- INIT 3D ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.colors.sky);
            scene.fog = new THREE.FogExp2(CONFIG.colors.sky, CONFIG.fogDensity);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 400);
            camera.position.set(0, 5, 9);
            camera.lookAt(0, 2, -10);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.physicallyCorrectLights = true;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4; 
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            document.getElementById('game-container').appendChild(renderer.domElement);

            clock = new THREE.Clock();
            setupLighting();
            setupPostProcessing();
            createWorld();
            updatePlayerModel();
            
            opponentCar = createCar(CONFIG.colors.opponent, true, 'car');
            opponentCar.visible = false;
            opponentCar.children.forEach(c => { if(c.material && c.material.emissive) c.material.emissive.setHex(CONFIG.colors.opponent); });
            scene.add(opponentCar);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
            });
            document.addEventListener('keydown', e => {
                if (e.key === 'ArrowLeft') switchLane(-1);
                if (e.key === 'ArrowRight') switchLane(1);
            });
            document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
            document.addEventListener('touchend', e => {
                if (Math.abs(e.changedTouches[0].clientX - touchStartX) > 40) switchLane(e.changedTouches[0].clientX - touchStartX > 0 ? 1 : -1);
            });

            document.getElementById('start-btn').onclick = () => startGame(false);
            document.getElementById('restart-btn').onclick = () => { if(gameState.isMultiplayer) requestRematch(); else startGame(false); };
            document.getElementById('custom-btn').onclick = () => { startScreen.classList.add('hidden'); customScreen.classList.remove('hidden'); };
            document.getElementById('mp-menu-btn').onclick = () => { startScreen.classList.add('hidden'); mpMenu.classList.remove('hidden'); };
            document.getElementById('mp-random-btn').onclick = startRandomMatchmaking;
            document.getElementById('mp-friend-btn').onclick = startHostFriend;
            document.getElementById('copy-btn').onclick = () => {
                const inp = document.getElementById("invite-link"); inp.select(); document.execCommand("copy");
                document.getElementById('copy-btn').innerText = "COPIED!";
            };
            document.getElementById('rematch-btn').onclick = requestRematch;

            loop();
        }

        // --- ROBUST NETWORKING ---

        function startRandomMatchmaking() {
            mpMenu.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            document.getElementById('invite-area').classList.add('hidden');
            document.getElementById('lobby-status').innerText = "SEARCHING DUEL...";

            const queueRef = ref(db, 'carr_matchmaking');
            const waitingQuery = query(queueRef, orderByChild('status'), equalTo('waiting'), limitToFirst(1));

            get(waitingQuery).then((snapshot) => {
                if (snapshot.exists()) {
                    // FOUND HOST
                    const hostId = Object.keys(snapshot.val())[0];
                    const hostData = snapshot.val()[hostId];
                    if (hostId !== mpState.playerId) {
                        mpState.roomId = hostData.roomId;
                        mpState.amIHost = false;
                        remove(ref(db, `carr_matchmaking/${hostId}`));
                        joinRoomInternal(mpState.roomId);
                    }
                } else {
                    // BECOME HOST
                    const newRoomRef = push(ref(db, 'carr_rooms'));
                    mpState.roomId = newRoomRef.key;
                    mpState.amIHost = true;
                    
                    const seed = Math.floor(Math.random() * 100000);
                    const roomData = { status: 'waiting', seed: seed, host: mpState.playerId, players: {} };
                    roomData.players[mpState.playerId] = { lane: 0, status: 'alive', rematch: false };

                    set(ref(db, `carr_rooms/${mpState.roomId}`), roomData);
                    
                    // Publicize in Matchmaking
                    set(ref(db, `carr_matchmaking/${mpState.playerId}`), { roomId: mpState.roomId, status: 'waiting', timestamp: serverTimestamp() });
                    
                    onDisconnect(ref(db, `carr_matchmaking/${mpState.playerId}`)).remove();
                    onDisconnect(ref(db, `carr_rooms/${mpState.roomId}`)).remove();
                    
                    listenToRoom(mpState.roomId);
                }
            });
        }

        function startHostFriend() {
            mpMenu.classList.add('hidden');
            lobbyScreen.classList.remove('hidden');
            document.getElementById('invite-area').classList.remove('hidden');
            document.getElementById('lobby-status').innerText = "WAITING FOR FRIEND...";
            
            const newRoomRef = push(ref(db, 'carr_rooms'));
            mpState.roomId = newRoomRef.key;
            mpState.amIHost = true;
            
            const seed = Math.floor(Math.random() * 100000);
            const link = window.location.origin + window.location.pathname + "?room=" + mpState.roomId;
            document.getElementById('invite-link').value = link;

            const roomData = { status: 'waiting', seed: seed, host: mpState.playerId, players: {} };
            roomData.players[mpState.playerId] = { lane: 0, status: 'alive', rematch: false };

            set(ref(db, `carr_rooms/${mpState.roomId}`), roomData);
            
            // Host Disconnect destroys the room
            onDisconnect(ref(db, `carr_rooms/${mpState.roomId}`)).remove();
            
            listenToRoom(mpState.roomId);
        }

        function joinFriendRoom(roomId) {
            mpState.roomId = roomId;
            mpState.amIHost = false;
            document.getElementById('lobby-status').innerText = "CONNECTING...";

            // Safety timeout
            const connectionTimeout = setTimeout(() => {
                if(!gameState.isMultiplayer) {
                    alert("Connection Timed Out. Room may be closed.");
                    backToMain();
                }
            }, 8000);

            const roomRef = ref(db, `carr_rooms/${roomId}`);
            get(roomRef).then((snap) => {
                clearTimeout(connectionTimeout);
                
                if(!snap.exists()) {
                    alert("Room does not exist.");
                    backToMain();
                    return;
                }
                const data = snap.val();
                if(data.status !== 'waiting' && data.status !== 'starting') {
                    alert("Game already in progress.");
                    backToMain();
                    return;
                }
                if(data.players && Object.keys(data.players).length >= 2) {
                    // Check if I am already in there (refresh case)
                    if(!data.players[mpState.playerId]) {
                        alert("Room is full.");
                        backToMain();
                        return;
                    }
                }

                joinRoomInternal(roomId);

            }).catch(e => {
                console.error(e);
                alert("Connection failed.");
                backToMain();
            });
        }

        function joinRoomInternal(roomId) {
            // Add myself to players
            const myRef = ref(db, `carr_rooms/${roomId}/players/${mpState.playerId}`);
            set(myRef, { lane: 0, status: 'alive', rematch: false });
            
            // Guest disconnect only removes guest
            onDisconnect(myRef).remove();
            
            listenToRoom(roomId);
        }

        // --- CENTRAL STATE MACHINE ---
        function listenToRoom(roomId) {
            gameState.isMultiplayer = true;
            const roomRef = ref(db, `carr_rooms/${roomId}`);

            roomSubscription = onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                
                // 1. Room Deleted check
                if(!data) {
                    if(gameState.isMultiplayer) {
                        alert("Connection lost or Host left.");
                        backToMain();
                    }
                    return;
                }

                // 2. Player Counting & Handshake
                const players = data.players || {};
                const uids = Object.keys(players);
                const oppId = uids.find(id => id !== mpState.playerId);
                
                // HOST LOGIC: Detect Friend and Start
                if(mpState.amIHost && data.status === 'waiting' && uids.length === 2) {
                    document.getElementById('lobby-status').innerText = "PLAYER FOUND! STARTING...";
                    // ATOMIC STATE CHANGE: Only Host does this
                    update(roomRef, { status: 'starting' });
                }

                // UI UPDATE: Guest Waiting
                if(!mpState.amIHost && data.status === 'waiting') {
                     document.getElementById('lobby-status').innerText = "WAITING FOR HOST...";
                }

                // 3. GAME START (Both Clients)
                if(data.status === 'starting') {
                    // Generate Map
                    generateTrafficMap(data.seed || 12345);
                    
                    if(!gameState.isPlaying && document.getElementById('countdown-overlay').style.display !== 'block') {
                        startCountdown();
                        // Host locks state to playing after delay
                        if(mpState.amIHost) {
                            setTimeout(() => {
                                update(roomRef, { status: 'playing' });
                            }, 500);
                        }
                    }
                }

                // 4. OPPONENT SYNC
                if(oppId && players[oppId]) {
                    mpState.opponentId = oppId;
                    mpState.opponentLane = players[oppId].lane;
                    mpState.opponentStatus = players[oppId].status;

                    if(gameState.isPlaying && mpState.opponentStatus === 'dead' && gameState.status !== 'dead') {
                        gameOver(true); 
                    }

                    // Rematch Logic
                    if(!gameState.isPlaying && data.status !== 'starting') {
                        if(players[oppId].rematch && !mpState.rematchRequested) {
                            document.getElementById('rematch-btn').innerText = "Accept Rematch";
                        }
                        if(mpState.amIHost && players[mpState.playerId].rematch && players[oppId].rematch) {
                            // Reset State
                            update(ref(db, `carr_rooms/${roomId}/players/${mpState.playerId}`), { rematch: false, status: 'alive', lane: 0 });
                            update(ref(db, `carr_rooms/${roomId}/players/${oppId}`), { rematch: false, status: 'alive', lane: 0 });
                            update(roomRef, { status: 'starting' });
                        }
                    }
                } else if (gameState.isPlaying && uids.length < 2) {
                    // Opponent Left mid-game
                    gameOver(true); 
                }
            });
        }

        // --- GAMEPLAY ---

        function requestRematch() {
            mpState.rematchRequested = true;
            document.getElementById('rematch-btn').innerText = "Waiting...";
            update(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`), { rematch: true });
        }

        function startCountdown() {
            lobbyScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            gameState.distance = 0;
            gameState.speed = CONFIG.startSpeed;
            gameState.lane = 0;
            targetLaneX = 0;
            playerCar.position.x = 0;
            
            obstacles.forEach(o => scene.remove(o)); obstacles = [];
            
            if(gameState.isMultiplayer && generatedMap.length > 0) {
                generatedMap.forEach(d => {
                    const ob = createCar(getObstacleColor(d.colorIdx), false, 'car');
                    ob.position.set((d.lane) * CONFIG.laneWidth, 0, d.z);
                    scene.add(ob);
                    obstacles.push(ob);
                });
            } else {
                for(let i=0; i<6; i++) spawnObstacle(-60 - (i * 35));
            }

            const cd = document.getElementById('countdown-overlay');
            cd.style.display = 'block';
            let count = 3;
            cd.innerText = count;
            
            const timer = setInterval(() => {
                count--;
                if(count > 0) cd.innerText = count;
                else {
                    clearInterval(timer);
                    cd.style.display = 'none';
                    startGame(true);
                }
            }, 1000);
        }

        function startGame(isMP) {
            gameState.isPlaying = true; 
            gameState.isMultiplayer = isMP;
            gameState.speed = CONFIG.startSpeed;
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            customScreen.classList.add('hidden');

            document.getElementById('label-local').classList.remove('hidden');
            
            if(isMP) {
                document.getElementById('label-remote').classList.remove('hidden');
                opponentCar.visible = true;
                opponentCar.position.z = 0; 
                document.getElementById('rematch-btn').classList.remove('hidden');
                document.getElementById('rematch-btn').innerText = "Request Rematch";
            } else {
                document.getElementById('label-remote').classList.add('hidden');
                opponentCar.visible = false;
                document.getElementById('rematch-btn').classList.add('hidden');
                if(obstacles.length === 0) for(let i=0; i<6; i++) spawnObstacle(-60 - (i * 35));
            }
        }

        function switchLane(dir) {
            if (!gameState.isPlaying) return;
            const next = gameState.lane + dir;
            if (next >= -1 && next <= 1) { 
                gameState.lane = next; 
                targetLaneX = next * CONFIG.laneWidth; 
                if(gameState.isMultiplayer && mpState.roomId) {
                    update(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`), { lane: gameState.lane });
                }
            }
        }

        // --- 3D HELPERS ---
        function getObstacleColor(idx) {
            const colors = [0x2980b9, 0xf39c12, 0x8e44ad, 0xffffff];
            return colors[idx % colors.length];
        }

        function setupLighting() {
            const amb = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(amb);
            const sun = new THREE.DirectionalLight(0xffffff, 5); 
            sun.position.set(30, 60, 30);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            scene.add(sun);
            const pmrem = new THREE.PMREMGenerator(renderer);
            envMap = pmrem.fromScene(new THREE.Scene()).texture;
            scene.environment = envMap;
        }

        function setupPostProcessing() {
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            const bloom = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.4, 0.85);
            composer.addPass(bloom);
            composer.addPass(new THREE.SMAAPass(window.innerWidth, window.innerHeight));
            composer.addPass(new THREE.ShaderPass(THREE.GammaCorrectionShader));
        }

        function loop() {
            requestAnimationFrame(loop);
            const delta = clock.getDelta();
            
            if (gameState.isPlaying) {
                gameState.speed = Math.min(CONFIG.maxSpeed, gameState.speed + delta * CONFIG.speedIncrement);
                gameState.distance += gameState.speed * delta;
                scoreEl.innerText = Math.floor(gameState.distance).toString().padStart(4, '0') + "m";

                playerCar.position.x = THREE.MathUtils.lerp(playerCar.position.x, targetLaneX, delta * 12);
                playerCar.rotation.z = (playerCar.position.x - targetLaneX) * -0.12;

                if(gameState.isMultiplayer && opponentCar) {
                    const tx = mpState.opponentLane * CONFIG.laneWidth;
                    const dist = Math.abs(opponentCar.position.x - tx);
                    if(dist < 0.2) opponentCar.position.x = tx; 
                    else opponentCar.position.x = THREE.MathUtils.lerp(opponentCar.position.x, tx, delta * 25);
                    
                    opponentCar.rotation.z = (opponentCar.position.x - tx) * -0.12;
                    
                    const isSame = Math.abs(playerCar.position.x - opponentCar.position.x) < 2;
                    opponentCar.children.forEach(c => { if(c.material) { c.material.transparent = true; c.material.opacity = isSame ? 0.3 : 1.0; } });

                    updateLabel(playerCar, document.getElementById('label-local'), "YOU");
                    updateLabel(opponentCar, document.getElementById('label-remote'), "OPPONENT");
                }

                const time = clock.getElapsedTime();
                const intensity = (gameState.speed / CONFIG.maxSpeed) * 0.04;
                camera.position.x = (Math.sin(time * 60) * intensity) + (playerCar.position.x * 0.15);
                camera.position.y = 5 + (Math.cos(time * 45) * intensity);

                const move = gameState.speed * delta;
                roadLines.forEach(l => { l.position.z += move; if(l.position.z > 20) l.position.z -= 250; });
                scenery.forEach(s => { s.position.z += move; if(s.position.z > 20) s.position.z = -200 - Math.random()*100; });
                
                for(let i=obstacles.length-1; i>=0; i--) {
                    const ob = obstacles[i];
                    ob.position.z += move + (delta * 10); 
                    if(ob.position.z > 20) ob.position.z -= (obstacles.length * 35);
                    if(Math.abs(playerCar.position.x - ob.position.x) < 1.4 && Math.abs(playerCar.position.z - ob.position.z) < 3.2) {
                        gameOver(false);
                    }
                }
            } else {
                camera.position.x = Math.sin(clock.getElapsedTime()*0.5) * 3;
            }
            composer.render();
        }

        function updateLabel(obj, el, txt) {
            if(!obj.visible || !gameState.isPlaying) { el.style.opacity = 0; return; }
            const v = obj.position.clone(); v.y += 2; v.project(camera);
            if(v.z > 1) { el.style.opacity = 0; return; }
            const x = (v.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(v.y * 0.5) + 0.5) * window.innerHeight;
            el.style.transform = `translate(-50%, -100%)`;
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            el.style.opacity = 1;
        }

        function createCar(color, isPlayer, type) {
            const grp = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.1, metalness: 0.7 });
            const lightMat = new THREE.MeshStandardMaterial({ color: isPlayer ? 0xff0000 : 0xffffaa, emissive: isPlayer ? 0xff0000 : 0xffffaa, emissiveIntensity: 12 });

            if (type === 'car') {
                const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.8), bodyMat);
                chassis.position.y = 0.5; chassis.castShadow = true; grp.add(chassis);
                const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 2), new THREE.MeshPhysicalMaterial({ color: 0x050505, roughness: 0, metalness: 1, transparent: true, opacity: 0.8 }));
                cabin.position.set(0, 1.05, -0.2); grp.add(cabin);
                const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 24); wheelGeo.rotateZ(Math.PI/2);
                [{x:-0.95, z:1.2}, {x:0.95, z:1.2}, {x:-0.95, z:-1.2}, {x:0.95, z:-1.2}].forEach(p => {
                    const w = new THREE.Mesh(wheelGeo, new THREE.MeshStandardMaterial({color:0x080808}));
                    w.position.set(p.x, 0.35, p.z); grp.add(w);
                });
            } else if (type === 'bike') {
                const frame = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 2.5), bodyMat);
                frame.position.y = 0.8; grp.add(frame);
                const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 24); wheelGeo.rotateZ(Math.PI/2);
                const w1 = new THREE.Mesh(wheelGeo, new THREE.MeshStandardMaterial({color:0x080808}));
                w1.position.set(0, 0.45, 1); grp.add(w1);
                const w2 = w1.clone(); w2.position.z = -1; grp.add(w2);
            } else if (type === 'hyper') {
                const base = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 4.5), bodyMat);
                base.position.y = 0.3; grp.add(base);
                const top = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 2.5), bodyMat);
                top.position.set(0, 0.7, -0.5); grp.add(top);
                const wing = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.1, 0.6), new THREE.MeshStandardMaterial({color:0x000000}));
                wing.position.set(0, 0.8, 1.8); grp.add(wing);
            }
            const lg = new THREE.BoxGeometry(0.45, 0.2, 0.1);
            const l1 = new THREE.Mesh(lg, lightMat); l1.position.set(-0.6, 0.6, 1.91); grp.add(l1);
            const l2 = l1.clone(); l2.position.x = 0.6; grp.add(l2);
            return grp;
        }

        function createWorld() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshStandardMaterial({ color: CONFIG.colors.grass, roughness: 1 }));
            ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
            const road = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.roadWidth, 400), new THREE.MeshStandardMaterial({ color: CONFIG.colors.road, roughness: 0.8 }));
            road.rotation.x = -Math.PI / 2; road.position.y = 0.05; road.receiveShadow = true; scene.add(road);
            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 2 });
            for (let i = 0; i < 25; i++) {
                const l = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 3.5), lineMat);
                l.rotation.x = -Math.PI / 2; l.position.set(-CONFIG.laneWidth/2, 0.08, -i * 12);
                scene.add(l); roadLines.push(l);
                const r = l.clone(); r.position.x = CONFIG.laneWidth / 2; scene.add(r); roadLines.push(r);
            }
            for (let i = 0; i < 50; i++) spawnTree(-Math.random() * 150);
        }

        function spawnTree(z) {
            const t = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.3,1.5), new THREE.MeshStandardMaterial({color:0x3e2723}));
            trunk.position.y = 0.75; t.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.5,4,8), new THREE.MeshStandardMaterial({color:0x1b5e20}));
            leaves.position.y = 2.5; t.add(leaves);
            t.position.set((Math.random() > 0.5 ? 1 : -1) * (10 + Math.random()*25), 0, z);
            scene.add(t); scenery.push(t);
        }

        function spawnObstacle(z) {
            const colors = [0x2980b9, 0xf39c12, 0x8e44ad, 0xffffff];
            const ob = createCar(colors[Math.floor(Math.random()*colors.length)], false, 'car');
            ob.position.set((Math.floor(Math.random() * 3)-1) * CONFIG.laneWidth, 0, z);
            scene.add(ob); obstacles.push(ob);
        }

        function gameOver(isWin) {
            gameState.isPlaying = false;
            document.getElementById('final-score').innerText = Math.floor(gameState.distance);
            const title = document.getElementById('go-title');
            if(gameState.isMultiplayer) {
                title.innerText = isWin ? "VICTORY" : "WASTED";
                title.style.color = isWin ? "#ffcc00" : "white";
                if(!isWin) update(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`), { status: 'dead' });
            } else {
                title.innerText = "WASTED"; title.style.color = "white";
            }
            gameOverScreen.classList.remove('hidden');
        }

        window.backToMain = function() {
            if(mpState.roomId) {
                if(mpState.amIHost) remove(ref(db, `carr_rooms/${mpState.roomId}`));
                else remove(ref(db, `carr_rooms/${mpState.roomId}/players/${mpState.playerId}`));
            }
            if(roomSubscription) roomSubscription();
            
            mpState.roomId = null; gameState.isMultiplayer = false;
            window.history.pushState({}, document.title, window.location.pathname.split('?')[0]); 
            startScreen.classList.remove('hidden'); mpMenu.classList.add('hidden'); lobbyScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden');
        };
        window.cancelMatchmaking = function() { remove(ref(db, `carr_matchmaking/${mpState.playerId}`)); backToMain(); };
        window.closeCustom = function() { customScreen.classList.add('hidden'); startScreen.classList.remove('hidden'); };
        window.selectVehicle = function(type) {
            gameState.vehicle = type; document.querySelectorAll('.vehicle-card').forEach(c => c.classList.remove('active')); event.currentTarget.classList.add('active'); updatePlayerModel();
        };

        function updatePlayerModel() {
            if(playerCar) scene.remove(playerCar); playerCar = createCar(CONFIG.colors.player, true, gameState.vehicle); scene.add(playerCar);
        }

        init();
    </script>
</body>
</html>
