<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Forest Run 3D - Multiplayer Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #020205;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        #score-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 4px;
            border-left: 4px solid #ffcc00;
            backdrop-filter: blur(5px);
        }

        /* MASTERPIECE HOME SCREEN */
        #start-screen, #game-over-screen, #custom-screen, #mp-lobby-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.85) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            backdrop-filter: blur(15px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .hidden { opacity: 0; pointer-events: none !important; transform: scale(1.1); }

        h1 {
            color: white;
            font-size: clamp(3rem, 10vw, 6rem);
            margin: 0;
            text-transform: uppercase;
            font-style: italic;
            font-weight: 900;
            letter-spacing: -4px;
            line-height: 0.85;
            text-align: center;
        }

        .sub-tag {
            color: #ffcc00;
            font-size: 0.9rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 700;
        }

        .menu-v-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }

        button {
            background: #fff;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
        }

        button:hover {
            background: #ffcc00;
            transform: translateX(10px) skewX(-5deg);
        }

        button.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #555;
        }

        /* CUSTOMIZATION GRID */
        .garage-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .vehicle-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            color: white;
            border-radius: 8px;
        }

        .vehicle-card.active {
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
        }

        .vehicle-card img { width: 80px; height: auto; margin-bottom: 10px; filter: invert(1); opacity: 0.8; }
        .vehicle-card span { display: block; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px; }

        .controls-hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            opacity: 0.4;
            color: white;
            letter-spacing: 2px;
        }

        /* MULTIPLAYER SPECIFIC */
        #mp-labels {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .player-label {
            position: absolute;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 800;
            transform: translate(-50%, -100%);
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .player-label.is-me { border-color: #ffcc00; color: #ffcc00; }
        .player-label.is-opp { border-color: #ff4444; color: #ff4444; }

        #mp-status {
            margin-top: 20px;
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        #countdown-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            display: flex; justify-content: center; align-items: center;
            font-size: 15rem; font-weight: 900; color: #ffcc00;
            text-shadow: 0 0 30px rgba(255,204,0,0.5);
            pointer-events: none; z-index: 20;
            opacity: 0; transition: opacity 0.2s;
        }

        #link-container {
            display: flex; gap: 10px; margin-top: 20px;
            opacity: 0.5; transition: 0.3s;
        }
        #link-container.visible { opacity: 1; }
        #invite-link {
            background: rgba(0,0,0,0.5); border: 1px solid #444; color: #fff;
            padding: 10px; font-family: monospace; width: 200px;
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/GammaCorrectionShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/SMAAShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/SMAAPass.js"></script>
</head>
<body>

    <div id="game-container"></div>
    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-display">0000m</div>
        </div>
        <div id="mp-labels"></div>
        <div id="countdown-overlay">3</div>
    </div>

    <div id="start-screen">
        <h1>FOREST<br>RUN</h1>
        <div class="sub-tag">ULTIMATE EDITION</div>
        
        <div class="menu-v-stack">
            <button id="start-btn">Single Player</button>
            <button id="mp-menu-btn" style="color:#ffcc00; border:1px solid #ffcc00;">Multiplayer</button>
            <button id="custom-btn" class="secondary">Garage / Custom</button>
        </div>
        
        <div class="controls-hint">USE ARROWS OR SWIPE TO DRIVE</div>
    </div>

    <div id="mp-lobby-screen" class="hidden">
        <h1>MULTIPLAYER</h1>
        <div class="sub-tag">SELECT MODE</div>
        
        <div class="menu-v-stack" id="mp-mode-select">
            <button onclick="MP.startRandomMatch()">Random Duel</button>
            <button onclick="MP.createFriendRoom()">Create Friend Room</button>
            <button class="secondary" onclick="MP.backToMenu()">Back</button>
        </div>

        <div id="mp-waiting" class="hidden" style="text-align: center;">
            <h2 style="color:white;">WAITING...</h2>
            <div id="mp-status">Connecting to server...</div>
            <div id="link-container" class="hidden">
                <input type="text" id="invite-link" readonly>
                <button style="padding: 10px;" onclick="MP.copyLink()">COPY</button>
            </div>
            <button class="secondary" style="margin-top:30px;" onclick="MP.cancelMatch()">Cancel</button>
        </div>
    </div>

    <div id="custom-screen" class="hidden">
        <h1>GARAGE</h1>
        <div class="sub-tag">SELECT YOUR MACHINE</div>
        
        <div class="garage-grid">
            <div class="vehicle-card active" onclick="selectVehicle('car')">
                <span>CLASSIC RIG</span>
            </div>
            <div class="vehicle-card" onclick="selectVehicle('bike')">
                <span>VOLT BIKE</span>
            </div>
            <div class="vehicle-card" onclick="selectVehicle('hyper')">
                <span>HYPER BOLT</span>
            </div>
        </div>

        <button onclick="closeCustom()">Back to Menu</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1 id="go-title">WASTED</h1>
        <p class="sub-tag">DISTANCE: <span id="final-score">0</span>M</p>
        <div class="menu-v-stack">
            <button id="restart-btn">Try Again</button>
            <button id="mp-rematch-btn" class="hidden" onclick="MP.requestRematch()">Rematch</button>
            <button class="secondary" onclick="location.reload()">Main Menu</button>
        </div>
        <p id="rematch-status" style="color:white; margin-top:10px; font-weight:bold;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update, remove, push, get, onDisconnect, serverTimestamp, child } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALsegXQGNrzOGpM7uO6EE1dAB0TDvY9Qo",
            authDomain: "carr-7a756.firebaseapp.com",
            databaseURL: "https://carr-7a756-default-rtdb.firebaseio.com",
            projectId: "carr-7a756",
            storageBucket: "carr-7a756.firebasestorage.app",
            messagingSenderId: "1052404189266",
            appId: "1:1052404189266:web:e35db0e5e62e079ed6378b",
            measurementId: "G-H713EXVQVH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let userId = null;
        let currentRoomId = null;
        let isHost = false;
        let opponentId = null;
        let roomRef = null;
        let unsubscribeRoom = null;
        let gameSeed = 1; // Default seed

        // Pseudo Random Number Generator for Deterministic Obstacles
        function mulberry32(a) {
            return function() {
              var t = a += 0x6D2B79F5;
              t = Math.imul(t ^ (t >>> 15), t | 1);
              t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
              return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            }
        }
        let rng = Math.random; // Default to random for singleplayer

        // Global MP Object to be accessible by HTML
        window.MP = {
            active: false,
            opponentData: { lane: 0, distance: 0, alive: true },
            
            init: () => {
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                        // Check for Invite Link
                        const urlParams = new URLSearchParams(window.location.search);
                        const inviteRoom = urlParams.get('room');
                        if (inviteRoom) {
                            MP.joinFriendRoom(inviteRoom);
                        }
                    }
                });
            },

            backToMenu: () => {
                document.getElementById('mp-lobby-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
            },

            startRandomMatch: async () => {
                MP.showWaiting("Looking for opponent...");
                const mmRef = ref(db, 'matchmaking');
                
                // Look for waiting player
                const snapshot = await get(mmRef);
                let foundMatch = false;

                if (snapshot.exists()) {
                    snapshot.forEach(childSnap => {
                        if (!foundMatch && childSnap.key !== userId) {
                            // Join this player
                            const otherId = childSnap.key;
                            remove(ref(db, `matchmaking/${otherId}`)); // Remove them from queue
                            MP.createRoom(otherId, userId); // Create room with them
                            foundMatch = true;
                        }
                    });
                }

                if (!foundMatch) {
                    // Add self to queue
                    const myEntry = ref(db, `matchmaking/${userId}`);
                    set(myEntry, { timestamp: serverTimestamp() });
                    onDisconnect(myEntry).remove();
                    
                    // Listen for being picked up
                    const roomListener = ref(db, `user_rooms/${userId}`);
                    onValue(roomListener, (snap) => {
                        if(snap.exists()) {
                            // Someone matched us
                            MP.joinRoom(snap.val());
                            remove(roomListener);
                            remove(myEntry);
                        }
                    });
                }
            },

            createFriendRoom: () => {
                const newRoomRef = push(ref(db, 'rooms'));
                const rid = newRoomRef.key;
                MP.showWaiting("Waiting for friend...");
                
                // Show Link
                const linkBox = document.getElementById('link-container');
                const linkInput = document.getElementById('invite-link');
                linkBox.classList.add('visible');
                linkBox.classList.remove('hidden');
                linkInput.value = `${window.location.origin}${window.location.pathname}?room=${rid}`;
                
                // Initialize Room
                set(newRoomRef, {
                    host: userId,
                    status: 'waiting',
                    seed: Math.floor(Math.random() * 100000)
                });
                
                onDisconnect(newRoomRef).remove(); // Cleanup if host leaves early
                MP.joinRoom(rid, true);
            },

            joinFriendRoom: (rid) => {
                document.getElementById('start-screen').classList.add('hidden');
                MP.showWaiting("Joining Room...");
                
                const rRef = ref(db, `rooms/${rid}`);
                get(rRef).then(snap => {
                    if(snap.exists() && snap.val().status === 'waiting') {
                        update(rRef, { guest: userId, status: 'ready' });
                        MP.joinRoom(rid, false);
                    } else {
                        alert("Room not found or game started");
                        window.location.href = window.location.pathname; // Clear params
                    }
                });
            },

            joinRoom: (rid, host = false) => {
                currentRoomId = rid;
                isHost = host;
                roomRef = ref(db, `rooms/${rid}`);
                
                // If I was waiting in queue, clean up
                remove(ref(db, `matchmaking/${userId}`));

                // Set user_room for handshake
                if(host) set(ref(db, `user_rooms/${userId}`), rid);

                // Initialize Player State in Room
                update(ref(db, `rooms/${rid}/players/${userId}`), {
                    lane: 0, distance: 0, alive: true, rematch: false
                });
                onDisconnect(ref(db, `rooms/${rid}/players/${userId}`)).remove();

                // Listen to Room Changes
                unsubscribeRoom = onValue(roomRef, (snap) => {
                    const data = snap.val();
                    if(!data) { MP.cancelMatch(); return; } // Room deleted

                    // Determine Opponent ID
                    if (data.players) {
                        const ids = Object.keys(data.players);
                        opponentId = ids.find(id => id !== userId);
                    }

                    if (opponentId && data.players[opponentId]) {
                        MP.opponentData = data.players[opponentId];
                    }

                    // Game Flow
                    if (data.status === 'ready' && isHost) {
                        // Start countdown automatically
                        setTimeout(() => update(roomRef, { status: 'countdown', startTime: Date.now() + 3000 }), 500);
                    }

                    if (data.status === 'countdown') {
                        MP.active = true;
                        gameSeed = data.seed;
                        rng = mulberry32(gameSeed); // SYNC RNG
                        document.getElementById('mp-lobby-screen').classList.add('hidden');
                        document.getElementById('link-container').classList.add('hidden');
                        MP.startCountdown();
                    }
                    
                    if (data.status === 'playing') {
                        // Ensure game is running
                    }

                    // Check Win/Loss
                    if (MP.active && data.status === 'finished') {
                        // Logic handled in game loop, but safety check
                    }
                    
                    // Rematch Logic
                    if (data.players && data.players[userId] && data.players[opponentId]) {
                        if (data.players[userId].rematch && data.players[opponentId].rematch && isHost) {
                            // Reset Game
                            const newSeed = Math.floor(Math.random() * 100000);
                            update(roomRef, { 
                                status: 'countdown', 
                                seed: newSeed,
                                startTime: Date.now() + 3000
                            });
                            // Reset players
                            update(ref(db, `rooms/${rid}/players/${userId}`), { alive:true, distance:0, lane:0, rematch:false });
                            update(ref(db, `rooms/${rid}/players/${opponentId}`), { alive:true, distance:0, lane:0, rematch:false });
                        }
                    }
                });
            },
            
            createRoom: (otherId, myId) => {
                const newRef = push(ref(db, 'rooms'));
                const rid = newRef.key;
                set(newRef, {
                    host: myId,
                    guest: otherId,
                    status: 'ready', // Immediately ready for random match
                    seed: Math.floor(Math.random() * 100000)
                });
                // Tell other player where to join
                set(ref(db, `user_rooms/${otherId}`), rid);
                MP.joinRoom(rid, true);
            },

            showWaiting: (msg) => {
                document.getElementById('mp-lobby-screen').classList.remove('hidden');
                document.getElementById('mp-mode-select').classList.add('hidden');
                document.getElementById('mp-waiting').classList.remove('hidden');
                document.getElementById('mp-status').innerText = msg;
            },

            cancelMatch: () => {
                if(currentRoomId) remove(ref(db, `rooms/${currentRoomId}`)); // Nuke room
                location.reload();
            },
            
            copyLink: () => {
                const copyText = document.getElementById("invite-link");
                copyText.select();
                document.execCommand("copy");
                alert("Link Copied!");
            },

            startCountdown: () => {
                const overlay = document.getElementById('countdown-overlay');
                let count = 3;
                
                // Reset Game State for engine
                window.resetGameEngine(true); 
                
                overlay.style.opacity = 1;
                overlay.innerText = count;
                
                const timer = setInterval(() => {
                    count--;
                    if(count > 0) {
                        overlay.innerText = count;
                    } else if (count === 0) {
                        overlay.innerText = "GO!";
                        if(isHost) update(roomRef, { status: 'playing' });
                        window.engineStartGame();
                    } else {
                        clearInterval(timer);
                        overlay.style.opacity = 0;
                    }
                }, 1000);
            },

            updateState: (lane, distance, alive) => {
                if(!currentRoomId || !userId) return;
                update(ref(db, `rooms/${currentRoomId}/players/${userId}`), {
                    lane: lane,
                    distance: distance,
                    alive: alive
                });
            },

            handleGameOver: (iDied) => {
                 // If I died, I report it. The listener picks up both states.
                 if(iDied) MP.updateState(window.gameState.lane, window.gameState.distance, false);
                 
                 document.getElementById('restart-btn').classList.add('hidden');
                 document.getElementById('mp-rematch-btn').classList.remove('hidden');
                 
                 const status = document.getElementById('rematch-status');
                 status.innerText = "";
                 
                 // Listener handles "Who Won" text based on who died first
            },

            requestRematch: () => {
                if(!currentRoomId) return;
                update(ref(db, `rooms/${currentRoomId}/players/${userId}`), { rematch: true });
                document.getElementById('mp-rematch-btn').innerText = "Waiting...";
                document.getElementById('mp-rematch-btn').disabled = true;
                document.getElementById('rematch-status').innerText = "Waiting for opponent...";
            }
        };

        // Initialize Auth
        MP.init();

        // -----------------------------------------------------------
        // EXISTING GAME LOGIC (MODIFIED FOR MP hooks)
        // -----------------------------------------------------------

        const CONFIG = {
            laneWidth: 3.5,
            startSpeed: 40,
            speedIncrement: 0.8,
            maxSpeed: 110,
            roadWidth: 12,
            fogDensity: 0.01,
            colors: {
                sky: 0x020205,
                grass: 0x081208,
                road: 0x111111,
                player: 0xff0000, 
                opponent: 0x0088ff // Blue for opponent
            }
        };

        let gameState = { isPlaying: false, speed: CONFIG.startSpeed, lane: 0, distance: 0, vehicle: 'car' };
        window.gameState = gameState; // Expose
        let scene, camera, renderer, composer, clock, envMap;
        let playerCar, opponentCar, obstacles = [], scenery = [], roadLines = [];
        let touchStartX = 0, targetLaneX = 0;
        let labelsContainer;

        const scoreEl = document.getElementById('score-display'), finalScoreEl = document.getElementById('final-score');
        const startScreen = document.getElementById('start-screen'), 
              gameOverScreen = document.getElementById('game-over-screen'),
              customScreen = document.getElementById('custom-screen');

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.colors.sky);
            scene.fog = new THREE.FogExp2(CONFIG.colors.sky, CONFIG.fogDensity);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 400);
            camera.position.set(0, 5, 9);
            camera.lookAt(0, 2, -10);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.physicallyCorrectLights = true;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.4;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('game-container').appendChild(renderer.domElement);
            
            labelsContainer = document.getElementById('mp-labels');

            clock = new THREE.Clock();

            setupLighting();
            setupPostProcessing();
            createWorld();

            updatePlayerModel();
            
            // Create Opponent Placeholder
            opponentCar = createCar(CONFIG.colors.opponent, false, 'car');
            opponentCar.visible = false;
            scene.add(opponentCar);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
            document.addEventListener('touchend', e => {
                const diff = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(diff) > 40) switchLane(diff > 0 ? 1 : -1);
            });

            document.getElementById('start-btn').onclick = () => { MP.active = false; rng = Math.random; startGame(); };
            document.getElementById('restart-btn').onclick = () => { MP.active = false; rng = Math.random; startGame(); };
            document.getElementById('custom-btn').onclick = () => {
                startScreen.classList.add('hidden');
                customScreen.classList.remove('hidden');
            };
            
            // MP Menu Button
            document.getElementById('mp-menu-btn').onclick = () => {
                startScreen.classList.add('hidden');
                document.getElementById('mp-lobby-screen').classList.remove('hidden');
                document.getElementById('mp-mode-select').classList.remove('hidden');
                document.getElementById('mp-waiting').classList.add('hidden');
            };

            loop();
        }

        function setupLighting() {
            const amb = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(amb);
            const sun = new THREE.DirectionalLight(0xffffff, 5);
            sun.position.set(30, 60, 30);
            sun.castShadow = true;
            sun.shadow.mapSize.set(2048, 2048);
            scene.add(sun);
            const pmrem = new THREE.PMREMGenerator(renderer);
            envMap = pmrem.fromScene(new THREE.Scene()).texture;
            scene.environment = envMap;
        }

        function setupPostProcessing() {
            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            const bloom = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.4, 0.85);
            composer.addPass(bloom);
            composer.addPass(new THREE.SMAAPass(window.innerWidth, window.innerHeight));
            composer.addPass(new THREE.ShaderPass(THREE.GammaCorrectionShader));
        }

        function createCar(color, isPlayer, type = 'car') {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.1, metalness: 0.7 });
            const lightMat = new THREE.MeshStandardMaterial({ 
                color: isPlayer ? 0xff0000 : 0xffffaa, 
                emissive: isPlayer ? 0xff0000 : 0xffffaa, 
                emissiveIntensity: 12 
            });

            if (type === 'car') {
                const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.8), bodyMat);
                chassis.position.y = 0.5; chassis.castShadow = true; group.add(chassis);
                const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 2), new THREE.MeshPhysicalMaterial({ color: 0x050505, roughness: 0, metalness: 1, transparent: true, opacity: 0.8 }));
                cabin.position.set(0, 1.05, -0.2); group.add(cabin);
                const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 24); wheelGeo.rotateZ(Math.PI/2);
                [{x:-0.95, z:1.2}, {x:0.95, z:1.2}, {x:-0.95, z:-1.2}, {x:0.95, z:-1.2}].forEach(p => {
                    const w = new THREE.Mesh(wheelGeo, new THREE.MeshStandardMaterial({color:0x080808}));
                    w.position.set(p.x, 0.35, p.z); group.add(w);
                });
            } else if (type === 'bike') {
                const frame = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 2.5), bodyMat);
                frame.position.y = 0.8; group.add(frame);
                const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 24); wheelGeo.rotateZ(Math.PI/2);
                const w1 = new THREE.Mesh(wheelGeo, new THREE.MeshStandardMaterial({color:0x080808}));
                w1.position.set(0, 0.45, 1); group.add(w1);
                const w2 = w1.clone(); w2.position.z = -1; group.add(w2);
            } else if (type === 'hyper') {
                const base = new THREE.Mesh(new THREE.BoxGeometry(2, 0.4, 4.5), bodyMat);
                base.position.y = 0.3; group.add(base);
                const top = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 2.5), bodyMat);
                top.position.set(0, 0.7, -0.5); group.add(top);
                const wing = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.1, 0.6), new THREE.MeshStandardMaterial({color:0x000000}));
                wing.position.set(0, 0.8, 1.8); group.add(wing);
            }

            // Generic Lights
            const lg = new THREE.BoxGeometry(0.45, 0.2, 0.1);
            const l1 = new THREE.Mesh(lg, lightMat); l1.position.set(-0.6, 0.6, 1.91); group.add(l1);
            const l2 = l1.clone(); l2.position.x = 0.6; group.add(l2);

            return group;
        }

        function updatePlayerModel() {
            if (playerCar) scene.remove(playerCar);
            playerCar = createCar(CONFIG.colors.player, true, gameState.vehicle);
            scene.add(playerCar);
        }

        function selectVehicle(type) {
            gameState.vehicle = type;
            document.querySelectorAll('.vehicle-card').forEach(card => card.classList.remove('active'));
            event.currentTarget.classList.add('active');
            updatePlayerModel();
        }

        function closeCustom() {
            customScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }

        function createWorld() {
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshStandardMaterial({ color: CONFIG.colors.grass, roughness: 1 }));
            ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
            scene.add(ground);
            const roadPlane = new THREE.Mesh(new THREE.PlaneGeometry(CONFIG.roadWidth, 400), new THREE.MeshStandardMaterial({ color: CONFIG.colors.road, roughness: 0.8 }));
            roadPlane.rotation.x = -Math.PI / 2; roadPlane.position.y = 0.08; roadPlane.receiveShadow = true;
            scene.add(roadPlane);

            const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 2 });
            for (let i = 0; i < 25; i++) {
                const lineL = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 3.5), lineMat);
                lineL.rotation.x = -Math.PI / 2; lineL.position.set(-CONFIG.laneWidth/2, 0.1, -i * 12);
                scene.add(lineL); roadLines.push(lineL);
                const lineR = lineL.clone(); lineR.position.x = CONFIG.laneWidth / 2;
                scene.add(lineR); roadLines.push(lineR);
            }
            for (let i = 0; i < 50; i++) spawnTree(-Math.random() * 150);
        }

        function spawnTree(z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5), new THREE.MeshStandardMaterial({color: 0x1a0d00}));
            trunk.position.y = 0.75; tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.4, 4.5, 7), new THREE.MeshStandardMaterial({color: 0x051105, roughness: 1}));
            leaves.position.y = 3; leaves.castShadow = true; tree.add(leaves);
            tree.position.set((Math.random() > 0.5 ? 1 : -1) * (10 + Math.random()*25), 0, z);
            scene.add(tree); scenery.push(tree);
        }

        function spawnObstacle(z) {
            const colors = [0x2980b9, 0xf39c12, 0x8e44ad, 0xffffff];
            // USE RNG HERE for Sync
            const color = colors[Math.floor(rng()*colors.length)];
            const ob = createCar(color, false, 'car');
            const lanePos = (Math.floor(rng()*3)-1);
            
            ob.position.set(lanePos * CONFIG.laneWidth, 0, z);
            scene.add(ob); obstacles.push(ob);
        }

        // Reset state but don't start loop immediately (for MP countdown)
        window.resetGameEngine = function(isMP) {
            gameState.distance = 0; gameState.speed = CONFIG.startSpeed;
            gameState.lane = 0; targetLaneX = 0;
            obstacles.forEach(o => scene.remove(o)); obstacles = [];
            // Seed obstacles
            for(let i=0; i<6; i++) spawnObstacle(-60 - (i * 35));
            
            startScreen.classList.add('hidden'); 
            gameOverScreen.classList.add('hidden'); 
            customScreen.classList.add('hidden');
            
            // Clean UI
            document.getElementById('mp-rematch-btn').disabled = false;
            document.getElementById('mp-rematch-btn').innerText = "Rematch";
        }
        
        // Triggered by "Single Player" or MP Countdown
        window.engineStartGame = function() {
            gameState.isPlaying = true;
        }

        function startGame() {
            window.resetGameEngine(false);
            window.engineStartGame();
        }

        function switchLane(dir) {
            if (!gameState.isPlaying) return;
            const next = gameState.lane + dir;
            if (next >= -1 && next <= 1) { gameState.lane = next; targetLaneX = next * CONFIG.laneWidth; }
        }

        function handleKeyDown(e) {
            if (e.key === 'ArrowLeft') switchLane(-1);
            if (e.key === 'ArrowRight') switchLane(1);
            if (e.code === 'Space' && !gameState.isPlaying && !MP.active) startGame();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function updateLabels(localPos, oppPos, oppAlive) {
            labelsContainer.innerHTML = '';
            
            // Function to project 3D to 2D
            const createLabel = (pos, text, type) => {
                const vec = pos.clone();
                vec.y += 1.5; // Offset
                vec.project(camera);
                
                // Check if in front of camera
                if(vec.z > 1) return;

                const x = (vec.x * .5 + .5) * window.innerWidth;
                const y = (-(vec.y * .5) + .5) * window.innerHeight;
                
                const el = document.createElement('div');
                el.className = `player-label ${type}`;
                el.innerText = text;
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
                labelsContainer.appendChild(el);
            };

            createLabel(playerCar.position, "YOU", "is-me");
            if(oppAlive) createLabel(opponentCar.position, "OPPONENT", "is-opp");
        }

        function loop() {
            requestAnimationFrame(loop);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (gameState.isPlaying) {
                gameState.speed = Math.min(CONFIG.maxSpeed, gameState.speed + delta * CONFIG.speedIncrement);
                gameState.distance += gameState.speed * delta;
                scoreEl.innerText = Math.floor(gameState.distance).toString().padStart(4, '0') + "m";

                // Physics
                playerCar.position.x = THREE.MathUtils.lerp(playerCar.position.x, targetLaneX, delta * 12);
                playerCar.rotation.z = (playerCar.position.x - targetLaneX) * -0.12;
                playerCar.rotation.y = (playerCar.position.x - targetLaneX) * 0.05;

                // Camera Logic
                camera.fov = 65 + (gameState.speed / CONFIG.maxSpeed) * 15;
                camera.updateProjectionMatrix();

                const intensity = (gameState.speed / CONFIG.maxSpeed) * 0.04;
                camera.position.x = (Math.sin(time * 60) * intensity) + (playerCar.position.x * 0.15);
                camera.position.y = 5 + (Math.cos(time * 45) * intensity);

                // Multiplayer Sync
                if (MP.active) {
                    // Send my data
                    MP.updateState(gameState.lane, gameState.distance, true);

                    // Visualize Opponent
                    if (MP.opponentData.alive) {
                        opponentCar.visible = true;
                        // Calculate relative Z based on distance difference
                        const zDiff = MP.opponentData.distance - gameState.distance;
                        // Clamp Z so it doesn't fly off to infinity if desync
                        opponentCar.position.z = zDiff; 
                        
                        // Lerp X for smooth movement
                        const oppTargetX = MP.opponentData.lane * CONFIG.laneWidth;
                        opponentCar.position.x = THREE.MathUtils.lerp(opponentCar.position.x, oppTargetX, delta * 10);
                        opponentCar.rotation.z = (opponentCar.position.x - oppTargetX) * -0.12;

                        // Ghosting Logic
                        if (gameState.lane === MP.opponentData.lane) {
                            // Ghost mode
                            opponentCar.traverse(c => {
                                if(c.material) { c.material.transparent = true; c.material.opacity = 0.5; }
                            });
                        } else {
                            // Solid
                            opponentCar.traverse(c => {
                                if(c.material) { c.material.transparent = false; c.material.opacity = 1.0; }
                            });
                        }
                    } else {
                        opponentCar.visible = false;
                        // Check if opponent just died to trigger win
                        if (!gameOverScreen.classList.contains('hidden')) {
                            // I am dead already, handled below
                        } else {
                            // I am alive, opponent dead -> I WIN
                             gameState.isPlaying = false;
                             finalScoreEl.innerText = Math.floor(gameState.distance);
                             document.getElementById('go-title').innerText = "VICTORY";
                             document.getElementById('go-title').style.color = "#ffcc00";
                             MP.handleGameOver(false); // I did not die
                             gameOverScreen.classList.remove('hidden');
                        }
                    }
                    
                    updateLabels(playerCar.position, opponentCar.position, MP.opponentData.alive);
                } else {
                    opponentCar.visible = false;
                    labelsContainer.innerHTML = '';
                }

                // Move World (Road)
                const moveDist = gameState.speed * delta;
                roadLines.forEach(l => {
                    l.position.z += moveDist;
                    if(l.position.z > 20) l.position.z -= 250;
                });

                // Obstacles
                for(let i=obstacles.length-1; i>=0; i--) {
                    const ob = obstacles[i];
                    ob.position.z += moveDist + (delta * 12); // Relative speed
                    if(ob.position.z > 20) {
                        scene.remove(ob); obstacles.splice(i, 1);
                        spawnObstacle(-180 - rng()*60);
                    }
                    
                    // Collision
                    if(Math.abs(playerCar.position.x - ob.position.x) < 1.4 && Math.abs(playerCar.position.z - ob.position.z) < 3.0) {
                        gameState.isPlaying = false;
                        finalScoreEl.innerText = Math.floor(gameState.distance);
                        document.getElementById('go-title').innerText = "WASTED";
                        document.getElementById('go-title').style.color = "white";
                        
                        gameOverScreen.classList.remove('hidden');
                        
                        if(MP.active) {
                            MP.handleGameOver(true);
                        }
                    }
                }

                // Scenery
                scenery.forEach(s => {
                    s.position.z += moveDist;
                    if(s.position.z > 30) s.position.z = -200 - Math.random()*100;
                });
            } else {
                // Main Menu "Idle" Camera
                camera.position.x = Math.sin(time * 0.5) * 2;
                if(MP.active) {
                     // Keep rendering labels in background of game over
                     // or stop strictly. Let's hide opponent in menu
                     opponentCar.visible = false;
                }
            }

            composer.render();
        }

        init();
    </script>
</body>
</html>
