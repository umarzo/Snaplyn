<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapReact | Precision Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981; /* Green */
            --danger: #ef4444;  /* Red */
            --warning: #f59e0b; /* Orange */
            --font: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            height: 60px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 50;
        }
        .logo { font-weight: 900; font-size: 1.25rem; letter-spacing: -0.5px; display:flex; align-items:center; gap:8px;}
        .logo i { color: var(--primary); }
        .home-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text); padding: 5px 10px; border-radius: 6px; cursor: pointer; }

        /* --- Screens --- */
        #game-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .screen {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 0;
        }
        .screen.active { opacity: 1; pointer-events: all; z-index: 10; }

        /* --- Menu --- */
        .menu-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            padding: 2rem;
            max-width: 500px;
            margin: 0 auto;
            align-self: center;
            width: 100%;
        }

        .menu-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .menu-card:active { transform: scale(0.98); background: #2d3748; }
        .card-icon { width: 50px; height: 50px; background: rgba(59, 130, 246, 0.1); color: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .card-text h3 { font-size: 1.1rem; margin-bottom: 2px; }
        .card-text p { font-size: 0.85rem; color: var(--text-muted); }

        /* --- Game Area --- */
        .game-area { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
        
        .trigger-zone {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: background 0.1s;
            user-select: none;
            position: relative;
        }

        /* Game States */
        .trigger-zone.idle { background: var(--surface); }
        .trigger-zone.waiting { background: var(--danger); }
        .trigger-zone.go { background: var(--success); }
        
        .indicator {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            margin-bottom: 1rem;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .trigger-zone.go .indicator {
            background: white;
            color: var(--success);
            transform: scale(1.2);
            border-radius: 12px; /* Shape change */
        }
        
        .status-text { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; text-align: center; }

        /* --- Split Screen --- */
        .split-wrapper { display: flex; flex-direction: column; height: 100%; }
        .p1-zone { flex: 1; transform: rotate(180deg); border-bottom: 4px solid var(--bg); }
        .p2-zone { flex: 1; border-top: 4px solid var(--bg); }

        /* --- Overlay / Modal --- */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
            padding: 2rem;
            text-align: center;
        }
        .hidden { display: none !important; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
            max-width: 300px;
        }
        .btn-outline { background: transparent; border: 2px solid var(--surface); color: var(--text-muted); margin-top: 0.5rem; }

        /* --- Lobby Styles --- */
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .copy-box {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
            margin: 1rem 0;
            border: 1px dashed var(--text-muted);
            font-size: 0.9rem;
        }

        .win-time { font-size: 4rem; font-weight: 900; color: var(--primary); margin: 10px 0; }
        .win-msg { font-size: 1.2rem; color: var(--text-muted); }

        /* --- Online Game Status --- */
        .online-status {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 20;
        }
        .online-status.online { color: var(--success); }
        .online-status.offline { color: var(--danger); }
        
        .countdown {
            font-size: 5rem;
            font-weight: 900;
            color: var(--primary);
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-bolt"></i> SnapReact</div>
        <button class="home-btn" onclick="location.href = location.pathname"><i class="fas fa-home"></i></button>
    </header>

    <div id="game-container">

        <div id="screen-menu" class="screen active">
            <div class="menu-wrapper">
                <div class="menu-card" onclick="app.startPvP()">
                    <div class="card-icon"><i class="fas fa-user-friends"></i></div>
                    <div class="card-text">
                        <h3>Local PvP</h3>
                        <p>2 Players, 1 Device (Split Screen)</p>
                    </div>
                </div>
                <div class="menu-card" onclick="app.startPvC()">
                    <div class="card-icon"><i class="fas fa-robot"></i></div>
                    <div class="card-text">
                        <h3>Vs Computer</h3>
                        <p>Challenge the AI</p>
                    </div>
                </div>
                <div class="menu-card" onclick="app.startPvF()">
                    <div class="card-icon"><i class="fas fa-link"></i></div>
                    <div class="card-text">
                        <h3>Vs Friend</h3>
                        <p>Create Link & Play Online</p>
                    </div>
                </div>
                <div class="menu-card" onclick="app.startRandom()">
                    <div class="card-icon"><i class="fas fa-globe"></i></div>
                    <div class="card-text">
                        <h3>Random Duel</h3>
                        <p>Global Matchmaking</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-single" class="screen">
            <div id="online-status" class="online-status hidden">
                <i class="fas fa-wifi"></i> <span id="status-text">Connected</span>
            </div>
            <div class="game-area">
                <div id="single-trigger" class="trigger-zone idle">
                    <div class="indicator"><i class="fas fa-fingerprint"></i></div>
                    <div class="status-text" id="single-text">WAITING...</div>
                    <div id="countdown" class="countdown hidden"></div>
                </div>
            </div>
            <div id="single-overlay" class="overlay hidden">
                <h1 id="single-result-title">WINNER</h1>
                <div class="win-time" id="single-result-time">0ms</div>
                <p class="win-msg" id="single-result-msg">Good job!</p>
                <button class="btn" id="single-replay-btn">Play Again</button>
                <button class="btn btn-outline" onclick="location.reload()">Exit</button>
            </div>
        </div>

        <div id="screen-split" class="screen">
            <div class="split-wrapper">
                <div id="p1-trigger" class="trigger-zone idle p1-zone">
                    <div class="status-text">PLAYER 1</div>
                </div>
                <div id="p2-trigger" class="trigger-zone idle p2-zone">
                    <div class="status-text">PLAYER 2</div>
                </div>
            </div>
            <div id="split-overlay" class="overlay">
                <h2 style="margin-bottom:1rem">Ready?</h2>
                <button class="btn" onclick="app.runSplitRound()">Start Round</button>
                <button class="btn btn-outline" onclick="location.reload()">Back</button>
            </div>
            <div id="split-result" class="overlay hidden">
                <h1 id="split-winner-text">PLAYER 1 WINS</h1>
                <div class="win-time" id="split-time-text">200ms</div>
                <button class="btn" onclick="app.runSplitRound()">Rematch</button>
                <button class="btn btn-outline" onclick="location.reload()">Menu</button>
            </div>
        </div>

        <div id="screen-lobby" class="screen">
            <div class="overlay" style="background:var(--bg); padding:2rem;">
                <h2 id="lobby-title">Connecting...</h2>
                <div class="loader"></div>
                <div id="lobby-content" style="width:100%; max-width:400px;"></div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, push, get, onDisconnect, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyADpppt8wUpiNrTa-axQD238ln-PI98PJc",
            authDomain: "stonepaperscissors-6c5e7.firebaseapp.com",
            databaseURL: "https://stonepaperscissors-6c5e7-default-rtdb.firebaseio.com",
            projectId: "stonepaperscissors-6c5e7",
            storageBucket: "stonepaperscissors-6c5e7.firebasestorage.app",
            messagingSenderId: "514346330500",
            appId: "1:514346330500:web:6e869a2dd9531d10c6d5d1",
            measurementId: "G-2YRBVKQ5FG"
        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getDatabase(fbApp);

        // --- GLOBAL STATE ---
        const state = {
            mode: null,
            status: 'idle', // idle, waiting, go, finished
            startTime: 0,
            timer: null,
            countdownTimer: null,
            myId: 'user_' + Math.floor(Math.random() * 1000000),
            roomId: null,
            isHost: false,
            roundNumber: 0,
            lastPing: Date.now(),
            latency: 0,
            connectionChecked: false
        };

        // --- DOM ELEMENTS ---
        const screens = {
            menu: document.getElementById('screen-menu'),
            single: document.getElementById('screen-single'),
            split: document.getElementById('screen-split'),
            lobby: document.getElementById('screen-lobby')
        };

        const ui = {
            singleTrigger: document.getElementById('single-trigger'),
            singleText: document.getElementById('single-text'),
            singleOverlay: document.getElementById('single-overlay'),
            singleReplayBtn: document.getElementById('single-replay-btn'),
            onlineStatus: document.getElementById('online-status'),
            statusText: document.getElementById('status-text'),
            countdown: document.getElementById('countdown'),
            
            p1Trigger: document.getElementById('p1-trigger'),
            p2Trigger: document.getElementById('p2-trigger'),
            splitOverlay: document.getElementById('split-overlay'),
            splitResult: document.getElementById('split-result'),

            lobbyTitle: document.getElementById('lobby-title'),
            lobbyContent: document.getElementById('lobby-content')
        };

        // --- UTILITY FUNCTIONS ---
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        function setVisualState(element, stateName, text) {
            element.classList.remove('idle', 'waiting', 'go');
            element.classList.add(stateName);
            if(text && element.querySelector('.status-text')) {
                element.querySelector('.status-text').innerText = text;
            }
        }

        function randomDelay(min = 2000, max = 5000) { 
            return Math.floor(Math.random() * (max - min)) + min;
        }

        function updateOnlineStatus(connected) {
            ui.onlineStatus.classList.remove('hidden');
            ui.onlineStatus.classList.remove('online', 'offline');
            ui.onlineStatus.classList.add(connected ? 'online' : 'offline');
            ui.statusText.innerText = connected ? 
                `Connected${state.latency ? ' • ' + state.latency + 'ms' : ''}` : 
                'Connecting...';
        }

        function showCountdown(seconds, callback) {
            let count = seconds;
            ui.countdown.classList.remove('hidden');
            ui.countdown.innerText = count;
            
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    ui.countdown.innerText = count;
                } else {
                    clearInterval(interval);
                    ui.countdown.classList.add('hidden');
                    if (callback) callback();
                }
            }, 1000);
        }

        // --- NETWORK SYNCHRONIZATION ENGINE ---
        class SynchronizationEngine {
            constructor(roomId, isHost) {
                this.roomId = roomId;
                this.isHost = isHost;
                this.roomRef = ref(db, `snapreact/rooms/${roomId}`);
                this.syncOffset = 0;
                this.pingHistory = [];
            }

            // Calculate time synchronization offset between client and server
            async calculateSyncOffset() {
                const start = Date.now();
                const syncRef = ref(db, '.info/serverTimeOffset');
                
                return new Promise((resolve) => {
                    onValue(syncRef, (snap) => {
                        const offset = snap.val();
                        this.syncOffset = offset;
                        state.latency = Date.now() - start;
                        resolve(offset);
                    }, { onlyOnce: true });
                });
            }

            // Get synchronized time (client time + offset)
            getSyncedTime() {
                return Date.now() + this.syncOffset;
            }

            // Schedule an event at a specific server time
            scheduleEvent(eventTime, callback) {
                const now = this.getSyncedTime();
                const delay = Math.max(0, eventTime - now);
                
                console.log(`Scheduling event: serverTime=${eventTime}, now=${now}, delay=${delay}`);
                
                // Clear any existing timer
                if (state.timer) clearTimeout(state.timer);
                
                state.timer = setTimeout(() => {
                    callback();
                }, delay);
                
                return delay;
            }

            // Start a synchronized round
            async startSynchronizedRound(delay = 3000) {
                if (!this.isHost) return;
                
                const startServerTime = this.getSyncedTime() + 1000; // 1 second buffer
                const goServerTime = startServerTime + delay;
                
                // Write synchronization data
                await update(this.roomRef, {
                    sync: {
                        startTime: startServerTime,
                        goTime: goServerTime,
                        delay: delay,
                        roundId: Date.now() // Unique round identifier
                    },
                    status: 'syncing',
                    taps: {},
                    roundStart: startServerTime
                });
                
                // Schedule the GO event locally
                this.scheduleEvent(goServerTime, () => {
                    if (this.isHost) {
                        update(this.roomRef, {
                            status: 'go',
                            goTime: goServerTime
                        });
                    }
                });
                
                return { startServerTime, goServerTime };
            }
        }

        // --- FAIRNESS VALIDATION SYSTEM ---
        class FairnessValidator {
            static validateTap(tapTime, goTime, maxEarlyTap = 100) {
                // Reject taps that are too early (before GO signal)
                if (tapTime < goTime - maxEarlyTap) {
                    return { valid: false, reason: 'TOO_EARLY', margin: goTime - tapTime };
                }
                
                // Reject negative times
                if (tapTime < 0) {
                    return { valid: false, reason: 'NEGATIVE_TIME' };
                }
                
                return { valid: true, reactionTime: tapTime - goTime };
            }

            static determineWinner(taps, goTime) {
                const validTaps = {};
                const earlyTappers = [];
                
                // Validate all taps
                Object.entries(taps).forEach(([playerId, tapData]) => {
                    const validation = this.validateTap(tapData.time, goTime);
                    
                    if (validation.valid) {
                        validTaps[playerId] = validation.reactionTime;
                    } else if (validation.reason === 'TOO_EARLY') {
                        earlyTappers.push(playerId);
                    }
                });
                
                // If someone tapped early, they lose
                if (earlyTappers.length > 0) {
                    // Find the non-cheating player
                    const allPlayers = Object.keys(taps);
                    const winner = allPlayers.find(p => !earlyTappers.includes(p));
                    return {
                        winner: winner,
                        winTime: -1,
                        reason: 'FALSE_START',
                        cheater: earlyTappers[0]
                    };
                }
                
                // Find fastest valid tap
                let fastestPlayer = null;
                let fastestTime = Infinity;
                
                Object.entries(validTaps).forEach(([playerId, reactionTime]) => {
                    if (reactionTime < fastestTime) {
                        fastestTime = reactionTime;
                        fastestPlayer = playerId;
                    }
                });
                
                return {
                    winner: fastestPlayer,
                    winTime: fastestTime,
                    reason: 'FASTEST_TAP'
                };
            }
        }

        // --- MAIN APP LOGIC ---
        const App = {
            syncEngine: null,
            
            // 1. LOCAL PvP
            startPvP: () => {
                state.mode = 'pvp';
                showScreen('split');
                ui.splitOverlay.classList.remove('hidden');
                ui.splitResult.classList.add('hidden');
            },
            
            runSplitRound: () => {
                ui.splitOverlay.classList.add('hidden');
                ui.splitResult.classList.add('hidden');
                state.status = 'waiting';
                state.roundNumber++;
                
                setVisualState(ui.p1Trigger, 'waiting', 'WAIT');
                setVisualState(ui.p2Trigger, 'waiting', 'WAIT');

                // Random delay for fairness
                const delay = randomDelay();
                state.timer = setTimeout(() => {
                    state.status = 'go';
                    state.startTime = Date.now();
                    setVisualState(ui.p1Trigger, 'go', 'TAP!');
                    setVisualState(ui.p2Trigger, 'go', 'TAP!');
                }, delay);
            },
            
            handleSplitTap: (player) => {
                if (state.status === 'finished') return;
                
                if (state.status === 'waiting') {
                    // False start
                    clearTimeout(state.timer);
                    state.status = 'finished';
                    document.getElementById('split-winner-text').innerText = "FALSE START";
                    document.getElementById('split-time-text').innerText = player + " tapped early";
                    ui.splitResult.classList.remove('hidden');
                } else if (state.status === 'go') {
                    const time = Date.now() - state.startTime;
                    state.status = 'finished';
                    document.getElementById('split-winner-text').innerText = player + " WINS!";
                    document.getElementById('split-time-text').innerText = time + "ms";
                    ui.splitResult.classList.remove('hidden');
                }
            },

            // 2. PvC (VS COMPUTER)
            startPvC: () => {
                state.mode = 'pvc';
                showScreen('single');
                ui.singleOverlay.classList.add('hidden');
                App.runPvCRound();
            },
            
            runPvCRound: () => {
                state.status = 'waiting';
                state.roundNumber++;
                setVisualState(ui.singleTrigger, 'waiting', 'WAIT FOR GREEN');
                ui.singleOverlay.classList.add('hidden');

                const delay = randomDelay();
                state.timer = setTimeout(() => {
                    state.status = 'go';
                    state.startTime = Date.now();
                    setVisualState(ui.singleTrigger, 'go', 'TAP!');

                    // AI with realistic reaction time (150-400ms)
                    const aiSpeed = Math.floor(Math.random() * 250) + 150;
                    state.aiTimer = setTimeout(() => {
                        if (state.status === 'go') {
                            state.status = 'finished';
                            document.getElementById('single-result-title').innerText = "YOU LOST";
                            document.getElementById('single-result-msg').innerText = "AI reacted in " + aiSpeed + "ms";
                            document.getElementById('single-result-time').innerText = aiSpeed + "ms";
                            ui.singleOverlay.classList.remove('hidden');
                            ui.singleReplayBtn.onclick = App.runPvCRound;
                        }
                    }, aiSpeed);

                }, delay);
            },
            
            handleSingleTap: () => {
                if (state.status === 'finished') return;
                
                if (state.mode === 'pvf' || state.mode === 'random') {
                    App.handleOnlineTap();
                    return;
                }

                if (state.status === 'waiting') {
                    clearTimeout(state.timer);
                    if (state.aiTimer) clearTimeout(state.aiTimer);
                    state.status = 'finished';
                    document.getElementById('single-result-title').innerText = "TOO EARLY";
                    document.getElementById('single-result-msg').innerText = "Wait for the green light";
                    document.getElementById('single-result-time').innerText = "FAIL";
                    ui.singleOverlay.classList.remove('hidden');
                    ui.singleReplayBtn.onclick = App.runPvCRound;
                } else if (state.status === 'go') {
                    if (state.aiTimer) clearTimeout(state.aiTimer);
                    const diff = Date.now() - state.startTime;
                    state.status = 'finished';
                    document.getElementById('single-result-title').innerText = "YOU WON";
                    document.getElementById('single-result-msg').innerText = "Great reaction!";
                    document.getElementById('single-result-time').innerText = diff + "ms";
                    ui.singleOverlay.classList.remove('hidden');
                }
            },

            // 3. PvF (FRIEND MODE)
            startPvF: () => {
                state.mode = 'pvf';
                const params = new URLSearchParams(window.location.search);
                const roomParam = params.get('room');

                if (roomParam) {
                    // JOINING EXISTING ROOM
                    state.roomId = roomParam;
                    state.isHost = false;
                    App.joinRoom(roomParam);
                } else {
                    // CREATING NEW ROOM
                    App.createFriendRoom();
                }
            },
            
            createFriendRoom: () => {
                const roomRef = push(ref(db, 'snapreact/rooms'));
                state.roomId = roomRef.key;
                state.isHost = true;

                // Initialize room with sync data
                set(roomRef, {
                    host: state.myId,
                    status: 'lobby',
                    players: { 
                        [state.myId]: { 
                            joined: true, 
                            ready: true,
                            name: 'Player 1'
                        } 
                    },
                    createdAt: serverTimestamp(),
                    config: {
                        rounds: 3,
                        delayRange: { min: 2000, max: 5000 }
                    }
                });
                
                // Cleanup on disconnect
                onDisconnect(roomRef).remove();

                showScreen('lobby');
                const link = window.location.origin + window.location.pathname + '?room=' + state.roomId;
                
                ui.lobbyTitle.innerText = "Waiting for Friend";
                ui.lobbyContent.innerHTML = `
                    <p>Send this link to play:</p>
                    <div class="copy-box">${link}</div>
                    <button class="btn" onclick="navigator.clipboard.writeText('${link}').then(()=>alert('Link copied!'))">
                        <i class="fas fa-copy"></i> Copy Link
                    </button>
                    <p style="margin-top:1rem; color:var(--text-muted); font-size:0.9rem;">
                        <i class="fas fa-info-circle"></i> Room will close when host leaves
                    </p>
                `;

                // Watch for second player
                onValue(ref(db, `snapreact/rooms/${state.roomId}/players`), snap => {
                    if (snap.exists() && Object.keys(snap.val()).length >= 2) {
                        // Update player 2 info
                        const players = snap.val();
                        const playerIds = Object.keys(players);
                        const opponentId = playerIds.find(id => id !== state.myId);
                        
                        if (opponentId) {
                            update(ref(db, `snapreact/rooms/${state.roomId}/players/${opponentId}`), {
                                name: 'Player 2'
                            });
                            
                            // Start countdown to game
                            showCountdown(3, () => {
                                App.initOnlineGame();
                            });
                        }
                    }
                });
            },
            
            joinRoom: (roomId) => {
                showScreen('lobby');
                ui.lobbyTitle.innerText = "Joining Room...";
                ui.lobbyContent.innerHTML = "<div class='loader'></div>";

                const roomRef = ref(db, `snapreact/rooms/${roomId}`);
                get(roomRef).then(snap => {
                    if (snap.exists()) {
                        // Join as player 2
                        update(ref(db, `snapreact/rooms/${roomId}/players`), {
                            [state.myId]: { 
                                joined: true, 
                                ready: true,
                                name: 'Player 2'
                            }
                        });
                        
                        onDisconnect(ref(db, `snapreact/rooms/${roomId}/players/${state.myId}`)).remove();
                        
                        // Show waiting message
                        ui.lobbyTitle.innerText = "Connected!";
                        ui.lobbyContent.innerHTML = "<p>Waiting for host to start the game...</p>";
                        
                    } else {
                        alert("Room not found or expired.");
                        window.location.href = window.location.pathname;
                    }
                });
            },

            // 4. RANDOM MATCHMAKING
            startRandom: () => {
                state.mode = 'random';
                showScreen('lobby');
                ui.lobbyTitle.innerText = "Finding Opponent...";
                ui.lobbyContent.innerHTML = `
                    <div class='loader'></div>
                    <p style="margin-top:1rem;">Searching for players...</p>
                    <button class="btn btn-outline" onclick="location.reload()" style="margin-top:1rem;">
                        Cancel
                    </button>
                `;

                const queueRef = ref(db, 'snapreact/matchmaking');
                
                // Remove old entry if exists
                remove(ref(db, `snapreact/matchmaking/${state.myId}`));

                // Try to find existing player
                get(queueRef).then(snap => {
                    let matched = false;
                    
                    if (snap.exists()) {
                        snap.forEach(child => {
                            if (!matched && child.key !== state.myId && child.val().status === 'searching') {
                                matched = true;
                                const opponentId = child.key;
                                const roomId = push(ref(db, 'snapreact/rooms')).key;
                                
                                state.roomId = roomId;
                                state.isHost = true;

                                // Create room
                                set(ref(db, `snapreact/rooms/${roomId}`), {
                                    status: 'lobby',
                                    players: {
                                        [state.myId]: { joined: true, name: 'Player 1' },
                                        [opponentId]: { joined: true, name: 'Player 2' }
                                    },
                                    matchmaking: true,
                                    createdAt: serverTimestamp()
                                });

                                // Notify opponent
                                update(ref(db, `snapreact/matchmaking/${opponentId}`), {
                                    status: 'matched',
                                    roomId: roomId
                                });

                                // Remove self from queue
                                remove(ref(db, `snapreact/matchmaking/${state.myId}`));

                                // Start countdown
                                showCountdown(3, () => {
                                    App.initOnlineGame();
                                });
                            }
                        });
                    }

                    if (!matched) {
                        // Join queue
                        state.isHost = false;
                        const myEntry = ref(db, `snapreact/matchmaking/${state.myId}`);
                        set(myEntry, { 
                            status: 'searching', 
                            time: serverTimestamp(),
                            region: 'global'
                        });
                        
                        onDisconnect(myEntry).remove();

                        // Listen for match
                        onValue(myEntry, (s) => {
                            const val = s.val();
                            if (val && val.status === 'matched' && val.roomId) {
                                state.roomId = val.roomId;
                                remove(myEntry);
                                
                                // Join the room
                                update(ref(db, `snapreact/rooms/${val.roomId}/players`), {
                                    [state.myId]: { joined: true, name: 'Player 2' }
                                });
                                
                                App.initOnlineGame();
                            }
                        });

                        // Timeout after 30 seconds
                        setTimeout(() => {
                            get(myEntry).then(snap => {
                                if (snap.exists() && snap.val().status === 'searching') {
                                    remove(myEntry);
                                    alert("Could not find opponent. Try again!");
                                    location.reload();
                                }
                            });
                        }, 30000);
                    }
                });
            },

            // --- ONLINE GAMEPLAY ENGINE ---
            initOnlineGame: async () => {
                showScreen('single');
                ui.singleOverlay.classList.add('hidden');
                updateOnlineStatus(true);
                
                // Initialize sync engine
                App.syncEngine = new SynchronizationEngine(state.roomId, state.isHost);
                
                // Calculate time sync offset
                await App.syncEngine.calculateSyncOffset();
                
                const roomRef = App.syncEngine.roomRef;
                
                // Listen for game state changes
                onValue(roomRef, (snap) => {
                    const data = snap.val();
                    if (!data) { 
                        alert("Room has been closed.");
                        location.reload(); 
                        return; 
                    }

                    // Update player count display
                    if (data.players) {
                        const playerCount = Object.keys(data.players).length;
                        ui.statusText.innerText = `${playerCount}/2 Players • ${state.latency}ms`;
                    }

                    switch (data.status) {
                        case 'syncing':
                            if (data.sync) {
                                state.status = 'waiting';
                                setVisualState(ui.singleTrigger, 'waiting', 'GET READY...');
                                
                                // Calculate local time for GO signal
                                const goTime = data.sync.goTime;
                                const delay = App.syncEngine.scheduleEvent(goTime, () => {
                                    state.status = 'go';
                                    state.startTime = goTime;
                                    setVisualState(ui.singleTrigger, 'go', 'TAP NOW!');
                                });
                                
                                console.log(`Synchronized: GO in ${delay}ms`);
                            }
                            break;
                            
                        case 'go':
                            if (state.status !== 'go') {
                                state.status = 'go';
                                state.startTime = data.goTime;
                                setVisualState(ui.singleTrigger, 'go', 'TAP NOW!');
                            }
                            break;
                            
                        case 'finished':
                            state.status = 'finished';
                            const isWinner = data.winner === state.myId;
                            const winTime = data.winTime;
                            const reason = data.reason || 'normal';
                            
                            if (reason === 'FALSE_START') {
                                document.getElementById('single-result-title').innerText = 
                                    data.cheater === state.myId ? "YOU CHEATED!" : "OPPONENT CHEATED!";
                                document.getElementById('single-result-msg').innerText = 
                                    data.cheater === state.myId ? 
                                    "You tapped too early!" : 
                                    "Opponent tapped early. You win!";
                                document.getElementById('single-result-time').innerText = "FALSE START";
                            } else {
                                document.getElementById('single-result-title').innerText = 
                                    isWinner ? "VICTORY!" : "DEFEAT";
                                document.getElementById('single-result-msg').innerText = 
                                    isWinner ? "You were faster!" : "Opponent was faster.";
                                document.getElementById('single-result-time').innerText = 
                                    winTime === -1 ? "N/A" : (winTime + "ms");
                            }
                            
                            ui.singleOverlay.classList.remove('hidden');
                            
                            if (state.isHost) {
                                ui.singleReplayBtn.style.display = 'block';
                                ui.singleReplayBtn.innerText = "Next Round";
                                ui.singleReplayBtn.onclick = App.runOnlineRound;
                            } else {
                                ui.singleReplayBtn.style.display = 'none';
                            }
                            break;
                    }
                });

                // If host, start the first round
                if (state.isHost) {
                    setTimeout(() => {
                        App.runOnlineRound();
                    }, 2000);
                }
            },
            
            runOnlineRound: async () => {
                if (!state.isHost || !App.syncEngine) return;
                
                state.roundNumber++;
                ui.singleOverlay.classList.add('hidden');
                
                // Clear previous taps
                await update(App.syncEngine.roomRef, {
                    taps: {},
                    winner: null,
                    winTime: null,
                    reason: null,
                    cheater: null
                });
                
                // Start synchronized round with random delay
                const delay = randomDelay();
                await App.syncEngine.startSynchronizedRound(delay);
                
                // Start validation loop
                App.startValidationLoop();
            },
            
            startValidationLoop: () => {
                if (!state.isHost) return;
                
                const validationInterval = setInterval(() => {
                    if (state.status === 'finished') {
                        clearInterval(validationInterval);
                        return;
                    }
                    
                    get(ref(db, `snapreact/rooms/${state.roomId}`)).then(snap => {
                        const data = snap.val();
                        if (!data || data.status !== 'go') return;
                        
                        const taps = data.taps || {};
                        const goTime = data.goTime;
                        
                        // Check if both players have tapped
                        const playerCount = Object.keys(data.players || {}).length;
                        const tapCount = Object.keys(taps).length;
                        
                        if (tapCount >= playerCount) {
                            // Determine winner
                            const result = FairnessValidator.determineWinner(taps, goTime);
                            
                            update(App.syncEngine.roomRef, {
                                status: 'finished',
                                winner: result.winner,
                                winTime: result.winTime,
                                reason: result.reason,
                                cheater: result.cheater,
                                roundEnd: App.syncEngine.getSyncedTime()
                            });
                            
                            clearInterval(validationInterval);
                        }
                    });
                }, 100); // Check every 100ms
            },
            
            handleOnlineTap: () => {
                if (!App.syncEngine || !state.roomId) return;
                
                if (state.status === 'finished') return;
                
                const tapTime = App.syncEngine.getSyncedTime();
                const roomData = ref(db, `snapreact/rooms/${state.roomId}`);
                
                get(roomData).then(snap => {
                    const data = snap.val();
                    if (!data) return;
                    
                    if (state.status === 'waiting' && data.status === 'waiting') {
                        // Early tap during waiting phase
                        update(ref(db, `snapreact/rooms/${state.roomId}/taps/${state.myId}`), { 
                            time: tapTime,
                            early: true
                        });
                        setVisualState(ui.singleTrigger, 'idle', 'TOO EARLY!');
                        
                    } else if (state.status === 'go' || data.status === 'go') {
                        // Valid tap during GO phase
                        const goTime = data.goTime || state.startTime;
                        const reactionTime = tapTime - goTime;
                        
                        update(ref(db, `snapreact/rooms/${state.roomId}/taps/${state.myId}`), { 
                            time: tapTime,
                            reaction: reactionTime,
                            timestamp: serverTimestamp()
                        });
                        
                        setVisualState(ui.singleTrigger, 'idle', 'TAPPED!');
                    }
                });
            }
        };

        // --- CONNECTION MONITOR ---
        setInterval(() => {
            if (state.roomId && (state.mode === 'pvf' || state.mode === 'random')) {
                const pingRef = ref(db, `snapreact/rooms/${state.roomId}/ping/${state.myId}`);
                const start = Date.now();
                
                set(pingRef, { timestamp: start }).then(() => {
                    get(pingRef).then((snap) => {
                        if (snap.exists()) {
                            state.latency = Date.now() - start;
                            updateOnlineStatus(true);
                        }
                    });
                }).catch(() => {
                    updateOnlineStatus(false);
                });
            }
        }, 3000);

        // --- EVENT BINDINGS ---
        
        // Single Player / Online Tap
        ui.singleTrigger.addEventListener('mousedown', (e) => { e.preventDefault(); App.handleSingleTap(); });
        ui.singleTrigger.addEventListener('touchstart', (e) => { e.preventDefault(); App.handleSingleTap(); });

        // Split Screen Taps
        ui.p1Trigger.addEventListener('mousedown', (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 1'); });
        ui.p1Trigger.addEventListener('touchstart', (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 1'); });
        ui.p2Trigger.addEventListener('mousedown', (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 2'); });
        ui.p2Trigger.addEventListener('touchstart', (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 2'); });

        // Expose to window for onclicks
        window.app = App;

        // Auto-Join logic if URL has room
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('room')) {
                App.startPvF();
            }
        };
    </script>
</body>
</html>
