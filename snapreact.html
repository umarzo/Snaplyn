<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapReact | Precision Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --font: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            height: 60px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 50;
        }
        .logo { font-weight: 900; font-size: 1.25rem; letter-spacing: -0.5px; display:flex; align-items:center; gap:8px;}
        .logo i { color: var(--primary); }
        .home-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text); padding: 5px 10px; border-radius: 6px; cursor: pointer; }

        /* --- Screens --- */
        #game-container { flex: 1; position: relative; width: 100%; height: 100%; }

        .screen {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 0;
        }
        .screen.active { opacity: 1; pointer-events: all; z-index: 10; }

        /* --- Menu --- */
        .menu-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            padding: 2rem;
            max-width: 500px;
            margin: 0 auto;
            align-self: center;
            width: 100%;
        }

        .menu-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .menu-card:active { transform: scale(0.98); background: #2d3748; }
        .card-icon { width: 50px; height: 50px; background: rgba(59, 130, 246, 0.1); color: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .card-text h3 { font-size: 1.1rem; margin-bottom: 2px; }
        .card-text p { font-size: 0.85rem; color: var(--text-muted); }

        /* --- Game Area --- */
        .game-area { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
        
        .trigger-zone {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: background 0.05s ease-out; /* Faster transition for instant feedback */
            user-select: none;
            position: relative;
        }

        /* Game States */
        .trigger-zone.idle { background: var(--surface); }
        .trigger-zone.waiting { background: var(--danger); }
        .trigger-zone.go { background: var(--success); }
        .trigger-zone.false { background: #7f1d1d; } /* Dark Red */
        
        .indicator {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            margin-bottom: 1rem;
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .trigger-zone.go .indicator {
            background: white;
            color: var(--success);
            transform: scale(1.2);
            border-radius: 12px;
        }
        
        .status-text { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        .sub-text { font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-top: 0.5rem; }

        /* --- Split Screen --- */
        .split-wrapper { display: flex; flex-direction: column; height: 100%; }
        .p1-zone { flex: 1; transform: rotate(180deg); border-bottom: 4px solid var(--bg); }
        .p2-zone { flex: 1; border-top: 4px solid var(--bg); }

        /* --- Overlay / Modal --- */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
            padding: 2rem;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hidden { display: none !important; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
            max-width: 300px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-outline { background: transparent; border: 2px solid var(--surface); color: var(--text-muted); margin-top: 0.5rem; }

        /* --- Lobby Styles --- */
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .copy-box {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
            margin: 1rem 0;
            border: 1px dashed var(--text-muted);
            font-size: 0.9rem;
        }

        .win-time { font-size: 4rem; font-weight: 900; color: var(--primary); margin: 10px 0; }
        .win-msg { font-size: 1.2rem; color: var(--text-muted); }
        .debug-info { position: absolute; bottom: 5px; right: 5px; font-size: 10px; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-bolt"></i> SnapReact</div>
        <button class="home-btn" onclick="location.href = location.pathname"><i class="fas fa-home"></i></button>
    </header>

    <div id="game-container">

        <div id="screen-menu" class="screen active">
            <div class="menu-wrapper">
                <div class="menu-card" onclick="app.startPvP()">
                    <div class="card-icon"><i class="fas fa-user-friends"></i></div>
                    <div class="card-text">
                        <h3>Local PvP</h3>
                        <p>2 Players, 1 Device (Split Screen)</p>
                    </div>
                </div>
                <div class="menu-card" onclick="app.startPvC()">
                    <div class="card-icon"><i class="fas fa-robot"></i></div>
                    <div class="card-text">
                        <h3>Vs Computer</h3>
                        <p>Challenge the AI</p>
                    </div>
                </div>
                <div class="menu-card" onclick="app.startPvF()">
                    <div class="card-icon"><i class="fas fa-link"></i></div>
                    <div class="card-text">
                        <h3>Vs Friend</h3>
                        <p>Create Link & Play Online</p>
                    </div>
                </div>
                <div class="menu-card" onclick="app.startRandom()">
                    <div class="card-icon"><i class="fas fa-globe"></i></div>
                    <div class="card-text">
                        <h3>Random Duel</h3>
                        <p>Global Matchmaking</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-single" class="screen">
            <div class="game-area">
                <div id="single-trigger" class="trigger-zone idle">
                    <div class="indicator"><i class="fas fa-fingerprint"></i></div>
                    <div class="status-text" id="single-text">WAITING...</div>
                    <div class="sub-text" id="single-sub-text"></div>
                </div>
            </div>
            <div class="debug-info" id="debug-info"></div>

            <div id="single-overlay" class="overlay hidden">
                <h1 id="single-result-title">WINNER</h1>
                <div class="win-time" id="single-result-time">0ms</div>
                <p class="win-msg" id="single-result-msg">Good job!</p>
                <button class="btn" id="single-replay-btn">Play Again</button>
                <button class="btn btn-outline" onclick="location.reload()">Exit</button>
            </div>
        </div>

        <div id="screen-split" class="screen">
            <div class="split-wrapper">
                <div id="p1-trigger" class="trigger-zone idle p1-zone">
                    <div class="status-text">PLAYER 1</div>
                </div>
                <div id="p2-trigger" class="trigger-zone idle p2-zone">
                    <div class="status-text">PLAYER 2</div>
                </div>
            </div>
            <div id="split-overlay" class="overlay">
                <h2 style="margin-bottom:1rem">Ready?</h2>
                <button class="btn" onclick="app.runSplitRound()">Start Round</button>
                <button class="btn btn-outline" onclick="location.reload()">Back</button>
            </div>
            <div id="split-result" class="overlay hidden">
                <h1 id="split-winner-text">PLAYER 1 WINS</h1>
                <div class="win-time" id="split-time-text">200ms</div>
                <button class="btn" onclick="app.runSplitRound()">Rematch</button>
                <button class="btn btn-outline" onclick="location.reload()">Menu</button>
            </div>
        </div>

        <div id="screen-lobby" class="screen">
            <div class="overlay" style="background:var(--bg); padding:2rem;">
                <h2 id="lobby-title">Connecting...</h2>
                <div class="loader"></div>
                <div id="lobby-content" style="width:100%; max-width:400px;"></div>
                <button class="btn btn-outline" onclick="location.href = location.pathname" style="margin-top:2rem">Cancel</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, push, get, onDisconnect, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADpppt8wUpiNrTa-axQD238ln-PI98PJc",
            authDomain: "stonepaperscissors-6c5e7.firebaseapp.com",
            databaseURL: "https://stonepaperscissors-6c5e7-default-rtdb.firebaseio.com",
            projectId: "stonepaperscissors-6c5e7",
            storageBucket: "stonepaperscissors-6c5e7.firebasestorage.app",
            messagingSenderId: "514346330500",
            appId: "1:514346330500:web:6e869a2dd9531d10c6d5d1",
            measurementId: "G-2YRBVKQ5FG"
        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getDatabase(fbApp);

        // --- GLOBAL STATE ---
        const state = {
            mode: null,
            status: 'idle', // idle, waiting, go, finished
            
            // Time logic
            startTime: 0,
            timer: null,
            serverOffset: 0, // Difference between local time and server time
            
            // Online Identity
            myId: 'user_' + Math.floor(Math.random() * 1000000) + Date.now(),
            roomId: null,
            isHost: false,
            
            // Round specific
            roundId: 0 // To ignore events from previous rounds
        };

        // --- DOM REFERENCES ---
        const screens = {
            menu: document.getElementById('screen-menu'),
            single: document.getElementById('screen-single'),
            split: document.getElementById('screen-split'),
            lobby: document.getElementById('screen-lobby')
        };

        const ui = {
            singleTrigger: document.getElementById('single-trigger'),
            singleText: document.getElementById('single-text'),
            singleSubText: document.getElementById('single-sub-text'),
            singleOverlay: document.getElementById('single-overlay'),
            singleReplayBtn: document.getElementById('single-replay-btn'),
            
            p1Trigger: document.getElementById('p1-trigger'),
            p2Trigger: document.getElementById('p2-trigger'),
            splitOverlay: document.getElementById('split-overlay'),
            splitResult: document.getElementById('split-result'),

            lobbyTitle: document.getElementById('lobby-title'),
            lobbyContent: document.getElementById('lobby-content'),
            debug: document.getElementById('debug-info')
        };

        // --- CORE UTILITIES ---
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        function setVisualState(element, stateName, text, subText = "") {
            element.classList.remove('idle', 'waiting', 'go', 'false');
            element.classList.add(stateName);
            if(text) element.querySelector('.status-text').innerText = text;
            const sub = element.querySelector('.sub-text');
            if(sub) sub.innerText = subText;
        }

        // --- TIME SYNCHRONIZATION ---
        // This is crucial for fixing the "not simultaneous" bug
        const offsetRef = ref(db, ".info/serverTimeOffset");
        onValue(offsetRef, (snap) => {
            state.serverOffset = snap.val() || 0;
        });

        // Get estimated Server Time
        function getServerTime() {
            return Date.now() + state.serverOffset;
        }

        // --- GAME LOGIC ---
        const App = {
            
            // ============================
            // 1. LOCAL PvP (Split Screen)
            // ============================
            startPvP: () => {
                state.mode = 'pvp';
                showScreen('split');
                ui.splitOverlay.classList.remove('hidden');
                ui.splitResult.classList.add('hidden');
            },
            runSplitRound: () => {
                ui.splitOverlay.classList.add('hidden');
                ui.splitResult.classList.add('hidden');
                state.status = 'waiting';
                
                setVisualState(ui.p1Trigger, 'waiting', 'WAIT');
                setVisualState(ui.p2Trigger, 'waiting', 'WAIT');

                // Random delay 2-5s
                const delay = Math.floor(Math.random() * 3000) + 2000;
                
                state.timer = setTimeout(() => {
                    state.status = 'go';
                    state.startTime = Date.now();
                    setVisualState(ui.p1Trigger, 'go', 'TAP!');
                    setVisualState(ui.p2Trigger, 'go', 'TAP!');
                }, delay);
            },
            handleSplitTap: (player) => {
                if(state.status === 'finished') return;
                
                if(state.status === 'waiting') {
                    // False start
                    clearTimeout(state.timer);
                    state.status = 'finished';
                    document.getElementById('split-winner-text').innerText = "FALSE START";
                    document.getElementById('split-time-text').innerText = player + " tapped early";
                    ui.splitResult.classList.remove('hidden');
                } else if (state.status === 'go') {
                    const time = Date.now() - state.startTime;
                    state.status = 'finished';
                    document.getElementById('split-winner-text').innerText = player + " WINS!";
                    document.getElementById('split-time-text').innerText = time + "ms";
                    ui.splitResult.classList.remove('hidden');
                }
            },

            // ============================
            // 2. PvC (Vs Computer)
            // ============================
            startPvC: () => {
                state.mode = 'pvc';
                showScreen('single');
                ui.singleOverlay.classList.add('hidden');
                App.runPvCRound();
            },
            runPvCRound: () => {
                state.status = 'waiting';
                setVisualState(ui.singleTrigger, 'waiting', 'WAIT FOR GREEN');
                ui.singleOverlay.classList.add('hidden');
                
                const delay = Math.floor(Math.random() * 3000) + 2000;

                state.timer = setTimeout(() => {
                    state.status = 'go';
                    state.startTime = Date.now();
                    setVisualState(ui.singleTrigger, 'go', 'TAP!');

                    // AI logic
                    const aiSpeed = Math.floor(Math.random() * 300) + 250; 
                    state.aiTimer = setTimeout(() => {
                        if(state.status === 'go') {
                            state.status = 'finished';
                            document.getElementById('single-result-title').innerText = "YOU LOST";
                            document.getElementById('single-result-msg').innerText = "AI reacted in " + aiSpeed + "ms";
                            document.getElementById('single-result-time').innerText = "--";
                            ui.singleOverlay.classList.remove('hidden');
                            ui.singleReplayBtn.onclick = App.runPvCRound;
                        }
                    }, aiSpeed);

                }, delay);
            },

            // ============================
            // 3. ONLINE (PvF & Random) - REWRITTEN
            // ============================
            
            // --- Entry Points ---
            startPvF: () => {
                const params = new URLSearchParams(window.location.search);
                const roomParam = params.get('room');
                if (roomParam) {
                    state.roomId = roomParam;
                    state.isHost = false;
                    App.joinRoom(roomParam);
                } else {
                    App.createFriendRoom();
                }
            },
            createFriendRoom: () => {
                const roomRef = push(ref(db, 'snapreact/rooms'));
                state.roomId = roomRef.key;
                state.isHost = true;
                state.mode = 'pvf';

                // Initial state
                set(roomRef, {
                    state: 'lobby',
                    players: { [state.myId]: { joined: true } }
                });
                onDisconnect(roomRef).remove();

                showScreen('lobby');
                const link = window.location.href + '?room=' + state.roomId;
                ui.lobbyTitle.innerText = "Waiting for Friend";
                ui.lobbyContent.innerHTML = `
                    <p>Send this link to play:</p>
                    <div class="copy-box">${link}</div>
                    <button class="btn" onclick="navigator.clipboard.writeText('${link}').then(()=>alert('Copied!'))">Copy Link</button>
                `;

                // Wait for opponent
                onValue(ref(db, `snapreact/rooms/${state.roomId}/players`), snap => {
                    if(snap.exists() && Object.keys(snap.val()).length >= 2) {
                        App.initOnlineGame();
                    }
                });
            },
            joinRoom: (roomId) => {
                state.mode = 'pvf';
                showScreen('lobby');
                ui.lobbyTitle.innerText = "Joining Room...";
                const roomRef = ref(db, `snapreact/rooms/${roomId}`);
                get(roomRef).then(snap => {
                    if(snap.exists()) {
                        update(ref(db, `snapreact/rooms/${roomId}/players`), { [state.myId]: { joined: true } });
                        onDisconnect(ref(db, `snapreact/rooms/${roomId}/players/${state.myId}`)).remove();
                        App.initOnlineGame();
                    } else {
                        alert("Room not found");
                        window.location.href = window.location.pathname;
                    }
                });
            },
            
            startRandom: () => {
                state.mode = 'random';
                showScreen('lobby');
                ui.lobbyTitle.innerText = "Searching Opponent...";
                
                const queueRef = ref(db, 'snapreact/matchmaking');
                remove(ref(db, `snapreact/matchmaking/${state.myId}`)); // Clean self

                // Search
                get(queueRef).then(snap => {
                    let foundMatch = false;
                    if(snap.exists()) {
                        snap.forEach(child => {
                            if(!foundMatch && child.key !== state.myId && child.val().status === 'searching') {
                                // Found match -> Become Host
                                foundMatch = true;
                                const opponentId = child.key;
                                const roomId = push(ref(db, 'snapreact/rooms')).key;
                                
                                state.roomId = roomId;
                                state.isHost = true;

                                set(ref(db, `snapreact/rooms/${roomId}`), {
                                    state: 'lobby',
                                    players: { [state.myId]: { joined: true }, [opponentId]: { joined: true } }
                                });

                                // Inform opponent
                                update(ref(db, `snapreact/matchmaking/${opponentId}`), { status: 'found', roomId: roomId });
                                App.initOnlineGame();
                            }
                        });
                    }

                    if(!foundMatch) {
                        state.isHost = false;
                        const myEntry = ref(db, `snapreact/matchmaking/${state.myId}`);
                        set(myEntry, { status: 'searching', timestamp: serverTimestamp() });
                        onDisconnect(myEntry).remove();

                        onValue(myEntry, (s) => {
                            const val = s.val();
                            if(val && val.status === 'found' && val.roomId) {
                                state.roomId = val.roomId;
                                remove(myEntry);
                                App.initOnlineGame();
                            }
                        });
                    }
                });
            },

            // --- ONLINE ENGINE (The Fix) ---
            initOnlineGame: () => {
                showScreen('single');
                ui.singleOverlay.classList.add('hidden');
                
                // --- HOST LOGIC LOOP ---
                if(state.isHost) {
                    // Host manages the rounds
                    App.hostStartNewRound();
                    
                    // Host Judges the winner (Fairness Fix)
                    const tapsRef = ref(db, `snapreact/rooms/${state.roomId}/round/taps`);
                    onValue(tapsRef, (snap) => {
                        const taps = snap.val();
                        if(taps && Object.keys(taps).length >= 2) {
                            // Both players have reported their score
                            App.hostJudgeRound(taps);
                        } else if (taps) {
                            // Check for immediate false start disqualification
                            Object.entries(taps).forEach(([pid, score]) => {
                                if(score === -1) { // -1 means false start
                                    // Immediate fail for this player
                                    App.hostJudgeRound(taps); // Force judge even if only 1 tap
                                }
                            });
                        }
                    });
                }

                // --- CLIENT LISTENER LOOP ---
                const roundRef = ref(db, `snapreact/rooms/${state.roomId}/round`);
                onValue(roundRef, (snap) => {
                    const roundData = snap.val();
                    if(!roundData) return;

                    // 1. SYNC STATUS: WAITING (Red)
                    if(roundData.status === 'waiting' && state.status !== 'waiting') {
                        state.status = 'waiting';
                        state.roundId = roundData.id; // Sync round ID
                        ui.singleOverlay.classList.add('hidden');
                        setVisualState(ui.singleTrigger, 'waiting', 'WAIT FOR GREEN', "Syncing...");
                        
                        // FUTURE SCHEDULING LOGIC
                        const targetTime = roundData.targetTime;
                        const now = getServerTime();
                        const delay = targetTime - now;

                        if(delay > 0) {
                            // Schedule the Go!
                            if(state.timer) clearTimeout(state.timer);
                            state.timer = setTimeout(() => {
                                if(state.status === 'waiting') {
                                    state.status = 'go';
                                    state.startTime = Date.now(); // Local start time for reaction calc
                                    setVisualState(ui.singleTrigger, 'go', 'TAP!');
                                }
                            }, delay);
                        } else {
                            // We are late, show green immediately (fallback)
                            state.status = 'go';
                            state.startTime = Date.now();
                            setVisualState(ui.singleTrigger, 'go', 'TAP!');
                        }
                    }

                    // 2. SYNC STATUS: FINISHED
                    else if (roundData.status === 'finished') {
                        state.status = 'finished';
                        if(state.timer) clearTimeout(state.timer);
                        
                        const iWon = roundData.winner === state.myId;
                        const winTime = roundData.winTime;
                        
                        document.getElementById('single-result-title').innerText = iWon ? "VICTORY" : "DEFEAT";
                        document.getElementById('single-result-msg').innerText = iWon ? "You were faster!" : "Opponent won";
                        
                        let timeText = "";
                        if(winTime === -1) timeText = "Opponent False Start";
                        else if (winTime === -999) timeText = "You False Started!";
                        else timeText = winTime + "ms";

                        document.getElementById('single-result-time').innerText = timeText;
                        
                        ui.singleOverlay.classList.remove('hidden');
                        
                        if(state.isHost) {
                            ui.singleReplayBtn.style.display = 'block';
                            ui.singleReplayBtn.innerText = "Next Round";
                            ui.singleReplayBtn.onclick = App.hostStartNewRound;
                        } else {
                            ui.singleReplayBtn.style.display = 'none';
                        }
                    }
                });
            },

            // --- HOST FUNCTIONS ---
            hostStartNewRound: () => {
                // Reset round
                const nextRoundId = Date.now();
                // Schedule future time (Current Server Time + 3000ms + Random)
                const delay = Math.floor(Math.random() * 2000) + 3000; // 3-5 seconds in future
                const targetTime = getServerTime() + delay;

                update(ref(db, `snapreact/rooms/${state.roomId}/round`), {
                    id: nextRoundId,
                    status: 'waiting',
                    targetTime: targetTime,
                    taps: null,
                    winner: null
                });
            },

            hostJudgeRound: (taps) => {
                // Logic to determine winner fairly
                // Taps is an object: { userId: reactionTimeInMs }
                // -1 means false start
                
                const playerIds = Object.keys(taps);
                let winner = null;
                let winTime = 0;

                // Check False Starts first
                const falseStarter = playerIds.find(pid => taps[pid] === -1);
                
                if(falseStarter) {
                    // If someone false started, the OTHER player wins automatically
                    // Need to find the other player ID
                    get(ref(db, `snapreact/rooms/${state.roomId}/players`)).then(snap => {
                        const allPlayers = Object.keys(snap.val());
                        winner = allPlayers.find(p => p !== falseStarter);
                        winTime = -1; // Code for false start win
                        App.finalizeRound(winner, winTime, falseStarter);
                    });
                } else if (playerIds.length >= 2) {
                    // Compare valid times
                    const p1 = playerIds[0];
                    const p2 = playerIds[1];
                    const t1 = taps[p1];
                    const t2 = taps[p2];

                    if(t1 < t2) { winner = p1; winTime = t1; }
                    else { winner = p2; winTime = t2; }
                    
                    App.finalizeRound(winner, winTime, null);
                }
            },

            finalizeRound: (winner, winTime, falseStarter) => {
                // Prevent double finish
                get(ref(db, `snapreact/rooms/${state.roomId}/round/status`)).then(snap => {
                    if(snap.val() !== 'finished') {
                        update(ref(db, `snapreact/rooms/${state.roomId}/round`), {
                            status: 'finished',
                            winner: winner,
                            winTime: winTime,
                            falseStarter: falseStarter
                        });
                    }
                });
            },

            // --- CLIENT INPUT ---
            handleSingleTap: () => {
                if(state.status === 'finished') return;

                // Handle Online
                if(state.mode === 'pvf' || state.mode === 'random') {
                    if(state.status === 'waiting') {
                        // False Start
                        setVisualState(ui.singleTrigger, 'false', 'FALSE START!');
                        update(ref(db, `snapreact/rooms/${state.roomId}/round/taps/${state.myId}`), -1);
                    } else if (state.status === 'go') {
                        // Valid Tap
                        const reactionTime = Date.now() - state.startTime;
                        setVisualState(ui.singleTrigger, 'idle', 'TAPPED!', reactionTime + "ms");
                        // Send local reaction time to server
                        update(ref(db, `snapreact/rooms/${state.roomId}/round/taps/${state.myId}`), reactionTime);
                    }
                    return;
                }

                // Handle Local
                if(state.status === 'waiting') {
                    clearTimeout(state.timer);
                    if(state.aiTimer) clearTimeout(state.aiTimer);
                    state.status = 'finished';
                    
                    document.getElementById('single-result-title').innerText = "TOO EARLY";
                    document.getElementById('single-result-msg').innerText = "Wait for the green light";
                    document.getElementById('single-result-time').innerText = "FAIL";
                    
                    ui.singleOverlay.classList.remove('hidden');
                    ui.singleReplayBtn.onclick = App.runPvCRound;
                } else if (state.status === 'go') {
                    const diff = Date.now() - state.startTime;
                    state.status = 'finished';
                    document.getElementById('single-result-title').innerText = "YOU WON";
                    document.getElementById('single-result-msg').innerText = "Great reaction!";
                    document.getElementById('single-result-time').innerText = diff + "ms";
                    ui.singleOverlay.classList.remove('hidden');
                }
            }
        };

        // --- EVENTS ---
        ui.singleTrigger.addEventListener('mousedown', (e) => { e.preventDefault(); App.handleSingleTap(); });
        ui.singleTrigger.addEventListener('touchstart', (e) => { e.preventDefault(); App.handleSingleTap(); });

        ui.p1Trigger.addEventListener('mousedown', (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 1'); });
        ui.p1Trigger.addEventListener('touchstart', (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 1'); });
        
        ui.p2Trigger.addEventListener('mousedown', (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 2'); });
        ui.p2Trigger.addEventListener('touchstart', (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 2'); });

        window.app = App;

        // Auto Join URL
        window.onload = () => {
             const params = new URLSearchParams(window.location.search);
             if(params.get('room')) App.startPvF();
        };

    </script>
</body>
</html>
