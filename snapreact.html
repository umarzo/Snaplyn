<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapReact | Precision Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --font: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 60px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 50;
        }
        .logo { font-weight: 900; font-size: 1.25rem; letter-spacing: -0.5px; display:flex; align-items:center; gap:8px;}
        .logo i { color: var(--primary); }
        .home-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text); padding: 5px 10px; border-radius: 6px; cursor: pointer; }

        #game-container { flex: 1; position: relative; width: 100%; height: 100%; }

        .screen {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 0;
        }
        .screen.active { opacity: 1; pointer-events: all; z-index: 10; }

        .menu-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            padding: 2rem;
            max-width: 500px;
            margin: 0 auto;
            align-self: center;
            width: 100%;
        }

        .menu-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .menu-card:active { transform: scale(0.98); }
        .card-icon { width: 50px; height: 50px; background: rgba(59, 130, 246, 0.1); color: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        .game-area { width: 100%; height: 100%; position: relative; }
        
        .trigger-zone {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            cursor: pointer; transition: background 0.05s; user-select: none;
        }

        .trigger-zone.idle { background: var(--surface); }
        .trigger-zone.waiting { background: var(--danger); }
        .trigger-zone.go { background: var(--success); }
        
        .indicator {
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(255,255,255,0.1); margin-bottom: 1rem;
            display: flex; align-items: center; justify-content: center; font-size: 3rem;
        }

        .status-text { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; text-align: center; }

        .split-wrapper { display: flex; flex-direction: column; height: 100%; }
        .p1-zone { flex: 1; transform: rotate(180deg); position: relative; border-bottom: 2px solid var(--bg); }
        .p2-zone { flex: 1; position: relative; border-top: 2px solid var(--bg); }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px); display: flex; align-items: center;
            justify-content: center; flex-direction: column; z-index: 100; padding: 2rem;
        }
        .hidden { display: none !important; }

        .btn {
            background: var(--primary); color: white; border: none; padding: 1rem;
            font-size: 1rem; font-weight: 700; border-radius: 8px; cursor: pointer;
            margin-top: 1rem; width: 100%; max-width: 300px;
        }
        .btn-outline { background: transparent; border: 2px solid var(--surface); color: var(--text-muted); }

        .loader {
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .copy-box {
            background: #000; padding: 1rem; border-radius: 8px; font-family: monospace;
            word-break: break-all; margin: 1rem 0; border: 1px dashed var(--text-muted);
        }
        .win-time { font-size: 3.5rem; font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-bolt"></i> SnapReact</div>
        <button class="home-btn" onclick="location.href = location.pathname"><i class="fas fa-home"></i></button>
    </header>

    <div id="game-container">

        <div id="screen-menu" class="screen active">
            <div class="menu-wrapper">
                <div class="menu-card" onclick="app.startPvP()">
                    <div class="card-icon"><i class="fas fa-user-friends"></i></div>
                    <div class="card-text"><h3>Local PvP</h3><p>Split Screen</p></div>
                </div>
                <div class="menu-card" onclick="app.startPvC()">
                    <div class="card-icon"><i class="fas fa-robot"></i></div>
                    <div class="card-text"><h3>Vs Computer</h3><p>Test your speed</p></div>
                </div>
                <div class="menu-card" onclick="app.startPvF()">
                    <div class="card-icon"><i class="fas fa-link"></i></div>
                    <div class="card-text"><h3>Vs Friend</h3><p>Online Private Room</p></div>
                </div>
                <div class="menu-card" onclick="app.startRandom()">
                    <div class="card-icon"><i class="fas fa-globe"></i></div>
                    <div class="card-text"><h3>Random Duel</h3><p>Instant Match</p></div>
                </div>
            </div>
        </div>

        <div id="screen-single" class="screen">
            <div class="game-area">
                <div id="single-trigger" class="trigger-zone idle">
                    <div class="indicator"><i class="fas fa-fingerprint"></i></div>
                    <div class="status-text" id="single-text">READY?</div>
                </div>
            </div>
            <div id="single-overlay" class="overlay hidden">
                <h1 id="single-result-title">RESULT</h1>
                <div class="win-time" id="single-result-time">0ms</div>
                <p id="single-result-msg">---</p>
                <button class="btn" id="single-replay-btn">Play Again</button>
                <button class="btn btn-outline" onclick="location.reload()">Exit</button>
            </div>
        </div>

        <div id="screen-split" class="screen">
            <div class="split-wrapper">
                <div id="p1-trigger" class="trigger-zone idle p1-zone">
                    <div class="status-text">PLAYER 1</div>
                </div>
                <div id="p2-trigger" class="trigger-zone idle p2-zone">
                    <div class="status-text">PLAYER 2</div>
                </div>
            </div>
            <div id="split-overlay" class="overlay">
                <button class="btn" onclick="app.runSplitRound()">Start Round</button>
            </div>
            <div id="split-result" class="overlay hidden">
                <h1 id="split-winner-text">WINS</h1>
                <div class="win-time" id="split-time-text">0ms</div>
                <button class="btn" onclick="app.runSplitRound()">Next Round</button>
                <button class="btn btn-outline" onclick="location.reload()">Menu</button>
            </div>
        </div>

        <div id="screen-lobby" class="screen">
            <div class="overlay" style="background:var(--bg);">
                <h2 id="lobby-title">Connecting</h2>
                <div class="loader"></div>
                <div id="lobby-content" style="width:100%; max-width:400px; text-align:center;"></div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, push, get, onDisconnect, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADpppt8wUpiNrTa-axQD238ln-PI98PJc",
            authDomain: "stonepaperscissors-6c5e7.firebaseapp.com",
            databaseURL: "https://stonepaperscissors-6c5e7-default-rtdb.firebaseio.com",
            projectId: "stonepaperscissors-6c5e7",
            storageBucket: "stonepaperscissors-6c5e7.firebasestorage.app",
            messagingSenderId: "514346330500",
            appId: "1:514346330500:web:6e869a2dd9531d10c6d5d1"
        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getDatabase(fbApp);

        const state = {
            mode: null,
            status: 'idle', 
            startTime: 0,
            serverOffset: 0,
            timer: null,
            myId: 'u_' + Math.random().toString(36).substr(2, 9),
            roomId: null,
            isHost: false,
            hasTapped: false
        };

        // Sync Clock with Firebase
        const offsetRef = ref(db, ".info/serverTimeOffset");
        onValue(offsetRef, (snap) => { state.serverOffset = snap.val() || 0; });

        function getServerTime() { return Date.now() + state.serverOffset; }

        const App = {
            // --- UI HELPERS ---
            showScreen: (name) => {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('screen-' + name).classList.add('active');
            },

            setZone: (el, cls, txt) => {
                el.classList.remove('idle', 'waiting', 'go');
                el.classList.add(cls);
                if(txt) el.querySelector('.status-text').innerText = txt;
            },

            // --- LOCAL PVP ---
            startPvP: () => {
                state.mode = 'pvp';
                App.showScreen('split');
            },
            runSplitRound: () => {
                document.getElementById('split-overlay').classList.add('hidden');
                document.getElementById('split-result').classList.add('hidden');
                state.status = 'waiting';
                App.setZone(document.getElementById('p1-trigger'), 'waiting', 'WAIT');
                App.setZone(document.getElementById('p2-trigger'), 'waiting', 'WAIT');

                const delay = Math.random() * 3000 + 2000;
                state.timer = setTimeout(() => {
                    state.status = 'go';
                    state.startTime = Date.now();
                    App.setZone(document.getElementById('p1-trigger'), 'go', 'TAP!');
                    App.setZone(document.getElementById('p2-trigger'), 'go', 'TAP!');
                }, delay);
            },
            handleSplitTap: (player) => {
                if(state.status === 'finished') return;
                if(state.status === 'waiting') {
                    clearTimeout(state.timer);
                    state.status = 'finished';
                    App.endSplit("TOO EARLY!", player + " Failed");
                } else if(state.status === 'go') {
                    const diff = Date.now() - state.startTime;
                    state.status = 'finished';
                    App.endSplit(player + " WINS!", diff + "ms");
                }
            },
            endSplit: (title, time) => {
                document.getElementById('split-winner-text').innerText = title;
                document.getElementById('split-time-text').innerText = time;
                document.getElementById('split-result').classList.remove('hidden');
            },

            // --- VS COMPUTER ---
            startPvC: () => {
                state.mode = 'pvc';
                App.showScreen('single');
                App.runPvCRound();
            },
            runPvCRound: () => {
                state.status = 'waiting';
                state.hasTapped = false;
                document.getElementById('single-overlay').classList.add('hidden');
                App.setZone(document.getElementById('single-trigger'), 'waiting', 'WAIT FOR GREEN');
                
                const delay = Math.random() * 3000 + 2000;
                state.timer = setTimeout(() => {
                    state.status = 'go';
                    state.startTime = Date.now();
                    App.setZone(document.getElementById('single-trigger'), 'go', 'TAP!');
                    
                    const aiSpeed = Math.random() * 150 + 220; // AI speed 220-370ms
                    setTimeout(() => {
                        if(state.status === 'go') App.endSingle("AI WON", aiSpeed.toFixed(0) + "ms", "Computer was faster!");
                    }, aiSpeed);
                }, delay);
            },

            // --- ONLINE CORE ---
            initOnlineGame: () => {
                App.showScreen('single');
                const roomRef = ref(db, `snapreact/rooms/${state.roomId}`);
                
                onValue(roomRef, (snap) => {
                    const data = snap.val();
                    if(!data) return;

                    // SYNCED START LOGIC
                    if(data.status === 'preparing' && data.startTime) {
                        state.status = 'preparing';
                        state.hasTapped = false;
                        document.getElementById('single-overlay').classList.add('hidden');
                        App.setZone(document.getElementById('single-trigger'), 'waiting', 'GET READY...');
                        
                        // Precise Countdown to Sync
                        const checkStart = setInterval(() => {
                            const now = getServerTime();
                            if(now >= data.startTime) {
                                clearInterval(checkStart);
                                if(state.status !== 'finished') {
                                    state.status = 'go';
                                    state.startTime = data.startTime; // Use server-defined start
                                    App.setZone(document.getElementById('single-trigger'), 'go', 'TAP NOW!');
                                }
                            }
                        }, 10);
                    }

                    if(data.status === 'finished') {
                        state.status = 'finished';
                        const isWin = data.winner === state.myId;
                        const timeText = data.winTime === -1 ? "Opponent Early Tap" : data.winTime + "ms";
                        App.endSingle(isWin ? "VICTORY" : "DEFEAT", timeText, isWin ? "You reacted faster!" : "Better luck next time.");
                        
                        const replayBtn = document.getElementById('single-replay-btn');
                        replayBtn.style.display = state.isHost ? 'block' : 'none';
                        replayBtn.onclick = App.hostNextRound;
                    }
                });

                if(state.isHost) App.hostNextRound();
            },

            hostNextRound: () => {
                const roomRef = ref(db, `snapreact/rooms/${state.roomId}`);
                // Set start time 3 seconds into the future for perfect sync
                const futureStart = getServerTime() + 3000 + (Math.random() * 2000);
                update(roomRef, {
                    status: 'preparing',
                    startTime: futureStart,
                    winner: null,
                    winTime: null,
                    taps: null
                });
            },

            handleOnlineTap: () => {
                if(state.hasTapped || state.status === 'finished') return;
                state.hasTapped = true;

                const now = getServerTime();
                const reaction = now - state.startTime;
                
                const tapValue = (state.status === 'go') ? reaction : -1;
                
                // Set result in DB
                set(ref(db, `snapreact/rooms/${state.roomId}/taps/${state.myId}`), {
                    time: tapValue,
                    ts: now
                });

                App.setZone(document.getElementById('single-trigger'), 'idle', tapValue === -1 ? 'TOO EARLY!' : 'WAITING...');
            },

            endSingle: (title, time, msg) => {
                state.status = 'finished';
                document.getElementById('single-result-title').innerText = title;
                document.getElementById('single-result-time').innerText = time;
                document.getElementById('single-result-msg').innerText = msg;
                document.getElementById('single-overlay').classList.remove('hidden');
                document.getElementById('single-replay-btn').onclick = App.runPvCRound;
            },

            // --- MATCHMAKING & FRIENDS ---
            startPvF: () => {
                const urlRoom = new URLSearchParams(window.location.search).get('room');
                if(urlRoom) { state.roomId = urlRoom; App.joinRoom(urlRoom); } 
                else { App.createRoom(); }
            },
            createRoom: () => {
                state.isHost = true;
                const newRoomRef = push(ref(db, 'snapreact/rooms'));
                state.roomId = newRoomRef.key;
                set(newRoomRef, { host: state.myId, status: 'lobby', players: { [state.myId]: true } });
                onDisconnect(newRoomRef).remove();

                App.showScreen('lobby');
                const invite = window.location.origin + window.location.pathname + '?room=' + state.roomId;
                document.getElementById('lobby-title').innerText = "Invite Friend";
                document.getElementById('lobby-content').innerHTML = `
                    <div class="copy-box">${invite}</div>
                    <button class="btn" onclick="navigator.clipboard.writeText('${invite}')">Copy Link</button>
                `;

                onValue(ref(db, `snapreact/rooms/${state.roomId}/players`), (s) => {
                    if(s.exists() && Object.keys(s.val()).length >= 2) App.initOnlineGame();
                });
            },
            joinRoom: (rid) => {
                state.isHost = false;
                update(ref(db, `snapreact/rooms/${rid}/players`), { [state.myId]: true });
                App.showScreen('lobby');
                document.getElementById('lobby-title').innerText = "Joining...";
                App.initOnlineGame();
            },
            startRandom: () => {
                state.mode = 'random';
                App.showScreen('lobby');
                const qRef = ref(db, 'snapreact/matchmaking');
                get(qRef).then(snap => {
                    let match = null;
                    snap.forEach(c => { if(c.val().status === 'wait') match = c.key; });
                    if(match) {
                        state.roomId = match; state.isHost = false;
                        update(ref(db, `snapreact/matchmaking/${match}`), { status: 'found', guest: state.myId });
                        App.initOnlineGame();
                    } else {
                        state.isHost = true; state.roomId = state.myId;
                        set(ref(db, `snapreact/matchmaking/${state.myId}`), { status: 'wait' });
                        onDisconnect(ref(db, `snapreact/matchmaking/${state.myId}`)).remove();
                        onValue(ref(db, `snapreact/matchmaking/${state.myId}`), (s) => {
                            if(s.val()?.status === 'found') App.initOnlineGame();
                        });
                    }
                });
            }
        };

        // --- THE WINNER ENGINE (Host only) ---
        setInterval(() => {
            if(!state.isHost || !state.roomId || state.status !== 'go') return;

            get(ref(db, `snapreact/rooms/${state.roomId}/taps`)).then(snap => {
                const taps = snap.val();
                if(!taps) return;
                const players = Object.keys(taps);
                if(players.length < 2) {
                    // Check if someone false started solo
                    const early = players.find(p => taps[p].time === -1);
                    if(early) {
                        get(ref(db, `snapreact/rooms/${state.roomId}/players`)).then(ps => {
                            const winner = Object.keys(ps.val()).find(p => p !== early);
                            update(ref(db, `snapreact/rooms/${state.roomId}`), { status: 'finished', winner: winner, winTime: -1 });
                        });
                    }
                    return;
                }

                // Both players have tapped
                let winner = null, bestTime = Infinity;
                players.forEach(p => {
                    if(taps[p].time !== -1 && taps[p].time < bestTime) {
                        bestTime = taps[p].time; winner = p;
                    }
                });

                // Handle double false start or no winner
                if(!winner) winner = players[0]; 

                update(ref(db, `snapreact/rooms/${state.roomId}`), {
                    status: 'finished', winner: winner, winTime: bestTime === Infinity ? -1 : bestTime
                });
            });
        }, 100);

        // --- BINDINGS ---
        const trigger = document.getElementById('single-trigger');
        ['mousedown', 'touchstart'].forEach(evt => {
            trigger.addEventListener(evt, (e) => { e.preventDefault(); if(state.mode.startsWith('pv')) App.handleOnlineTap(); else App.handleSingleTap(); });
            document.getElementById('p1-trigger').addEventListener(evt, (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 1'); });
            document.getElementById('p2-trigger').addEventListener(evt, (e) => { e.preventDefault(); App.handleSplitTap('PLAYER 2'); });
        });

        App.handleSingleTap = () => {
             if(state.mode === 'pvc') {
                 if(state.status === 'waiting') { clearTimeout(state.timer); App.endSingle("TOO EARLY", "Fail", "Wait for green!"); }
                 else if(state.status === 'go') { App.endSingle("YOU WON", (Date.now()-state.startTime)+"ms", "Fast reflexes!"); }
             }
        };

        window.app = App;
        window.onload = () => { if(new URLSearchParams(window.location.search).get('room')) App.startPvF(); };
    </script>
</body>
</html>
